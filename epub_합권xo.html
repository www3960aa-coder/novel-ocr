<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EPUB 합권/편집 완성본</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg-color: #1a1a1c; --card-bg: #2a2a30; --card-border: #383840; --text-main: #f0f0f0; --text-sub: #a0a0a8; --accent-gold: #d4b872; --accent-blue: #3a82f6; --input-bg: #1e1e22; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px; padding-bottom: 80px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .step-number { background-color: var(--accent-gold); color: #000; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }
        .upload-area { border: 1px dashed var(--accent-gold); border-radius: 8px; padding: 30px 16px; text-align: center; cursor: pointer; }
        #file-list { margin-top: 12px; list-style: none; }
        #file-list li { font-size: 13px; padding: 10px; background: rgba(0,0,0,0.3); margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .option-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
        .option-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-blue); flex-shrink: 0; }
        .option-text h4 { font-size: 15px; margin-bottom: 4px; }
        .option-text p { font-size: 13px; color: var(--text-sub); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
        .form-group input { width: 100%; background-color: var(--input-bg); border: 1px solid var(--card-border); color: #fff; padding: 12px; border-radius: 6px; font-size: 14px; outline: none; }
        .action-btn { width: 100%; background-color: var(--accent-gold); color: #1a1a1c; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .status-log { margin-top: 15px; font-size: 12px; color: #8ecae6; font-family: monospace; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

    <h1 style="font-size: 20px; margin-bottom: 20px;">📚 EPUB 합권/편집 완성본</h1>

    <div class="card">
        <div class="card-title"><div class="step-number">1</div>EPUB 파일 업로드</div>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div style="font-size:30px;">📁</div>
            <p style="color: #fff; font-weight: bold; margin-top:8px;">파일을 클릭하여 선택하세요</p>
            <p style="color:var(--text-sub); font-size:13px;">(순서대로 병합됩니다)</p>
        </div>
        <input type="file" id="file-input" multiple accept=".epub" style="display: none;">
        <ul id="file-list"></ul>
    </div>

    <div class="card">
        <div class="card-title"><div class="step-number">2</div>합권 옵션</div>
        <div class="option-item">
            <input type="checkbox" checked>
            <div class="option-text">
                <h4>1권 표지를 전체 대표 표지로 지정</h4>
                <p>병합된 책의 표지가 뷰어에서 정상 출력됩니다.</p>
            </div>
        </div>
        <div class="option-item">
            <input type="checkbox" checked>
            <div class="option-text">
                <h4>가상 폴더 분리 (사진 깨짐 방지)</h4>
                <p>각 권을 분리하여 본문 이미지나 사진이 깨지지 않습니다.</p>
            </div>
        </div>
        <div class="option-item">
            <input type="checkbox" checked>
            <div class="option-text">
                <h4>통합 계층 목차 생성 (필수)</h4>
                <p>1권부터 마지막 권까지 끊기지 않도록 뷰어용 전체 목차를 다시 그립니다.</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><div class="step-number">3</div>메타데이터</div>
        <div class="form-group">
            <label>책 제목 <span style="color:#ff6b6b">*</span></label>
            <input type="text" id="meta-title" placeholder="예: [작가명] 책 제목">
        </div>
        <div class="form-group">
            <label>📁 저장될 파일명</label>
            <input type="text" id="meta-filename" placeholder="합본.epub">
        </div>
    </div>

    <button class="action-btn" onclick="generateMergedEpub()">모두 통합하여 합치기</button>
    <div class="status-log" id="log-box"></div>

    <script>
        let selectedFiles = [];
        const fileInput = document.getElementById('file-input');
        const fileListUI = document.getElementById('file-list');
        const logBox = document.getElementById('log-box');
        const metaTitle = document.getElementById('meta-title');
        const metaFilename = document.getElementById('meta-filename');

        function log(msg) {
            logBox.style.display = 'block';
            logBox.innerHTML += msg + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        fileInput.addEventListener('change', (e) => {
            for(let i=0; i<e.target.files.length; i++) {
                selectedFiles.push(e.target.files[i]);
            }
            updateUI();
        });

        function updateUI() {
            fileListUI.innerHTML = '';
            selectedFiles.forEach((file, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>📖 [${idx+1}권] ${file.name}</span><span style="color:#ff6b6b; cursor:pointer; padding:5px;" onclick="removeFile(${idx})">❌</span>`;
                fileListUI.appendChild(li);
            });

            if(selectedFiles.length > 0 && !metaTitle.value) {
                let baseName = selectedFiles[0].name.replace('.epub', '').replace(/[0-9]+권/g, '').trim();
                metaTitle.value = baseName;
                metaFilename.value = `${baseName} 1-${selectedFiles.length}권 합본.epub`;
            }
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            updateUI();
        }

        async function generateMergedEpub() {
            if(selectedFiles.length === 0) return alert("합칠 EPUB 파일을 선택해 주세요.");

            logBox.innerHTML = '';
            log("⏳ 합권 프로세스 시작 (통합 목차 엔진 가동)...");

            try {
                const finalZip = new JSZip();
                finalZip.file("mimetype", "application/epub+zip", {compression: "STORE"});
                finalZip.file("META-INF/container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

                let masterManifest = '';
                let masterSpine = '';
                let masterNavPoints = ''; 
                let finalCoverId = '';

                // 파일 원본 순서 유지
                const filesToMerge = selectedFiles;

                for(let i=0; i<filesToMerge.length; i++) {
                    const file = filesToMerge[i];
                    log(`📦 [${i+1}/${filesToMerge.length}] '${file.name}' 내부 스캔 중...`);
                    
                    const zip = await JSZip.loadAsync(file);
                    const containerText = await zip.file("META-INF/container.xml").async("text");
                    const opfPath = containerText.match(/full-path="([^"]+)"/)[1];
                    const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')) + '/' : '';
                    
                    const opfText = await zip.file(opfPath).async("text");
                    const parser = new DOMParser();
                    const opfDoc = parser.parseFromString(opfText, "text/xml");

                    const prefix = `b${i+1}`; 

                    if (i === 0) {
                        let coverMeta = opfDoc.querySelector('meta[name="cover"]');
                        if(coverMeta) finalCoverId = `${prefix}_${coverMeta.getAttribute('content')}`;
                    }

                    opfDoc.querySelectorAll('manifest > item').forEach(item => {
                        const id = item.getAttribute('id');
                        const href = item.getAttribute('href');
                        const media = item.getAttribute('media-type');
                        
                        if(media === "application/x-dtbncx+xml") return; 

                        const newId = `${prefix}_${id}`;
                        const newHref = `${prefix}/${href}`;

                        const originPath = opfDir + href;
                        const originFile = zip.file(originPath) || zip.file(decodeURIComponent(originPath));
                        
                        if(originFile) {
                            finalZip.file(`OEBPS/${newHref}`, originFile.async("blob"));
                            masterManifest += `    <item id="${newId}" href="${newHref}" media-type="${media}" />\n`;
                        }
                    });

                    let firstSpineHref = '';
                    opfDoc.querySelectorAll('spine > itemref').forEach((itemref, idx) => {
                        const idref = itemref.getAttribute('idref');
                        masterSpine += `    <itemref idref="${prefix}_${idref}" />\n`;
                        if(idx === 0) {
                            const fItem = opfDoc.querySelector(`manifest > item[id="${idref}"]`);
                            if(fItem) firstSpineHref = `${prefix}/${fItem.getAttribute('href')}`;
                        }
                    });

                    let bookTitle = opfDoc.querySelector('dc\\:title, title')?.textContent || `${i+1}권`;
                    let ncxItem = opfDoc.querySelector('manifest > item[media-type="application/x-dtbncx+xml"]');
                    let navPointContent = '';

                    if (ncxItem) {
                        let ncxHref = ncxItem.getAttribute('href');
                        let ncxFile = zip.file(opfDir + ncxHref) || zip.file(decodeURIComponent(opfDir + ncxHref));
                        if(ncxFile) {
                            let ncxText = await ncxFile.async("text");
                            let ncxDoc = parser.parseFromString(ncxText, "text/xml");
                            let serializer = new XMLSerializer();
                            
                            function processNode(node) {
                                let children = Array.from(node.childNodes).filter(n => n.nodeName === 'navPoint');
                                
                                children.forEach(child => {
                                    let title = child.querySelector('navLabel > text')?.textContent?.trim() || '';
                                    let cleanTitle = title.replace(/\s+/g, '');
                                    let cleanBookTitle = bookTitle.trim().replace(/\s+/g, '');
                                    let hasGrandChildren = child.querySelector('navPoint') !== null;

                                    if (hasGrandChildren && (cleanTitle === cleanBookTitle || cleanBookTitle.includes(cleanTitle) || cleanTitle.includes(cleanBookTitle))) {
                                        processNode(child);
                                    } else {
                                        // [핵심 업데이트] 목차 챕터 목록에서 제외할 키워드 필터링 추가
                                        const skipKeywords = ["판권", "저작권", "copyright", "표제지", "안내", "표지"];
                                        if (skipKeywords.some(keyword => cleanTitle.includes(keyword))) {
                                            if (hasGrandChildren) {
                                                processNode(child);
                                            }
                                            return; // 목차 트리 생성 패스 (숨김 처리)
                                        }

                                        let cloned = child.cloneNode(true);
                                        cloned.querySelectorAll('navPoint').forEach(n => n.remove());
                                        
                                        let srcElement = cloned.querySelector('content');
                                        if (srcElement) {
                                            let src = srcElement.getAttribute('src');
                                            if (src && !src.startsWith(`${prefix}/`)) {
                                                srcElement.setAttribute('src', `${prefix}/${src}`);
                                            }
                                        }

                                        let childStr = serializer.serializeToString(cloned);
                                        childStr = childStr.replace(/id="([^"]+)"/g, `id="${prefix}_$1"`);
                                        navPointContent += '    ' + childStr + '\n';
                                        
                                        if (hasGrandChildren) {
                                            processNode(child);
                                        }
                                    }
                                });
                            }

                            let navMap = ncxDoc.querySelector('navMap');
                            if (navMap) {
                                processNode(navMap);
                            }
                        }
                    }

                    masterNavPoints += `
                        <navPoint id="vol_${prefix}">
                            <navLabel><text>${bookTitle}</text></navLabel>
                            <content src="${firstSpineHref}"/>
                            ${navPointContent}
                        </navPoint>
                    `;
                }

                log("⚡ 통합 계층 목차(Table of Contents) 재작성 중...");
                const finalTitle = metaTitle.value.trim() || `합본 결과물`;
                let unifiedNcx = `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
  <head><meta name="dtb:uid" content="urn:uuid:${Date.now()}"/></head>
  <docTitle><text>${finalTitle}</text></docTitle>
  <navMap>${masterNavPoints}</navMap>
</ncx>`;
                finalZip.file("OEBPS/toc.ncx", unifiedNcx);

                let opfTemplate = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="2.0">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:title>${finalTitle}</dc:title>
    <dc:language>ko</dc:language>
    ${finalCoverId ? `<meta name="cover" content="${finalCoverId}"/>` : ''}
  </metadata>
  <manifest>
    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml" />
${masterManifest}
  </manifest>
  <spine toc="ncx">
${masterSpine}
  </spine>
</package>`;
                finalZip.file("OEBPS/content.opf", opfTemplate);

                const finalDownloadName = metaFilename.value.trim() || `합본_${Date.now()}.epub`;
                const content = await finalZip.generateAsync({type:"uint8array"});
                const epubBlob = new Blob([content], { type: "application/epub+zip" });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(epubBlob);
                link.download = finalDownloadName.endsWith('.epub') ? finalDownloadName : finalDownloadName + '.epub';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                log("🎉 합권 완료! 불필요한 목차 레이어가 모두 정리되었습니다.");

            } catch (err) {
                log(`❌ 에러 발생: ${err.message}`);
                alert("처리 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
