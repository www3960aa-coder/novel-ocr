<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>📚 EPUB 만들기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  :root {
    --bg:#f0eee8; --card:#fff; --text:#1a1a1a; --subtext:#666;
    --accent:#2d6a4f; --border:#ddd; --input-bg:#fafaf8;
    --btn:#2d6a4f; --btn-text:#fff; --shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  [data-theme="dark"] {
    --bg:#141414; --card:#1e1e1e; --text:#e8e6e0; --subtext:#999;
    --accent:#52b788; --border:#333; --input-bg:#2a2a2a;
    --btn:#52b788; --btn-text:#0a0a0a; --shadow:0 2px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:0 0 80px; transition:background .3s,color .3s; }
  header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
  header h1 { font-size:18px; font-weight:700; }
  .theme-btn { background:none; border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:13px; color:var(--text); cursor:pointer; }
  .container { padding:16px; max-width:600px; margin:0 auto; }
  .card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .card-title { font-size:13px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px; }
  label { display:block; font-size:14px; color:var(--subtext); margin-bottom:6px; }
  input[type="text"] { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:10px; font-size:15px; background:var(--input-bg); color:var(--text); font-family:inherit; outline:none; transition:border-color .2s; }
  input[type="text"]:focus { border-color:var(--accent); }
  .file-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border:2px dashed var(--border); border-radius:12px; background:var(--input-bg); color:var(--subtext); font-size:14px; cursor:pointer; transition:border-color .2s,color .2s; }
  .file-btn:hover,.file-btn.has-file { border-color:var(--accent); color:var(--accent); }
  .file-btn.has-file { background:color-mix(in srgb,var(--accent) 8%,var(--input-bg)); }
  input[type="file"] { display:none; }
  .pattern-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:4px; }
  .pattern-chip { padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; background:var(--input-bg); color:var(--text); cursor:pointer; text-align:center; transition:all .15s; user-select:none; }
  .pattern-chip.active { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,var(--input-bg)); color:var(--accent); font-weight:700; }
  .info-box { background:color-mix(in srgb,var(--accent) 8%,var(--input-bg)); border:1px solid color-mix(in srgb,var(--accent) 25%,var(--border)); border-radius:10px; padding:12px 14px; font-size:13px; color:var(--subtext); line-height:1.6; }
  .info-box strong { color:var(--accent); }
  .make-btn { width:100%; padding:16px; background:var(--btn); color:var(--btn-text); border:none; border-radius:14px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .make-btn:active { opacity:.85; }
  .make-btn:disabled { opacity:.5; cursor:not-allowed; }
  .progress-wrap { display:none; margin-top:14px; }
  .progress-wrap.show { display:block; }
  .progress-bar-bg { width:100%; height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:0 0 8px; }
  .progress-bar { height:100%; background:var(--accent); border-radius:4px; width:0%; transition:width .3s; }
  .progress-text { font-size:13px; color:var(--subtext); text-align:center; }
  .result-box { display:none; text-align:center; padding:14px 0 4px; }
  .result-box.show { display:block; }
  .result-box .emoji { font-size:40px; margin-bottom:8px; }
  .result-box p { font-size:14px; color:var(--subtext); margin-bottom:14px; }
  .download-btn { display:inline-flex; align-items:center; gap:6px; padding:12px 24px; background:var(--accent); color:var(--btn-text); border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  .error-box { display:none; background:#fff0f0; border:1px solid #ffcdd2; border-radius:10px; padding:12px 14px; font-size:13px; color:#c62828; margin-top:12px; }
  .error-box.show { display:block; }
  [data-theme="dark"] .error-box { background:#2a1515; border-color:#5c2020; color:#ef9a9a; }
</style>
</head>
<body>
<header>
  <h1>📚 EPUB 만들기</h1>
  <button class="theme-btn" onclick="toggleTheme()">🌙 다크</button>
</header>
<div class="container">

  <div class="card">
    <div class="card-title">📝 작품 정보</div>
    <label>제목</label>
    <input type="text" id="title" placeholder="예: 개짓" style="margin-bottom:12px"/>
    <label>작가</label>
    <input type="text" id="author" placeholder="예: 김영한"/>
  </div>

  <div class="card">
    <div class="card-title">📄 TXT 파일</div>
    <label class="file-btn" id="txtLabel" for="txtFile">
      <span>📂</span> <span id="txtName">파일 선택</span>
    </label>
    <input type="file" id="txtFile" accept=".txt" onchange="onTxtSelect(this)"/>
  </div>

  <div class="card">
    <div class="card-title">🖼️ 표지 이미지 (선택)</div>
    <label class="file-btn" id="coverLabel" for="coverFile">
      <span>🖼️</span> <span id="coverName">이미지 선택 (jpg/png)</span>
    </label>
    <input type="file" id="coverFile" accept="image/*" onchange="onCoverSelect(this)"/>
  </div>

  <div class="card">
    <div class="card-title">🔍 챕터 구분 방식</div>
    <div class="pattern-grid">
      <div class="pattern-chip active" onclick="selectPattern(this,'auto')">🤖 자동감지</div>
      <div class="pattern-chip" onclick="selectPattern(this,'jeN')">제N화</div>
      <div class="pattern-chip" onclick="selectPattern(this,'Ndot')">N화. 제목</div>
      <div class="pattern-chip" onclick="selectPattern(this,'hashN')">#N화</div>
      <div class="pattern-chip" onclick="selectPattern(this,'Ndash')">N회 - 제목</div>
      <div class="pattern-chip" onclick="selectPattern(this,'equal')">균등분할</div>
    </div>
    <div id="equalCount" style="display:none;margin-top:12px">
      <label>총 화수</label>
      <input type="text" id="chapCount" placeholder="예: 233" style="margin-bottom:0"/>
    </div>
    <div id="detectedInfo" class="info-box" style="margin-top:12px;display:none"></div>
  </div>

  <div class="card">
    <button class="make-btn" id="makeBtn" onclick="makeEpub()">
      <span>✨</span> EPUB 만들기
    </button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">준비 중...</div>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox">
      <div class="emoji">🎉</div>
      <p id="resultText"></p>
      <button class="download-btn" id="downloadBtn">⬇️ EPUB 다운로드</button>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let selectedPattern = 'auto';
let txtContent = null, coverData = null, coverMime = 'image/jpeg', epubBlob = null;

function toggleTheme() {
  const d = document.documentElement;
  const isDark = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', isDark ? '' : 'dark');
  document.querySelector('.theme-btn').textContent = isDark ? '🌙 다크' : '☀️ 밝게';
}

function selectPattern(el, val) {
  document.querySelectorAll('.pattern-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedPattern = val;
  document.getElementById('equalCount').style.display = val === 'equal' ? 'block' : 'none';
  if (txtContent) detectChapters(txtContent);
}

function onTxtSelect(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('txtName').textContent = file.name;
  document.getElementById('txtLabel').classList.add('has-file');
  if (!document.getElementById('title').value) {
    document.getElementById('title').value = file.name.replace(/\.[^/.]+$/, '').replace(/[_\-]/g,' ').replace(/^\[.*?\]\s*/,'').trim();
  }
  const r = new FileReader();
  r.onload = e => { txtContent = e.target.result; detectChapters(txtContent); };
  r.readAsText(file, 'UTF-8');
}

function onCoverSelect(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('coverName').textContent = file.name;
  document.getElementById('coverLabel').classList.add('has-file');
  coverMime = file.type || 'image/jpeg';
  const r = new FileReader();
  r.onload = e => { coverData = e.target.result.split(',')[1]; };
  r.readAsDataURL(file);
}

const reMap = {
  jeN:   /^(제\d+화.*)$/m,
  Ndot:  /^(\d+화\..+)$/m,
  hashN: /^(#\d+화.*)$/m,
  Ndash: /^(\d+회\s*[-–].+)$/m,
};

function detectChapters(content) {
  let pat = selectedPattern;
  if (pat === 'auto') {
    let best = null, bestCount = 0;
    for (const [k, re] of Object.entries(reMap)) {
      const n = (content.match(new RegExp(re.source,'gm'))||[]).length;
      if (n > bestCount) { bestCount = n; best = k; }
    }
    pat = best || 'equal';
  }
  const box = document.getElementById('detectedInfo');
  box.style.display = 'block';
  if (pat === 'equal') { box.innerHTML = '<strong>균등분할 모드</strong> — 화수를 입력해주세요.'; return; }
  const matches = content.match(new RegExp(reMap[pat].source,'gm')) || [];
  box.innerHTML = matches.length > 0
    ? `<strong>${matches.length}개 챕터 감지됨</strong> (${matches[0]} ... ${matches[matches.length-1]})`
    : '⚠️ 챕터를 찾을 수 없어요. 다른 방식을 선택해보세요.';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function makeXhtml(title, body) {
  const ps = body.split('\n').map(p => { p=p.trim(); return p ? `<p>${esc(p)}</p>` : '<p class="blank"> </p>'; }).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko">
<head><meta charset="UTF-8"/><title>${esc(title)}</title>
<link rel="stylesheet" type="text/css" href="../Styles/style.css"/>
</head><body>
<h2 class="chapter-title">${esc(title)}</h2>
${ps}
</body></html>`;
}

function splitChapters(content) {
  let pat = selectedPattern;
  if (pat === 'auto') {
    let best = null, bestCount = 0;
    for (const [k, re] of Object.entries(reMap)) {
      const n = (content.match(new RegExp(re.source,'gm'))||[]).length;
      if (n > bestCount) { bestCount = n; best = k; }
    }
    pat = best || 'equal';
  }
  if (pat === 'equal') {
    const n = parseInt(document.getElementById('chapCount').value) || 100;
    const total = content.length, chunk = Math.floor(total/n);
    const chapters = []; let start = 0;
    for (let i = 0; i < n; i++) {
      const end = i===n-1 ? total : (() => {
        const target = start+chunk;
        const seg = content.substring(Math.max(start,target-500), Math.min(total,target+500));
        const idx = seg.lastIndexOf('\n\n', 500);
        return Math.max(start,target-500) + (idx>=0 ? idx+2 : 500);
      })();
      chapters.push([`제${i+1}화`, content.substring(start,end).trim()]);
      start = end;
    }
    return chapters;
  }
  const splits = [...content.matchAll(new RegExp(reMap[pat].source,'gm'))];
  if (!splits.length) throw new Error('챕터를 찾을 수 없어요. 다른 방식을 선택해보세요.');
  return splits.map((m,i) => [m[1].trim(), content.substring(m.index+m[0].length, i+1<splits.length?splits[i+1].index:content.length).trim()]);
}

async function makeEpub() {
  document.getElementById('errorBox').className = 'error-box';
  document.getElementById('resultBox').className = 'result-box';
  const title = document.getElementById('title').value.trim() || '무제';
  const author = document.getElementById('author').value.trim() || '작자미상';
  if (!txtContent) { showError('TXT 파일을 선택해주세요.'); return; }
  const btn = document.getElementById('makeBtn');
  btn.disabled = true;
  showProgress(0, '챕터 분석 중...');
  try {
    const chapters = splitChapters(txtContent);
    showProgress(10, `챕터 ${chapters.length}개 확인됨`);
    const css = `body{font-family:"나눔명조","NanumMyeongjo",Georgia,serif;font-size:1em;line-height:1.9;margin:1.5em 1.2em;color:#1a1a1a;background:#fffdf8;}
h2.chapter-title{font-size:1.1em;font-weight:bold;margin:1.5em 0 1em;text-align:center;border-bottom:1px solid #ccc;padding-bottom:.5em;}
p{margin:.3em 0;}p.blank{margin:.1em 0;color:transparent;}`;
    const hasCover = !!coverData;
    const uid = title.replace(/\s/g,'')+'-epub';
    const coverXhtml = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko"><head><meta charset="UTF-8"/><title>${esc(title)}</title><style>body{margin:0;padding:0;}img{width:100%;height:auto;display:block;}</style></head><body><img src="../Images/cover.jpg" alt="표지"/></body></html>`;
    const tocItems = chapters.map(([t,],i) => `    <navPoint id="np${i+1}" playOrder="${i+1}"><navLabel><text>${esc(t)}</text></navLabel><content src="Text/chap${String(i+1).padStart(4,'0')}.xhtml"/></navPoint>`).join('\n');
    const tocNcx = `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${esc(uid)}"/><meta name="dtb:depth" content="1"/><meta name="dtb:totalPageCount" content="0"/><meta name="dtb:maxPageNumber" content="0"/></head><docTitle><text>${esc(title)}</text></docTitle><navMap><navPoint id="np-cover" playOrder="0"><navLabel><text>표지</text></navLabel><content src="Text/cover.xhtml"/></navPoint>\n${tocItems}\n</navMap></ncx>`;
    const mi = [hasCover?`  <item id="cover-img" href="Images/cover.jpg" media-type="${coverMime}"/>`:'',`  <item id="cover" href="Text/cover.xhtml" media-type="application/xhtml+xml"/>`,`  <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>`,`  <item id="css" href="Styles/style.css" media-type="text/css"/>`,...chapters.map(([,],i)=>`  <item id="chap${String(i+1).padStart(4,'0')}" href="Text/chap${String(i+1).padStart(4,'0')}.xhtml" media-type="application/xhtml+xml"/>`)].filter(Boolean).join('\n');
    const si = [`    <itemref idref="cover"/>`,...chapters.map(([,],i)=>`    <itemref idref="chap${String(i+1).padStart(4,'0')}"/>`)].join('\n');
    const opf = `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="BookId" version="2.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf"><dc:title>${esc(title)}</dc:title><dc:creator opf:role="aut">${esc(author)}</dc:creator><dc:language>ko</dc:language><dc:identifier id="BookId">${esc(uid)}</dc:identifier>${hasCover?'<meta name="cover" content="cover-img"/>':''}</metadata><manifest>\n${mi}\n</manifest><spine toc="ncx">\n${si}\n</spine></package>`;
    const container = `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`;
    const zip = new JSZip();
    zip.file('mimetype','application/epub+zip',{compression:'STORE'});
    zip.file('META-INF/container.xml',container);
    zip.file('OEBPS/content.opf',opf);
    zip.file('OEBPS/toc.ncx',tocNcx);
    zip.file('OEBPS/Styles/style.css',css);
    zip.file('OEBPS/Text/cover.xhtml',coverXhtml);
    if (hasCover) zip.file('OEBPS/Images/cover.jpg',coverData,{base64:true});
    showProgress(20,'챕터 생성 중...');
    for (let i=0;i<chapters.length;i++) {
      zip.file(`OEBPS/Text/chap${String(i+1).padStart(4,'0')}.xhtml`, makeXhtml(chapters[i][0],chapters[i][1]));
      if (i%20===0) { showProgress(20+Math.floor(i/chapters.length*70),`챕터 생성 중... (${i+1}/${chapters.length})`); await new Promise(r=>setTimeout(r,0)); }
    }
    showProgress(90,'EPUB 압축 중...');
    await new Promise(r=>setTimeout(r,50));
    epubBlob = await zip.generateAsync({type:'blob',mimeType:'application/epub+zip'});
    showProgress(100,'완료!');
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('progressWrap').className='progress-wrap';
    document.getElementById('resultText').textContent=`${title} — ${chapters.length}화, ${(epubBlob.size/1024/1024).toFixed(1)} MB`;
    document.getElementById('downloadBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(epubBlob);a.download=`${title}.epub`;a.click();};
    document.getElementById('resultBox').className='result-box show';
  } catch(e) {
    document.getElementById('progressWrap').className='progress-wrap';
    showError(e.message||'오류가 발생했어요.');
  }
  btn.disabled=false;
}

function showProgress(pct,msg){document.getElementById('progressWrap').className='progress-wrap show';document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent=msg;}
function showError(msg){const b=document.getElementById('errorBox');b.textContent='⚠️ '+msg;b.className='error-box show';}
</script>
</body>
</html>
