<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EPUB 삽화/표지 용량 줄이기</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --soft: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a 40%, #111827);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }
    h1 {
      margin: 8px 0 6px;
      font-size: 1.6rem;
    }
    p { color: var(--muted); line-height: 1.55; }
    .card {
      background: rgba(17,24,39,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin: 14px 0;
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }
    label {
      display: block;
      font-size: .92rem;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 700;
    }
    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font-size: 1rem;
    }
    input[type="range"] { padding: 0; }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-row button {
      flex: 1 1 180px;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      color: white;
      border: none;
      font-weight: 800;
    }
    .secondary {
      background: #172033;
    }
    .dropzone {
      border: 2px dashed #475569;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      background: rgba(15,23,42,.7);
    }
    .dropzone.drag {
      border-color: var(--accent);
      background: rgba(14,165,233,.08);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .stat {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }
    .stat b {
      display: block;
      font-size: 1.05rem;
      margin-top: 4px;
      color: white;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .item {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      padding: 12px;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      align-items: center;
    }
    .item img {
      width: 92px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #111827;
    }
    .meta {
      display: grid;
      gap: 6px;
    }
    .meta small { color: var(--muted); }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: .78rem;
      border: 1px solid #334155;
      color: #cbd5e1;
      margin-right: 6px;
    }
    .save { color: #86efac; font-weight: 700; }
    .warn { color: #fcd34d; font-weight: 700; }
    .footer { text-align: center; font-size: .9rem; color: var(--muted); padding: 10px 0 30px; }
    a.inline { color: #7dd3fc; }
    @media (max-width: 560px) {
      .item { grid-template-columns: 1fr; }
      .item img { width: 100%; height: auto; max-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>EPUB 삽화/표지 용량 줄이기</h1>
    <p>
      폰에서도 돌아가게 만든 <b>로컬 HTML 툴</b>입니다. 이미지를 서버에 올리지 않고 브라우저 안에서만 압축합니다.
      표지/삽화 파일을 줄인 뒤 EPUB에 다시 넣으면 전체 용량을 꽤 줄일 수 있습니다.
    </p>

    <div class="card">
      <div class="dropzone" id="dropzone">
        <p><b>이미지 여러 장 선택</b></p>
        <p>표지 JPG/PNG, 삽화 JPG/PNG/WebP 업로드</p>
        <input id="fileInput" type="file" accept="image/*" multiple />
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="format">출력 포맷</label>
          <select id="format">
            <option value="image/webp">WebP (가장 추천)</option>
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG (손실 적음, 용량 큼)</option>
          </select>
        </div>
        <div>
          <label for="quality">품질</label>
          <input id="quality" type="range" min="0.4" max="1" value="0.78" step="0.01" />
          <div id="qualityText">0.78</div>
        </div>
        <div>
          <label for="maxWidth">최대 가로폭(px)</label>
          <input id="maxWidth" type="number" min="320" max="4000" value="1400" />
        </div>
        <div>
          <label for="coverMode">빠른 프리셋</label>
          <select id="coverMode">
            <option value="custom">직접 설정</option>
            <option value="cover">표지용 추천 (1600px / 0.82)</option>
            <option value="illustration">삽화용 추천 (1200px / 0.72)</option>
            <option value="ultra">초경량 (1000px / 0.62)</option>
          </select>
        </div>
      </div>
      <div class="btn-row" style="margin-top: 14px;">
        <button class="primary" id="processBtn">압축 시작</button>
        <button class="secondary" id="downloadAllBtn">결과 한 장씩 다운로드</button>
        <button class="secondary" id="clearBtn">목록 비우기</button>
      </div>
    </div>

    <div class="card">
      <div class="stats">
        <div class="stat">원본 합계<b id="totalOriginal">0 MB</b></div>
        <div class="stat">압축 합계<b id="totalCompressed">0 MB</b></div>
        <div class="stat">절감량<b id="savedAmount">0 MB</b></div>
        <div class="stat">절감률<b id="savedRate">0%</b></div>
      </div>
    </div>

    <div class="card">
      <div class="list" id="results"></div>
    </div>

    <div class="footer">
      EPUB 안에서 이미지 파일명만 맞춰 교체하면 바로 재조립하기 좋게 만들어졌습니다.
    </div>
  </div>

  <script>
    const state = {
      files: [],
      results: []
    };

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const quality = document.getElementById('quality');
    const qualityText = document.getElementById('qualityText');
    const maxWidth = document.getElementById('maxWidth');
    const format = document.getElementById('format');
    const coverMode = document.getElementById('coverMode');
    const resultsEl = document.getElementById('results');
    const dropzone = document.getElementById('dropzone');

    quality.addEventListener('input', () => {
      qualityText.textContent = Number(quality.value).toFixed(2);
    });

    coverMode.addEventListener('change', () => {
      const mode = coverMode.value;
      if (mode === 'cover') {
        maxWidth.value = 1600;
        quality.value = 0.82;
        format.value = 'image/jpeg';
      } else if (mode === 'illustration') {
        maxWidth.value = 1200;
        quality.value = 0.72;
        format.value = 'image/webp';
      } else if (mode === 'ultra') {
        maxWidth.value = 1000;
        quality.value = 0.62;
        format.value = 'image/webp';
      }
      qualityText.textContent = Number(quality.value).toFixed(2);
    });

    fileInput.addEventListener('change', (e) => {
      addFiles([...e.target.files]);
    });

    ['dragenter', 'dragover'].forEach(evt => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add('drag');
      });
    });
    ['dragleave', 'drop'].forEach(evt => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag');
      });
    });
    dropzone.addEventListener('drop', (e) => {
      addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
    });

    clearBtn.addEventListener('click', () => {
      state.files = [];
      state.results = [];
      fileInput.value = '';
      render();
    });

    processBtn.addEventListener('click', async () => {
      if (!state.files.length) {
        alert('먼저 이미지 파일을 넣어주세요.');
        return;
      }
      processBtn.disabled = true;
      processBtn.textContent = '압축 중...';
      state.results = [];
      try {
        for (const file of state.files) {
          const result = await compressImage(file);
          state.results.push(result);
          render();
        }
      } catch (err) {
        console.error(err);
        alert('압축 중 오류가 발생했습니다. 다른 이미지로 다시 시도해보세요.');
      } finally {
        processBtn.disabled = false;
        processBtn.textContent = '압축 시작';
        render();
      }
    });

    downloadAllBtn.addEventListener('click', async () => {
      if (!state.results.length) {
        alert('먼저 압축을 실행해주세요.');
        return;
      }
      for (const item of state.results) {
        downloadBlob(item.blob, item.outputName);
        await wait(180);
      }
    });

    function addFiles(files) {
      const onlyImages = files.filter(f => f.type.startsWith('image/'));
      state.files.push(...onlyImages);
      render();
    }

    function wait(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      let value = bytes;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return `${value.toFixed(value >= 10 || i === 0 ? 0 : 2)} ${units[i]}`;
    }

    function getExt(mime) {
      if (mime === 'image/webp') return 'webp';
      if (mime === 'image/jpeg') return 'jpg';
      if (mime === 'image/png') return 'png';
      return 'img';
    }

    function baseName(name) {
      const idx = name.lastIndexOf('.');
      return idx > 0 ? name.slice(0, idx) : name;
    }

    async function compressImage(file) {
      const bitmap = await createImageBitmap(file);
      let targetWidth = bitmap.width;
      let targetHeight = bitmap.height;
      const maxW = Number(maxWidth.value) || bitmap.width;

      if (bitmap.width > maxW) {
        const ratio = maxW / bitmap.width;
        targetWidth = Math.round(bitmap.width * ratio);
        targetHeight = Math.round(bitmap.height * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, targetWidth, targetHeight);
      ctx.drawImage(bitmap, 0, 0, targetWidth, targetHeight);

      const mime = format.value;
      const q = Number(quality.value);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, mime, q));
      const previewUrl = URL.createObjectURL(blob);
      const saved = file.size - blob.size;
      const percent = file.size > 0 ? ((saved / file.size) * 100) : 0;
      const outputName = `${baseName(file.name)}_optimized.${getExt(mime)}`;

      return {
        inputName: file.name,
        outputName,
        originalSize: file.size,
        compressedSize: blob.size,
        saved,
        percent,
        width: bitmap.width,
        height: bitmap.height,
        outWidth: targetWidth,
        outHeight: targetHeight,
        blob,
        previewUrl,
        mime
      };
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function render() {
      const originalTotal = state.results.length
        ? state.results.reduce((sum, item) => sum + item.originalSize, 0)
        : state.files.reduce((sum, file) => sum + file.size, 0);
      const compressedTotal = state.results.reduce((sum, item) => sum + item.compressedSize, 0);
      const saved = Math.max(0, originalTotal - compressedTotal);
      const rate = originalTotal ? (saved / originalTotal) * 100 : 0;

      document.getElementById('totalOriginal').textContent = formatBytes(originalTotal);
      document.getElementById('totalCompressed').textContent = formatBytes(compressedTotal);
      document.getElementById('savedAmount').textContent = formatBytes(saved);
      document.getElementById('savedRate').textContent = `${rate.toFixed(1)}%`;

      if (!state.files.length && !state.results.length) {
        resultsEl.innerHTML = '<p style="color:#94a3b8; margin:0;">아직 파일이 없습니다.</p>';
        return;
      }

      if (!state.results.length) {
        resultsEl.innerHTML = state.files.map(file => `
          <div class="item">
            <div style="display:flex;align-items:center;justify-content:center;height:120px;border-radius:12px;background:#111827;border:1px solid #334155;">🖼️</div>
            <div class="meta">
              <div><b>${escapeHtml(file.name)}</b></div>
              <small>${formatBytes(file.size)}</small>
              <div><span class="pill">대기 중</span></div>
            </div>
          </div>
        `).join('');
        return;
      }

      resultsEl.innerHTML = state.results.map((item, idx) => `
        <div class="item">
          <img src="${item.previewUrl}" alt="preview ${idx + 1}" />
          <div class="meta">
            <div><b>${escapeHtml(item.inputName)}</b></div>
            <small>${item.width}×${item.height} → ${item.outWidth}×${item.outHeight}</small>
            <small>${formatBytes(item.originalSize)} → ${formatBytes(item.compressedSize)}</small>
            <div>
              <span class="pill">${item.mime.replace('image/','').toUpperCase()}</span>
              <span class="${item.saved >= 0 ? 'save' : 'warn'}">
                ${item.saved >= 0 ? `${item.percent.toFixed(1)}% 절감` : '증가'}
              </span>
            </div>
            <div class="btn-row">
              <button class="primary" onclick="downloadOne(${idx})">${escapeHtml(item.outputName)} 다운로드</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>\"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
    }

    window.downloadOne = function(idx) {
      const item = state.results[idx];
      if (item) downloadBlob(item.blob, item.outputName);
    };

    render();
  </script>
</body>
</html>
