<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소설 추출기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
  :root {
    --bg:#0e0f13; --surface:#171920; --surface2:#1e2028; --border:#2a2d38;
    --accent:#c084fc; --accent2:#e879f9; --green:#4ade80; --red:#f87171;
    --text:#e2e4f0; --muted:#5a5f7a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 14px 80px;}
  body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:700px;height:500px;background:radial-gradient(ellipse,rgba(192,132,252,0.07) 0%,transparent 70%);
    pointer-events:none;z-index:0;}
  .wrapper{width:100%;max-width:740px;position:relative;z-index:1;}

  header{text-align:center;margin-bottom:22px;}
  h1{font-family:'Noto Serif KR',serif;font-size:clamp(20px,5vw,30px);font-weight:700;
    background:linear-gradient(135deg,#e2e4f0 0%,var(--accent) 60%,var(--accent2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px;}
  .subtitle{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;}

  /* Steps */
  .steps{display:flex;margin-bottom:18px;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .step{flex:1;padding:10px 6px;text-align:center;font-size:11px;color:var(--muted);
    transition:all 0.2s;border-right:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;}
  .step:last-child{border-right:none;}
  .step.active{background:rgba(192,132,252,0.12);color:var(--accent);font-weight:700;}
  .step.done{color:var(--green);}
  .step-icon{display:block;font-size:15px;margin-bottom:2px;}

  .panel{display:none;} .panel.active{display:block;}

  /* Upload */
  .upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:16px;
    padding:38px 20px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:14px;}
  .upload-zone:hover,.upload-zone.over{border-color:var(--accent);
    background:rgba(192,132,252,0.04);transform:translateY(-2px);}
  .uz-icon{font-size:36px;display:block;margin-bottom:10px;}
  .uz-title{font-size:15px;font-weight:700;margin-bottom:4px;}
  .uz-sub{font-size:12px;color:var(--muted);}

  /* Queue */
  .queue-wrap{display:none;margin-bottom:14px;}
  .queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .queue-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);}
  .queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
  .q-item{position:relative;border-radius:8px;overflow:hidden;
    border:1px solid var(--border);aspect-ratio:1;background:var(--surface2);}
  .q-item img{width:100%;height:100%;object-fit:cover;display:block;}
  .q-item .q-num{position:absolute;top:4px;left:5px;font-family:'JetBrains Mono',monospace;
    font-size:10px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 5px;border-radius:3px;}
  .q-item .q-status{position:absolute;bottom:0;left:0;right:0;
    font-size:10px;text-align:center;padding:3px;font-weight:700;}
  .q-status.pending{background:rgba(192,132,252,0.75);color:#fff;}
  .q-status.processing{background:rgba(251,191,36,0.9);color:#000;}
  .q-status.done{background:rgba(74,222,128,0.88);color:#000;}
  .q-status.error{background:rgba(248,113,113,0.88);color:#fff;}
  .q-item .q-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);
    display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
  .q-item:hover .q-overlay{opacity:1;}
  .q-del{background:rgba(248,113,113,0.85);border:none;color:#fff;
    width:28px;height:28px;border-radius:50%;font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}

  /* Progress */
  .prog-wrap{display:none;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:14px;margin-bottom:14px;}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .prog-bg{background:var(--border);border-radius:999px;height:5px;overflow:hidden;margin-bottom:6px;}
  .prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:999px;transition:width 0.3s;width:0%;}
  .prog-sub{font-size:11px;color:var(--muted);text-align:center;}

  /* Buttons */
  .btn{padding:9px 14px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);font-size:13px;
    font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;color:#fff;font-weight:700;}
  .btn.primary:hover{opacity:0.88;transform:translateY(-1px);}
  .btn.primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn.sm{padding:7px 11px;font-size:12px;}
  .btn.red{border-color:rgba(248,113,113,0.4);color:var(--red);}
  .btn.red:hover{background:rgba(248,113,113,0.1);}
  .btn.green{border-color:rgba(74,222,128,0.4);color:var(--green);}
  .btn.green:hover{background:rgba(74,222,128,0.08);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .spacer{flex:1;}
  .btn-add-more{display:none;width:100%;padding:10px;background:none;
    border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-size:13px;
    cursor:pointer;transition:all 0.2s;margin-bottom:14px;font-family:'Noto Sans KR',sans-serif;}
  .btn-add-more:hover{border-color:var(--accent);color:var(--accent);}

  /* Editor */
  .stats-bar{display:flex;gap:14px;margin-bottom:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-wrap:wrap;}
  .stat-val{color:var(--text);}
  .fix-cnt{color:var(--green);font-weight:700;}

  #editor{width:100%;min-height:360px;max-height:62vh;
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:16px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
    font-size:15px;line-height:1.9;resize:vertical;outline:none;
    transition:border-color 0.2s;overflow-y:auto;margin-bottom:10px;}
  #editor:focus{border-color:rgba(192,132,252,0.4);}
  #editor::-webkit-scrollbar{width:4px;}
  #editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* Fix log */
  .fix-log{display:none;background:var(--surface);border:1px solid rgba(74,222,128,0.25);
    border-radius:10px;overflow:hidden;margin-bottom:12px;max-height:200px;overflow-y:auto;}
  .fix-log::-webkit-scrollbar{width:4px;}
  .fix-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .fix-log-head{display:flex;align-items:center;justify-content:space-between;
    padding:8px 12px;background:rgba(74,222,128,0.08);
    border-bottom:1px solid rgba(74,222,128,0.15);position:sticky;top:0;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--green);}
  .fix-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;}
  .fix-item{display:flex;align-items:center;gap:8px;padding:7px 12px;
    border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;
    cursor:pointer;transition:background 0.15s;}
  .fix-item:hover{background:rgba(74,222,128,0.06);}
  .fix-item:last-child{border-bottom:none;}
  .fix-before{font-family:'JetBrains Mono',monospace;color:var(--red);text-decoration:line-through;flex-shrink:0;}
  .fix-arrow{color:var(--muted);flex-shrink:0;}
  .fix-after{font-family:'JetBrains Mono',monospace;color:var(--green);flex-shrink:0;}
  .fix-badge{margin-left:auto;background:rgba(74,222,128,0.15);color:var(--green);
    font-family:'JetBrains Mono',monospace;font-size:10px;
    padding:1px 6px;border-radius:999px;flex-shrink:0;}

  /* Save panel */
  .save-row{display:flex;gap:8px;align-items:center;}
  .save-input{flex:1;background:var(--surface);border:1px solid var(--border);
    border-radius:9px;padding:10px 13px;color:var(--text);
    font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;
    transition:border-color 0.2s;}
  .save-input:focus{border-color:var(--accent);}
  .save-input::placeholder{color:var(--muted);}

  .error-box{display:none;background:rgba(248,113,113,0.08);
    border:1px solid rgba(248,113,113,0.3);border-radius:10px;
    padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:12px;}
  .toast{position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%) translateY(70px);
    background:var(--accent);color:#000;font-weight:700;
    padding:9px 20px;border-radius:999px;font-size:13px;
    transition:transform 0.3s;z-index:9999;pointer-events:none;
    font-family:'Noto Sans KR',sans-serif;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>📖 소설 추출기</h1>
    <div class="subtitle">OCR · 교정 · TXT 저장</div>
  </header>

  <div class="steps">
    <div class="step active" id="step1"><span class="step-icon">📷</span>추출</div>
    <div class="step" id="step2"><span class="step-icon">✏️</span>편집</div>
    <div class="step" id="step3"><span class="step-icon">💾</span>저장</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- ── PANEL 1: OCR ── -->
  <div class="panel active" id="panel1">

    <div class="upload-zone" id="uploadZone">
      <span class="uz-icon">🖼️</span>
      <div class="uz-title">스크린샷 또는 TXT 파일을 올려주세요</div>
      <div class="uz-sub">여러 장 동시 선택 가능 · PNG · JPG · WEBP · TXT</div>
      <input type="file" id="fileInput" accept="image/*,.txt,text/plain" multiple style="display:none">
    </div>

    <button class="btn" style="width:100%;margin-bottom:14px;" onclick="openEmptyEditor()">✏️ 직접 입력하기 (빈 편집창 열기)</button>

    <div class="queue-wrap" id="queueWrap">
      <div class="queue-header">
        <span class="queue-label" id="queueLabel">IMAGES · 0장</span>
        <button class="btn sm red" onclick="clearQueue()">전체 삭제</button>
      </div>
      <div class="queue-grid" id="queueGrid"></div>
    </div>

    <button class="btn-add-more" id="btnAddMore" onclick="document.getElementById('moreInput').click()">+ 이미지 추가</button>
    <input type="file" id="moreInput" accept="image/*,.txt,text/plain" multiple style="display:none">

    <div class="prog-wrap" id="progWrap">
      <div class="prog-label">
        <span id="progStatus">처리 중...</span>
        <span id="progPct">0 / 0</span>
      </div>
      <div class="prog-bg"><div class="prog-bar" id="progBar"></div></div>
      <div class="prog-sub" id="progSub"></div>
    </div>

    <button class="btn primary" id="btnOCR" style="width:100%;padding:14px;font-size:15px;display:none;" onclick="runOCR()">
      🔍 텍스트 추출 시작
    </button>
  </div>

  <!-- ── PANEL 2: 편집 ── -->
  <div class="panel" id="panel2">

    <div class="btn-row">
      <button class="btn sm green" onclick="runCorrection()">✦ 자동 교정</button>
      <button class="btn sm" onclick="cleanSpacing()">↔ 공백</button>
      <button class="btn sm" onclick="cleanLines()">↕ 줄바꿈</button>
      <div class="spacer"></div>
      <button class="btn sm" onclick="showPanel(1)">← 다시 추출</button>
    </div>

    <div class="stats-bar">
      글자 <span class="stat-val" id="statChars">0</span>
      &nbsp;단어 <span class="stat-val" id="statWords">0</span>
      &nbsp;줄 <span class="stat-val" id="statLines">0</span>
      <span id="statFixWrap" style="display:none">&nbsp;교정 <span class="fix-cnt" id="statFixes">0</span>건</span>
    </div>

    <textarea id="editor" spellcheck="false" placeholder="텍스트를 편집하세요..."></textarea>

    <div class="fix-log" id="fixLog">
      <div class="fix-log-head">
        <span>✦ 교정 내역 · 클릭하면 위치 이동</span>
        <button class="fix-close" onclick="document.getElementById('fixLog').style.display='none'">×</button>
      </div>
      <div id="fixLogList"></div>
    </div>

    <button class="btn primary" style="width:100%;padding:13px;font-size:14px;" onclick="showPanel(3)">
      저장하기 →
    </button>
  </div>

  <!-- ── PANEL 3: 저장 ── -->
  <div class="panel" id="panel3">

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:16px;">SAVE</div>

      <div class="save-row" style="margin-bottom:12px;">
        <input class="save-input" id="saveFilename" type="text" placeholder="파일명 입력 (예: 소설_80화)">
        <button class="btn primary" onclick="saveTxt()" style="padding:10px 20px;white-space:nowrap;">💾 저장</button>
      </div>

      <button class="btn" style="width:100%;margin-bottom:8px;" onclick="showPanel(2)">← 편집으로 돌아가기</button>
      <button class="btn" style="width:100%;" onclick="resetAll()">처음부터 다시</button>
    </div>

  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const LANG = 'kor';
let fileQueue = [];

// ── 패널 전환 ──
function showPanel(n) {
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===n-1));
  document.querySelectorAll('.step').forEach((s,i) => {
    s.classList.remove('active','done');
    if(i===n-1) s.classList.add('active');
    else if(i<n-1) s.classList.add('done');
  });
  if(n===3) {
    const today = new Date();
    const ymd = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    if(!document.getElementById('saveFilename').value)
      document.getElementById('saveFilename').value = `소설_${ymd}`;
  }
}

// ── 업로드 ──
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('over'); if(e.dataTransfer.files.length) addFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', e => { if(e.target.files.length) addFiles(Array.from(e.target.files)); e.target.value=''; });
document.getElementById('moreInput').addEventListener('change', e => { if(e.target.files.length) addFiles(Array.from(e.target.files)); e.target.value=''; });

function addFiles(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  const txts = files.filter(f => f.type === 'text/plain' || f.name.endsWith('.txt'));
  if(!imgs.length && !txts.length) { showError('이미지 또는 TXT 파일만 지원해요'); return; }
  hideError();

  // txt 파일은 바로 읽어서 편집창으로
  txts.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const current = document.getElementById('editor').value;
      document.getElementById('editor').value = current ? current + '\n\n---\n\n' + e.target.result.trim() : e.target.result.trim();
      updateStats();
      showPanel(2);
      showToast(`"${f.name}" 불러왔어요`);
    };
    reader.readAsText(f, 'utf-8');
  });

  // 이미지는 큐에 추가
  if(imgs.length) {
    imgs.forEach(f => fileQueue.push({ file:f, url:URL.createObjectURL(f), status:'pending', result:'' }));
    fileQueue.sort((a, b) => a.file.name.localeCompare(b.file.name));
    renderQueue(); updateUI();
  }
}

function renderQueue() {
  const grid = document.getElementById('queueGrid');
  grid.innerHTML = '';
  const labels = { pending:'대기', processing:'처리중', done:'완료', error:'오류' };
  fileQueue.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'q-item'; div.id = `qi-${i}`;
    div.innerHTML = `
      <img src="${item.url}">
      <span class="q-num">${i+1}</span>
      <div class="q-overlay">
        <button class="q-del" onclick="removeItem(${i})">✕</button>
      </div>
      <div class="q-status ${item.status}">${labels[item.status]}</div>`;
    grid.appendChild(div);
  });
  document.getElementById('queueLabel').textContent = `IMAGES · ${fileQueue.length}장`;
}

function updateItemStatus(i, status) {
  fileQueue[i].status = status;
  const el = document.getElementById(`qi-${i}`); if(!el) return;
  const labels = { pending:'대기', processing:'처리중', done:'완료', error:'오류' };
  const s = el.querySelector('.q-status');
  s.className = `q-status ${status}`; s.textContent = labels[status];
}

function removeItem(i) {
  URL.revokeObjectURL(fileQueue[i].url); fileQueue.splice(i,1);
  renderQueue(); updateUI();
}

function clearQueue() {
  fileQueue.forEach(f => URL.revokeObjectURL(f.url)); fileQueue = [];
  renderQueue(); updateUI();
}

function updateUI() {
  const has = fileQueue.length > 0;
  document.getElementById('queueWrap').style.display = has ? 'block' : 'none';
  document.getElementById('btnAddMore').style.display = has ? 'block' : 'none';
  document.getElementById('btnOCR').style.display = has ? 'block' : 'none';
}

function openEmptyEditor() {
  document.getElementById('editor').value = '';
  updateStats();
  showPanel(2);
}

// ── OCR ──
async function runOCR() {
  if(!fileQueue.length) return;
  const btn = document.getElementById('btnOCR');
  btn.disabled = true; hideError();
  fileQueue.forEach(item => { item.status='pending'; item.result=''; });
  renderQueue();

  const pw=document.getElementById('progWrap'), pb=document.getElementById('progBar');
  const ps=document.getElementById('progStatus'), pp=document.getElementById('progPct'), psub=document.getElementById('progSub');
  pw.style.display = 'block';

  const total = fileQueue.length; let anySuccess = false;
  for(let i=0; i<total; i++) {
    updateItemStatus(i, 'processing');
    ps.textContent = `처리 중... (${i+1}/${total})`;
    pp.textContent = `${i+1} / ${total}`;
    psub.textContent = fileQueue[i].file.name;
    try {
      const res = await Tesseract.recognize(fileQueue[i].file, LANG, {
        logger: m => { if(m.status==='recognizing text') pb.style.width=((i+m.progress)/total*100)+'%'; }
      });
      fileQueue[i].result = res.data.text.trim();
      updateItemStatus(i, fileQueue[i].result ? 'done' : 'error');
      if(fileQueue[i].result) anySuccess = true;
    } catch { updateItemStatus(i, 'error'); }
    pb.style.width = ((i+1)/total*100) + '%';
  }

  pw.style.display = 'none'; btn.disabled = false;

  if(anySuccess) {
    const combined = fileQueue.filter(f=>f.result).map(f=>f.result).join('\n\n---\n\n');
    document.getElementById('editor').value = combined;
    updateStats();
    showPanel(2);
    showToast('추출 완료! 편집해주세요 ✦');
  } else {
    showError('텍스트를 인식하지 못했어요. 다시 시도해보세요.');
  }
}

// ── 편집 ──
document.getElementById('editor').addEventListener('input', updateStats);

function updateStats() {
  const text = document.getElementById('editor').value;
  document.getElementById('statChars').textContent = text.length.toLocaleString();
  document.getElementById('statWords').textContent = text.trim() ? text.trim().split(/\s+/).length.toLocaleString() : '0';
  document.getElementById('statLines').textContent = text.split('\n').length.toLocaleString();
}

// ── 교정 규칙 ──
const RULES = [
  // OCR 오인식
  {f:/\b0(?=[A-Za-z가-힣])/g, t:'O', label:'0→O'},
  {f:/(?<=[A-Za-z가-힣])0\b/g, t:'O', label:'0→O'},
  // Q&A 오인식
  {f:/\^\./g, t:'A.', label:'^.→A.'},
  {f:/\(\)\./g, t:'Q.', label:'().→Q.'},
  {f:/A\|/g, t:'A.', label:'A|→A.'},
  {f:/^2\./gm, t:'Q.', label:'2.→Q.'},
  // 자주 틀리는 맞춤법
  {f:/됬/g, t:'됐', label:'됬→됐'},
  {f:/안됬/g, t:'안됐', label:'안됬→안됐'},
  {f:/왠만/g, t:'웬만', label:'왠만→웬만'},
  {f:/어떻해/g, t:'어떡해', label:'어떻해→어떡해'},
  {f:/않되/g, t:'안 되', label:'않되→안 되'},
  {f:/않돼/g, t:'안 돼', label:'않돼→안 돼'},
  {f:/안되요/g, t:'안 돼요', label:'안되요→안 돼요'},
  {f:/안되/g, t:'안 돼', label:'안되→안 돼'},
  {f:/할께/g, t:'할게', label:'할께→할게'},
  {f:/할꺼/g, t:'할 거', label:'할꺼→할 거'},
  {f:/할껀데/g, t:'할 건데', label:'할껀데→할 건데'},
  {f:/것같/g, t:'것 같', label:'것같→것 같'},
  {f:/수있/g, t:'수 있', label:'수있→수 있'},
  {f:/수없/g, t:'수 없', label:'수없→수 없'},
  {f:/줄알/g, t:'줄 알', label:'줄알→줄 알'},
  {f:/바래/g, t:'바라', label:'바래→바라'},
  {f:/바랬/g, t:'바랐', label:'바랬→바랐'},
  {f:/하였/g, t:'했', label:'하였→했'},
  {f:/되어/g, t:'돼', label:'되어→돼'},
  {f:/되었/g, t:'됐', label:'되었→됐'},
  {f:/보여지/g, t:'보이', label:'보여지→보이'},
  {f:/느껴지/g, t:'느껴', label:'느껴지→느껴'},
  {f:/만들어지/g, t:'만들어', label:'만들어지→만들어'},
  {f:/시작하였/g, t:'시작했', label:'시작하였→시작했'},
  {f:/로써(?=\s*[은는이가을를])/g, t:'로서', label:'로써→로서'},
  // 띄어쓰기
  {f:/(\d)(개|명|장|권|번|층|호|원|년|월|일|시|분|초)/g, t:'$1 $2', label:'숫자+단위→숫자 단위'},
  // 중복 조사
  {f:/을를/g, t:'를', label:'을를→를'},
  {f:/이가/g, t:'가', label:'이가→가'},
  {f:/은는/g, t:'는', label:'은는→는'},

];

function runCorrection() {
  const editor = document.getElementById('editor');
  let text = editor.value; const log = [];
  RULES.forEach(rule => {
    let count = 0;
    const newText = text.replace(rule.f, (match,...args) => {
      count++;
      return rule.t.replace(/\$(\d)/g, (_,n) => args[parseInt(n)-1]||'');
    });
    if(count > 0) {
      const parts = rule.label.split('→');
      log.push({ before:parts[0], after:parts[1]||'(수정)', count });
      text = newText;
    }
  });
  editor.value = text; updateStats();
  if(!log.length) { showToast('교정할 항목이 없어요 👍'); return; }

  const total = log.reduce((s,l)=>s+l.count, 0);
  document.getElementById('statFixes').textContent = total;
  document.getElementById('statFixWrap').style.display = 'inline';

  const list = document.getElementById('fixLogList'); list.innerHTML = '';
  log.forEach(item => {
    const div = document.createElement('div'); div.className = 'fix-item';
    div.innerHTML = `
      <span class="fix-before">${escHtml(item.before)}</span>
      <span class="fix-arrow">→</span>
      <span class="fix-after">${escHtml(item.after)}</span>
      <span class="fix-badge">${item.count}건</span>`;
    div.addEventListener('click', () => jumpToWord(item.after));
    list.appendChild(div);
  });
  document.getElementById('fixLog').style.display = 'block';
  showToast(`${total}건 교정됐어요 ✦`);
}

function jumpToWord(word) {
  const editor = document.getElementById('editor');
  const text = editor.value;
  const from = editor.selectionEnd || 0;
  let idx = text.indexOf(word, from);
  if(idx === -1) idx = text.indexOf(word, 0);
  if(idx === -1) { showToast('해당 단어를 찾을 수 없어요'); return; }
  editor.focus();
  editor.setSelectionRange(idx, idx + word.length);
  const lh = parseInt(getComputedStyle(editor).lineHeight) || 28;
  const lines = text.substring(0, idx).split('\n').length;
  editor.scrollTop = (lines - 3) * lh;
  showToast(`"${word}" 위치로 이동`);
}

function cleanSpacing() {
  const e = document.getElementById('editor');
  e.value = e.value.replace(/[ \t]{2,}/g,' ').split('\n').map(l=>l.trim()).join('\n');
  updateStats(); showToast('공백 정리 완료');
}

function cleanLines() {
  const e = document.getElementById('editor');
  e.value = e.value.replace(/\n{3,}/g,'\n\n');
  updateStats(); showToast('줄바꿈 정리 완료');
}

// ── 저장 ──
function saveTxt() {
  const text = document.getElementById('editor').value;
  if(!text.trim()) { showToast('저장할 내용이 없어요'); return; }
  let name = document.getElementById('saveFilename').value.trim() || '소설';
  if(!name.endsWith('.txt')) name += '.txt';
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
  a.download = name; a.click();
  showToast(`"${name}" 저장됐어요!`);
}

// ── 초기화 ──
function resetAll() {
  fileQueue.forEach(f => URL.revokeObjectURL(f.url)); fileQueue = [];
  document.getElementById('editor').value = '';
  document.getElementById('saveFilename').value = '';
  document.getElementById('fixLog').style.display = 'none';
  document.getElementById('statFixWrap').style.display = 'none';
  document.getElementById('progBar').style.width = '0%';
  renderQueue(); updateUI(); hideError(); showPanel(1);
}

function showError(msg) { const b=document.getElementById('errorBox'); b.textContent='⚠️ '+msg; b.style.display='block'; }
function hideError() { document.getElementById('errorBox').style.display='none'; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
