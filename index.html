<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹소설 OCR 추출기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --surface2: #242018;
    --border: #3a3428;
    --accent: #c9a84c;
    --accent2: #e8c97a;
    --text: #e8e0d0;
    --text2: #9a8f7a;
    --danger: #c0392b;
    --success: #27ae60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 16px;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  header p {
    font-size: 0.8rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 12px auto;
  }

  /* 업로드 영역 */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    margin-bottom: 16px;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .upload-zone input {
    display: none;
  }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }

  .upload-zone h2 {
    font-size: 1rem;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .upload-zone p {
    font-size: 0.75rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  /* 미리보기 그리드 */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .preview-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 9/16;
    background: var(--surface);
  }

  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-item .status-badge {
    position: absolute;
    bottom: 4px;
    left: 4px;
    right: 4px;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
  }

  .status-badge.waiting { background: rgba(0,0,0,0.6); color: var(--text2); }
  .status-badge.processing { background: rgba(201,168,76,0.3); color: var(--accent2); }
  .status-badge.done { background: rgba(39,174,96,0.3); color: #2ecc71; }
  .status-badge.error { background: rgba(192,57,43,0.3); color: #e74c3c; }

  /* 버튼 */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #1a1400;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* 진행 상태 */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
    display: none;
  }

  /* 결과 영역 */
  .result-section {
    display: none;
    margin-top: 24px;
  }

  .result-section h3 {
    font-size: 0.9rem;
    color: var(--accent2);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }

  .tab-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: var(--surface2);
  }

  .result-textarea {
    width: 100%;
    min-height: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem;
    line-height: 1.8;
    padding: 16px;
    resize: vertical;
    outline: none;
    margin-bottom: 10px;
  }

  .result-textarea:focus {
    border-color: var(--accent);
  }

  .download-btns {
    display: flex;
    gap: 8px;
  }

  .download-btns .btn {
    flex: 1;
    padding: 10px;
    font-size: 0.85rem;
    margin-bottom: 0;
  }

  /* 개별 결과 */
  .individual-results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .individual-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .individual-item-header {
    padding: 10px 14px;
    background: var(--surface2);
    font-size: 0.75rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .individual-item-header button {
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .individual-item textarea {
    width: 100%;
    min-height: 120px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.82rem;
    line-height: 1.8;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.75rem;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  .count-badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.7rem;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>📖 웹소설 OCR 추출기</h1>
  <div class="divider"></div>
  <p>스크린샷 → 텍스트 → TXT 저장</p>
</header>

<div class="info-box">
  💡 스크린샷을 최대 10장까지 업로드하면<br>
  AI가 텍스트를 자동으로 추출해드려요.<br>
  장별 TXT + 전체 합본 TXT 모두 저장 가능!
</div>

<div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept="image/*" multiple>
  <div class="upload-icon">📂</div>
  <h2>여기를 눌러 선택하세요</h2>
  <p>최대 10장 · JPG / PNG / WEBP</p>
</div>

<div class="count-badge" id="countBadge" style="display:none"></div>

<div class="preview-grid" id="previewGrid"></div>

<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
</div>
<div class="progress-text" id="progressText"></div>

<button class="btn btn-primary" id="extractBtn" disabled onclick="startExtraction()">
  ✨ 텍스트 추출 시작
</button>

<button class="btn btn-secondary" id="clearBtn" style="display:none" onclick="clearAll()">
  🗑️ 전체 초기화
</button>

<div class="result-section" id="resultSection">
  <h3>📄 추출 결과</h3>

  <div class="result-tabs">
    <button class="tab-btn active" id="tab-combined" onclick="switchTab('combined')">전체 합본</button>
    <button class="tab-btn" id="tab-individual" onclick="switchTab('individual')">장별 보기</button>
  </div>

  <!-- 합본 -->
  <div id="view-combined">
    <textarea class="result-textarea" id="combinedText" placeholder="추출된 텍스트가 여기에 표시됩니다..."></textarea>
    <div class="download-btns">
      <button class="btn btn-primary" onclick="downloadCombined()">⬇️ 합본 TXT 저장</button>
      <button class="btn btn-secondary" onclick="copyCombined()">📋 복사</button>
    </div>
  </div>

  <!-- 장별 -->
  <div id="view-individual" style="display:none">
    <div class="individual-results" id="individualResults"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="downloadAll()">⬇️ 장별 TXT 전체 저장</button>
  </div>
</div>

<script>
  let images = []; // {file, name, dataUrl, text, status}
  let currentTab = 'combined';

  const fileInput = document.getElementById('fileInput');
  const previewGrid = document.getElementById('previewGrid');
  const extractBtn = document.getElementById('extractBtn');
  const clearBtn = document.getElementById('clearBtn');
  const countBadge = document.getElementById('countBadge');
  const uploadZone = document.getElementById('uploadZone');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const resultSection = document.getElementById('resultSection');

  // 드래그앤드롭
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    const newFiles = Array.from(files).slice(0, 10 - images.length);
    newFiles.forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ file, name: file.name, dataUrl: e.target.result, text: '', status: 'waiting' });
        renderPreviews();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPreviews() {
    previewGrid.innerHTML = '';
    images.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.innerHTML = `
        <img src="${img.dataUrl}" alt="${img.name}">
        <button class="remove-btn" onclick="removeImage(${i})">✕</button>
        <div class="status-badge ${img.status}">
          ${img.status === 'waiting' ? '대기중' :
            img.status === 'processing' ? '처리중...' :
            img.status === 'done' ? '완료 ✓' : '오류'}
        </div>
      `;
      previewGrid.appendChild(div);
    });

    const count = images.length;
    countBadge.style.display = count > 0 ? 'inline-block' : 'none';
    countBadge.textContent = `${count}장 선택됨`;
    extractBtn.disabled = count === 0;
    clearBtn.style.display = count > 0 ? 'block' : 'none';
    fileInput.value = '';
  }

  function removeImage(i) {
    images.splice(i, 1);
    renderPreviews();
  }

  function clearAll() {
    images = [];
    renderPreviews();
    resultSection.style.display = 'none';
    progressBar.style.display = 'none';
    progressText.style.display = 'none';
  }

  async function startExtraction() {
    if (images.length === 0) return;

    extractBtn.disabled = true;
    progressBar.style.display = 'block';
    progressText.style.display = 'block';
    resultSection.style.display = 'none';

    for (let i = 0; i < images.length; i++) {
      images[i].status = 'processing';
      renderPreviews();

      const pct = Math.round((i / images.length) * 100);
      progressFill.style.width = pct + '%';
      progressText.textContent = `처리 중... ${i + 1} / ${images.length}장`;

      try {
        const text = await extractText(images[i].dataUrl);
        images[i].text = text;
        images[i].status = 'done';
      } catch (e) {
        images[i].text = '[오류: 텍스트 추출 실패]';
        images[i].status = 'error';
      }

      renderPreviews();
    }

    progressFill.style.width = '100%';
    progressText.textContent = `완료! ${images.length}장 처리됨`;

    showResults();
    extractBtn.disabled = false;
  }

  async function extractText(dataUrl) {
    const base64 = dataUrl.split(',')[1];
    const mimeType = dataUrl.split(';')[0].split(':')[1];

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mimeType, data: base64 }
            },
            {
              type: 'text',
              text: '이 이미지는 웹소설 스크린샷입니다. 이미지에 있는 소설 본문 텍스트만 정확하게 추출해주세요. UI 요소(버튼, 메뉴, 제목 바 등)는 제외하고 소설 내용만 추출하세요. 줄바꿈은 원본 그대로 유지하세요. 다른 설명 없이 텍스트만 출력하세요.'
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.content[0].text;
  }

  function showResults() {
    resultSection.style.display = 'block';

    // 합본
    const combined = images.map((img, i) =>
      `[${i + 1}장]\n${img.text}`
    ).join('\n\n---\n\n');
    document.getElementById('combinedText').value = combined;

    // 장별
    const container = document.getElementById('individualResults');
    container.innerHTML = '';
    images.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'individual-item';
      div.innerHTML = `
        <div class="individual-item-header">
          <span>${i + 1}장 · ${img.name}</span>
          <button onclick="downloadSingle(${i})">⬇️ TXT 저장</button>
        </div>
        <textarea id="text-${i}">${img.text}</textarea>
      `;
      container.appendChild(div);
    });

    resultSection.scrollIntoView({ behavior: 'smooth' });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-combined').classList.toggle('active', tab === 'combined');
    document.getElementById('tab-individual').classList.toggle('active', tab === 'individual');
    document.getElementById('view-combined').style.display = tab === 'combined' ? 'block' : 'none';
    document.getElementById('view-individual').style.display = tab === 'individual' ? 'block' : 'none';
  }

  function downloadCombined() {
    const text = document.getElementById('combinedText').value;
    downloadTxt(text, '웹소설_합본.txt');
  }

  function copyCombined() {
    const text = document.getElementById('combinedText').value;
    navigator.clipboard.writeText(text).then(() => alert('복사되었습니다!'));
  }

  function downloadSingle(i) {
    const text = document.getElementById(`text-${i}`).value;
    downloadTxt(text, `웹소설_${i + 1}장.txt`);
  }

  function downloadAll() {
    images.forEach((img, i) => {
      setTimeout(() => {
        const text = document.getElementById(`text-${i}`)?.value || img.text;
        downloadTxt(text, `웹소설_${i + 1}장.txt`);
      }, i * 300);
    });
  }

  function downloadTxt(text, filename) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
