async function startMerge() {
    const title = document.getElementById('mergeTitle').value.trim();
    if (!title) { alert('책 제목을 입력해주세요.'); return; }
    if (mergeEpubFiles.length < 2) { alert('EPUB 파일을 2개 이상 선택해주세요.'); return; }

    document.getElementById('loadingOverlay').style.display = 'flex';

    try {
        const zip = new JSZip();
        let allChapters = []; // { id, filename, title, content }
        let coverData = null;
        let coverMime = 'image/jpeg';
        let styleContent = '';
        let chapIdx = 0;

        // 표지 교체 파일 있으면 우선 사용
        if (mergeCoverFile) {
            coverMime = mergeCoverFile.type || 'image/jpeg';
            coverData = await mergeCoverFile.arrayBuffer();
        }

        for (const epubFile of mergeEpubFiles) {
            const epubZip = await JSZip.loadAsync(await epubFile.arrayBuffer());

            // OPF 경로 찾기
            const containerXml = await epubZip.file('META-INF/container.xml').async('string');
            const opfPath = containerXml.match(/full-path="([^"]+\.opf)"/)?.[1] || 'OEBPS/content.opf';
            const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

            // 스타일 가져오기 (첫번째 EPUB에서)
            if (!styleContent) {
                const opfContent = await epubZip.file(opfPath).async('string');
                const cssMatch = opfContent.match(/href="([^"]*\.css)"/);
                if (cssMatch) {
                    const cssPath = opfDir + cssMatch[1].replace('../', '');
                    const cssFile = epubZip.file(cssPath) || epubZip.file(cssMatch[1]);
                    if (cssFile) styleContent = await cssFile.async('string');
                }
            }

            // 표지 이미지 (첫번째 EPUB에서, 교체 없을 때)
            if (!coverData) {
                const imgExts = ['jpg', 'jpeg', 'png', 'webp'];
                for (const [path, file] of Object.entries(epubZip.files)) {
                    if (imgExts.some(ext => path.toLowerCase().endsWith(ext)) && path.toLowerCase().includes('cover')) {
                        coverData = await file.async('arraybuffer');
                        coverMime = path.toLowerCase().endsWith('png') ? 'image/png' : 'image/jpeg';
                        break;
                    }
                }
            }

            // 챕터 파싱 (spine 순서대로)
            const opfContent = await epubZip.file(opfPath).async('string');
            const manifestItems = {};
            const manifestRe = /<item\s[^>]*id="([^"]+)"[^>]*href="([^"]+)"[^>]*>/g;
            let mm;
            while ((mm = manifestRe.exec(opfContent)) !== null) {
                manifestItems[mm[1]] = mm[2];
            }
            const spineRe = /<itemref\s[^>]*idref="([^"]+)"/g;
            let sm;
            while ((sm = spineRe.exec(opfContent)) !== null) {
                const idref = sm[1];
                const href = manifestItems[idref];
                if (!href) continue;
                const fullPath = opfDir + href;
                const chapFile = epubZip.file(fullPath) || epubZip.file(href);
                if (!chapFile) continue;
                const content = await chapFile.async('string');

                // nav.xhtml / cover 등 건너뛰기
                if (href.includes('nav') || href.includes('cover_page') || href.includes('cover.xhtml')) continue;

                // h2 제목 추출
                const titleMatch = content.match(/<h2[^>]*>(.*?)<\/h2>/s);
                const chapTitle = titleMatch ? titleMatch[1].replace(/<[^>]+>/g, '') : `챕터 ${chapIdx + 1}`;

                // body 내용 추출
                const bodyMatch = content.match(/<body[^>]*>(.*?)<\/body>/s);
                const body = bodyMatch ? bodyMatch[1] : content;

                chapIdx++;
                const fname = `ch_${String(chapIdx).padStart(3, '0')}.xhtml`;
                allChapters.push({ id: `ch${chapIdx}`, filename: fname, title: chapTitle, body });
            }
        }

        // EPUB 빌드
        const coverExt = coverMime === 'image/png' ? 'png' : 'jpg';
        const bookId = 'merged-epub-' + Date.now();

        // mimetype
        zip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });

        // container.xml
        zip.file('META-INF/container.xml', `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles>
</container>`);

        // 표지
        if (coverData) zip.file(`OEBPS/images/cover.${coverExt}`, coverData);

        const HEAD = `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head>${styleContent ? `<style>${styleContent}</style>` : ''}</head><body>`;
        const FOOT = '</body></html>';

        // 표지 페이지
        zip.file('OEBPS/Text/cover.xhtml', HEAD + `<div style="margin:0;padding:0;"><img style="width:100%;height:auto;display:block;" src="../images/cover.${coverExt}" alt="표지"/></div>` + FOOT);

        // 챕터 파일
        allChapters.forEach(ch => {
            zip.file(`OEBPS/Text/${ch.filename}`, HEAD + ch.body + FOOT);
        });

        // nav.xhtml
        const navItems = ['      <li><a href="cover.xhtml">표지</a></li>',
            ...allChapters.map(ch => `      <li><a href="${ch.filename}">${ch.title}</a></li>`)].join('\n');
        zip.file('OEBPS/Text/nav.xhtml', `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ko">
<head><meta charset="UTF-8"/><title>목차</title></head>
<body><nav epub:type="toc" id="toc"><h1>목차</h1><ol>${navItems}</ol></nav></body></html>`);

        // toc.ncx
        const ncxPts = [
            `    <navPoint id="np-cover" playOrder="1"><navLabel><text>표지</text></navLabel><content src="Text/cover.xhtml"/></navPoint>`,
            ...allChapters.map((ch, i) => `    <navPoint id="np-${ch.id}" playOrder="${i+2}"><navLabel><text>${ch.title}</text></navLabel><content src="Text/${ch.filename}"/></navPoint>`)
        ].join('\n');
        zip.file('OEBPS/toc.ncx', `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
  <head><meta name="dtb:uid" content="${bookId}"/><meta name="dtb:depth" content="1"/>
  <meta name="dtb:totalPageCount" content="0"/><meta name="dtb:maxPageNumber" content="0"/></head>
  <docTitle><text>${title}</text></docTitle>
  <navMap>${ncxPts}</navMap>
</ncx>`);

        // content.opf
        const manifestItems2 = [
            `    <item id="cover-image" href="images/cover.${coverExt}" media-type="${coverMime}" properties="cover-image"/>`,
            `    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>`,
            `    <item id="nav" href="Text/nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>`,
            `    <item id="cover-page" href="Text/cover.xhtml" media-type="application/xhtml+xml"/>`,
            ...allChapters.map(ch => `    <item id="${ch.id}" href="Text/${ch.filename}" media-type="application/xhtml+xml"/>`)
        ].join('\n');
        const spineItems2 = ['    <itemref idref="cover-page"/>',
            ...allChapters.map(ch => `    <itemref idref="${ch.id}"/>`)].join('\n');
        const author = document.getElementById('mergeAuthor').value.trim();
        zip.file('OEBPS/content.opf', `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="book-id">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:title>${title}</dc:title>${author ? `<dc:creator>${author}</dc:creator>` : ''}
    <dc:language>ko</dc:language><dc:identifier id="book-id">${bookId}</dc:identifier>
    <meta property="dcterms:modified">${new Date().toISOString().slice(0,19)}Z</meta>
    <meta name="cover" content="cover-image"/>
  </metadata>
  <manifest>${manifestItems2}</manifest>
  <spine toc="ncx">${spineItems2}</spine>
</package>`);

        const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/epub+zip', compression: 'DEFLATE' });
        saveAs(blob, `${title}.epub`);
    } catch(e) {
        alert('합치기 실패: ' + e.message);
        console.error(e);
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

// ══ 검수 탭 ══════════════════════════════════════════
let checkFiles = [];

function handleCheckInput(files) {
    for (const f of files) checkFiles.push(f);
    const list = document.getElementById('checkFileList');
    list.innerHTML = '';
    checkFiles.forEach((f, i) => {
        const d = document.createElement('div');
        d.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f3f0ff;border:1px solid #ddd8f0;border-radius:6px;margin-bottom:4px;font-size:0.82rem;';
        d.innerHTML = `<span>${f.name.endsWith('.txt')?'📄':'📚'}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span><button onclick="checkFiles.splice(${i},1);handleCheckInput([])" style="padding:2px 8px;background:#ffeaea;color:#c44;border:none;border-radius:4px;cursor:pointer;font-size:0.78rem;min-width:auto;">✕</button>`;
        list.appendChild(d);
    });
}

// checker.html 이식 함수들
function ck_trimWhitespace(text) {
    return text.split('\n').map(l => l.trim().replace(/  +/g, ' ')).join('\n');
}
function ck_normalizeLineBreaks(text) { return text.replace(/\r\n|\r/g, '\n'); }
function ck_removeConsecutiveBlankLines(text, max=2) {
    return text.replace(new RegExp('\n{'+(max+1)+',}','g'), '\n'.repeat(max));
}
function ck_recognizeChapters(text) {
    const lines = text.split('\n');
    const chapters = [];
    const patterns = [
        { regex: /^[\s]*(?:제)?(\d+)\.[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*#[\s]*(?:제)?(\d+)[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*(?:제)?(\d+)(?:화|장)[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*(?:제)?(\d+)(?:권|부)[\s]*(.*)$/i, type:'book', en:1, et:2 },
        { regex: /^[\s]*(?:프롤로그|prologue)[\s]*(.*)$/i, type:'prologue', et:1 },
        { regex: /^[\s]*(?:에필로그|epilogue|후기)[\s]*(.*)$/i, type:'epilogue', et:1 },
        { regex: /^[\s]*(?:IF\s+)?(?:외전|스핀오프|side\s*story)[\s]*(?:(\d+)화?)?[\s]*(.*)$/i, type:'special', en:1, et:2 },
        { regex: /^[\s]*(?:특별편|특별외전|보너스|bonus)[\s]*(?:(\d+))?[\s]*(.*)$/i, type:'extra', en:1, et:2 },
        { regex: /^0[1-9][0-9]?$/, type:'episode_num' },
    ];
    lines.forEach((line, index) => {
        const t = line.trim();
        if (!t) return;
        // 0패딩 숫자 단독줄
        if (/^0[1-9][0-9]?$/.test(t)) {
            chapters.push({ type:'episode', number:parseInt(t,10), title:t, lineIndex:index, fullText:line });
            return;
        }
        for (const p of patterns) {
            if (p.type === 'episode_num') continue;
            const m = t.match(p.regex);
            if (m) {
                const number = p.en ? parseInt(m[p.en], 10) : undefined;
                const title = (p.et ? (m[p.et]||t).trim() : t) || t;
                chapters.push({ type:p.type, number, title, lineIndex:index, fullText:line });
                break;
            }
        }
    });
    return chapters;
}

function ck_removeDuplicateTOC(text) {
    // 완전히 동일한 텍스트 줄이 두 번 이상 나타나는 경우만 목차로 판단.
    // 화수 기반 연속 구조(1화, 2화, 3화...)는 중복 제거하지 않음.
    // 조건: 앞 200줄 안에 "제목 단독 줄"이 3줄 이상 연속하고,
    //       그 동일 줄들이 이후 본문에도 다시 등장할 때만 제거.
    const lines = text.split('\n');
    if (lines.length < 10) return { text, removed:0, tocCount:0 };

    // 앞부분 목차 구간 후보 탐지: 200줄 내에서 짧은 줄이 촘촘하게 나오는 구간
    let tocLines = [];
    let inToc = false, tocStart = -1, tocEnd = -1, blankStreak = 0;
    for (let i = 0; i < Math.min(lines.length, 200); i++) {
        const l = lines[i].trim();
        if (!l) { blankStreak++; if (blankStreak > 4 && inToc) break; continue; }
        blankStreak = 0;
        // 짧은 제목 줄 (60자 미만, 숫자/화/장/프롤/에필 포함)
        const isTocLike = l.length < 60 && (
            /^(?:제\s*)?\d+\s*[화장]/.test(l) ||
            /^#\s*\d+/.test(l) ||
            /^\d+\.\s*\S/.test(l) ||
            /^(?:프롤로그|에필로그|외전|번외|후기)/.test(l)
        );
        if (isTocLike) {
            if (!inToc) { inToc = true; tocStart = i; }
            tocLines.push(l);
            tocEnd = i;
        } else if (inToc) {
            // 비목차 줄이 나왔을 때 이미 3개 이상이면 구간 종료
            if (tocLines.length >= 3) break;
            inToc = false; tocLines = []; tocStart = -1;
        }
    }

    // 목차 줄이 3개 미만이면 처리 안 함
    if (tocLines.length < 3) return { text, removed:0, tocCount:0 };

    // 목차의 첫 번째 줄이 이후 본문에 다시 등장하는지 확인
    const firstTocLine = tocLines[0];
    let bodyStart = -1;
    for (let i = tocEnd + 1; i < lines.length; i++) {
        if (lines[i].trim() === firstTocLine) { bodyStart = i; break; }
    }

    // 재등장이 없으면 제거 안 함 (정상 목차 손실 방지)
    if (bodyStart < 0) return { text, removed:0, tocCount:0 };

    const rem = lines.slice(bodyStart);
    return { text: rem.join('\n'), removed: bodyStart, tocCount: tocLines.length };
}

function ck_validateEpisodes(chapters) {
    const issues = [], nums = [], map = new Map();
    chapters.forEach(ch => {
        if (ch.type==='episode' && ch.number!==undefined) {
            nums.push(ch.number);
            if (!map.has(ch.number)) map.set(ch.number,[]);
            map.get(ch.number).push(ch);
        }
    });
    map.forEach((matches, num) => {
        if (matches.length > 1)
            issues.push({ type:'dup', msg:`${num}화 ${matches.length}번 중복`, lines: matches.map(m=>m.lineIndex+1) });
    });
    // 제목 중복 체크
    const titleMap = new Map();
    chapters.forEach(ch => {
        const t = ch.title;
        if (!titleMap.has(t)) titleMap.set(t, 0);
        titleMap.set(t, titleMap.get(t)+1);
    });
    titleMap.forEach((cnt, title) => {
        if (cnt > 1 && !issues.some(i=>i.type==='dup'))
            issues.push({ type:'dup_title', msg:`"${title}" 제목 ${cnt}번 중복` });
    });
    const sorted = Array.from(new Set(nums)).sort((a,b)=>a-b);
    const missing = [];
    for (let i=0;i<sorted.length-1;i++)
        for (let j=sorted[i]+1;j<sorted[i+1];j++) missing.push(j);
    if (missing.length) issues.push({ type:'missing', msg:`${missing.length}개 누락`, episodes: missing });
    for (let i=0;i<nums.length-1;i++)
        if (nums[i]>nums[i+1]) { issues.push({ type:'order', msg:`정렬 이상: ${nums[i]}화→${nums[i+1]}화` }); break; }
    return { hasIssues: issues.length>0, issues, sorted, nums };
}

function itemBox(color, icon, text) {
    const bg = { ok:'#e8f5e0', warn:'#fff8e0', err:'#ffeaea' }[color];
    const bd = { ok:'#a8c898', warn:'#e0c850', err:'#e8b0b0' }[color];
    const tc = { ok:'#2a5a18', warn:'#7a5a00', err:'#c44' }[color];
    return `<div style="padding:6px 12px;background:${bg};border:1px solid ${bd};color:${tc};border-radius:6px;margin-bottom:4px;">${icon} ${text}</div>`;
}

async function ck_getOpfPath(zip) {
    const con = await zip.file('META-INF/container.xml').async('string');
    const m = con.match(/full-path="([^"]+)"/);
    return m ? m[1] : 'content.opf';
}

async function runCheck() {
    if (!checkFiles.length) { alert('파일을 먼저 올려주세요.'); return; }
    const out = document.getElementById('checkResult');
    out.innerHTML = '<div style="color:#888;font-size:0.85rem;">분석 중...</div>';
    let html = '';

    for (const f of checkFiles) {
        const isTxt = f.name.toLowerCase().endsWith('.txt');
        html += `<div style="font-weight:700;color:#5a3a9a;margin:14px 0 6px;font-size:0.9rem;">${isTxt?'📄':'📚'} ${f.name}</div>`;

        if (isTxt) {
            let text = await f.text();
            text = ck_normalizeLineBreaks(text);
            text = ck_trimWhitespace(text);
            text = ck_removeConsecutiveBlankLines(text);

            // 중복 목차 감지
            const tocResult = ck_removeDuplicateTOC(text);
            if (tocResult.removed > 0) {
                html += itemBox('warn', '⚠️', `목차 섹션 감지: ${tocResult.tocCount}개 항목, ${tocResult.removed}줄 제거됨`);
                text = tocResult.text;
            }

            const chapters = ck_recognizeChapters(text);
            const mainChs = chapters.filter(c=>c.type==='episode');
            const extChs = chapters.filter(c=>c.type==='special'||c.type==='extra');
            const prologues = chapters.filter(c=>c.type==='prologue'||c.type==='epilogue');

            html += itemBox('ok', '✅', `총 ${chapters.length}항목 — 본편 ${mainChs.length}화 · 외전 ${extChs.length}화 · 기타 ${prologues.length}`);

            if (chapters.length > 0) {
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues) {
                    html += itemBox('ok', '✅', `누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err', '❌', `중복: ${issue.msg} (${issue.lines.join(', ')}번 줄)`);
                        else if (issue.type==='missing') html += itemBox('err', '❌', `누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn', '⚠️', issue.msg);
                    });
                }
                // 범위 표시
                if (val.sorted && val.sorted.length > 0)
                    html += itemBox('warn', '📊', `범위: ${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화`);
            }

        } else {
            // EPUB
            try {
                const ab = await f.arrayBuffer();
                const zip = await JSZip.loadAsync(ab);
                const opfPath = await ck_getOpfPath(zip);
                const opf = await zip.file(opfPath).async('string');

                const titleM = opf.match(/<dc:title>([^<]*)<\/dc:title>/);
                const authorM = opf.match(/<dc:creator[^>]*>([^<]*)<\/dc:creator>/);
                const t = titleM?titleM[1].trim():'';
                const a = authorM?authorM[1].trim():'';
                html += t ? itemBox('ok','✅',`제목: ${t}`) : itemBox('err','❌','제목 없음');
                html += a ? itemBox('ok','✅',`작가: ${a}`) : itemBox('warn','⚠️','작가명 없음');

                const ncxFile = Object.keys(zip.files).find(n=>n.endsWith('.ncx'));
                let titles = [];
                if (ncxFile) {
                    const ncx = await zip.file(ncxFile).async('string');
                    titles = [...ncx.matchAll(/<text>([^<]+)<\/text>/g)].map(m=>m[1]);
                }
                const mainCnt = titles.filter(t=>!t.includes('외전')&&!t.includes('프롤')&&!t.includes('에필')&&/\d/.test(t)).length;
                const extCnt = titles.filter(t=>t.includes('외전')).length;
                html += itemBox('ok','✅',`총 ${titles.length}항목 — 본편 ${mainCnt} · 외전 ${extCnt}`);

                // 화수 검증
                const fakeText = titles.join('\n');
                const chapters = ck_recognizeChapters(fakeText);
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues && val.sorted && val.sorted.length>0) {
                    html += itemBox('ok','✅',`누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err','❌',`중복: ${issue.msg}`);
                        else if (issue.type==='missing') html += itemBox('err','❌',`누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn','⚠️',issue.msg);
                    });
                }
            } catch(e) {
                html += itemBox('err','❌',`오류: ${e.message}`);
            }
        }
    }
    out.innerHTML = html || '<div style="color:#888;">결과 없음</div>';
}
