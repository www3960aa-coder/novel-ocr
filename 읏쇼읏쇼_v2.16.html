let checkFiles = [];

function handleCheckInput(files) {
    for (const f of files) checkFiles.push(f);
    const list = document.getElementById('checkFileList');
    list.innerHTML = '';
    checkFiles.forEach((f, i) => {
        const d = document.createElement('div');
        d.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f3f0ff;border:1px solid #ddd8f0;border-radius:6px;margin-bottom:4px;font-size:0.82rem;';
        d.innerHTML = `<span>${f.name.endsWith('.txt')?'📄':'📚'}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span><button onclick="checkFiles.splice(${i},1);handleCheckInput([])" style="padding:2px 8px;background:#ffeaea;color:#c44;border:none;border-radius:4px;cursor:pointer;font-size:0.78rem;min-width:auto;">✕</button>`;
        list.appendChild(d);
    });
}

// checker.html 이식 함수들
function ck_trimWhitespace(text) {
    return text.split('\n').map(l => l.trim().replace(/  +/g, ' ')).join('\n');
}
function ck_normalizeLineBreaks(text) { return text.replace(/\r\n|\r/g, '\n'); }
function ck_removeConsecutiveBlankLines(text, max=2) {
    return text.replace(new RegExp('\n{'+(max+1)+',}','g'), '\n'.repeat(max));
}
function ck_recognizeChapters(text) {
    const lines = text.split('\n');
    const chapters = [];
    const patterns = [
        { regex: /^[\s]*(?:제)?(\d+)\.[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*#[\s]*(?:제)?(\d+)[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*(?:제)?(\d+)(?:화|장)[\s]*(.*)$/i, type:'episode', en:1, et:2 },
        { regex: /^[\s]*(?:제)?(\d+)(?:권|부)[\s]*(.*)$/i, type:'book', en:1, et:2 },
        { regex: /^[\s]*(?:프롤로그|prologue)[\s]*(.*)$/i, type:'prologue', et:1 },
        { regex: /^[\s]*(?:에필로그|epilogue|후기)[\s]*(.*)$/i, type:'epilogue', et:1 },
        { regex: /^[\s]*(?:IF\s+)?(?:외전|스핀오프|side\s*story)[\s]*(?:(\d+)화?)?[\s]*(.*)$/i, type:'special', en:1, et:2 },
        { regex: /^[\s]*(?:특별편|특별외전|보너스|bonus)[\s]*(?:(\d+))?[\s]*(.*)$/i, type:'extra', en:1, et:2 },
        { regex: /^0[1-9][0-9]?$/, type:'episode_num' },
    ];
    lines.forEach((line, index) => {
        const t = line.trim();
        if (!t) return;
        // 0패딩 숫자 단독줄
        if (/^0[1-9][0-9]?$/.test(t)) {
            chapters.push({ type:'episode', number:parseInt(t,10), title:t, lineIndex:index, fullText:line });
            return;
        }
        for (const p of patterns) {
            if (p.type === 'episode_num') continue;
            const m = t.match(p.regex);
            if (m) {
                const number = p.en ? parseInt(m[p.en], 10) : undefined;
                const title = (p.et ? (m[p.et]||t).trim() : t) || t;
                chapters.push({ type:p.type, number, title, lineIndex:index, fullText:line });
                break;
            }
        }
    });
    return chapters;
}

function ck_removeDuplicateTOC(text) {
    // 완전히 동일한 텍스트 줄이 두 번 이상 나타나는 경우만 목차로 판단.
    // 화수 기반 연속 구조(1화, 2화, 3화...)는 중복 제거하지 않음.
    // 조건: 앞 200줄 안에 "제목 단독 줄"이 3줄 이상 연속하고,
    //       그 동일 줄들이 이후 본문에도 다시 등장할 때만 제거.
    const lines = text.split('\n');
    if (lines.length < 10) return { text, removed:0, tocCount:0 };

    // 앞부분 목차 구간 후보 탐지: 200줄 내에서 짧은 줄이 촘촘하게 나오는 구간
    let tocLines = [];
    let inToc = false, tocStart = -1, tocEnd = -1, blankStreak = 0;
    for (let i = 0; i < Math.min(lines.length, 200); i++) {
        const l = lines[i].trim();
        if (!l) { blankStreak++; if (blankStreak > 4 && inToc) break; continue; }
        blankStreak = 0;
        // 짧은 제목 줄 (60자 미만, 숫자/화/장/프롤/에필 포함)
        const isTocLike = l.length < 60 && (
            /^(?:제\s*)?\d+\s*[화장]/.test(l) ||
            /^#\s*\d+/.test(l) ||
            /^\d+\.\s*\S/.test(l) ||
            /^(?:프롤로그|에필로그|외전|번외|후기)/.test(l)
        );
        if (isTocLike) {
            if (!inToc) { inToc = true; tocStart = i; }
            tocLines.push(l);
            tocEnd = i;
        } else if (inToc) {
            // 비목차 줄이 나왔을 때 이미 3개 이상이면 구간 종료
            if (tocLines.length >= 3) break;
            inToc = false; tocLines = []; tocStart = -1;
        }
    }

    // 목차 줄이 3개 미만이면 처리 안 함
    if (tocLines.length < 3) return { text, removed:0, tocCount:0 };

    // 목차의 첫 번째 줄이 이후 본문에 다시 등장하는지 확인
    const firstTocLine = tocLines[0];
    let bodyStart = -1;
    for (let i = tocEnd + 1; i < lines.length; i++) {
        if (lines[i].trim() === firstTocLine) { bodyStart = i; break; }
    }

    // 재등장이 없으면 제거 안 함 (정상 목차 손실 방지)
    if (bodyStart < 0) return { text, removed:0, tocCount:0 };

    const rem = lines.slice(bodyStart);
    return { text: rem.join('\n'), removed: bodyStart, tocCount: tocLines.length };
}

function ck_validateEpisodes(chapters) {
    const issues = [], nums = [], map = new Map();
    chapters.forEach(ch => {
        if (ch.type==='episode' && ch.number!==undefined) {
            nums.push(ch.number);
            if (!map.has(ch.number)) map.set(ch.number,[]);
            map.get(ch.number).push(ch);
        }
    });
    map.forEach((matches, num) => {
        if (matches.length > 1)
            issues.push({ type:'dup', msg:`${num}화 ${matches.length}번 중복`, lines: matches.map(m=>m.lineIndex+1) });
    });
    // 제목 중복 체크
    const titleMap = new Map();
    chapters.forEach(ch => {
        const t = ch.title;
        if (!titleMap.has(t)) titleMap.set(t, 0);
        titleMap.set(t, titleMap.get(t)+1);
    });
    titleMap.forEach((cnt, title) => {
        if (cnt > 1 && !issues.some(i=>i.type==='dup'))
            issues.push({ type:'dup_title', msg:`"${title}" 제목 ${cnt}번 중복` });
    });
    const sorted = Array.from(new Set(nums)).sort((a,b)=>a-b);
    const missing = [];
    for (let i=0;i<sorted.length-1;i++)
        for (let j=sorted[i]+1;j<sorted[i+1];j++) missing.push(j);
    if (missing.length) issues.push({ type:'missing', msg:`${missing.length}개 누락`, episodes: missing });
    for (let i=0;i<nums.length-1;i++)
        if (nums[i]>nums[i+1]) { issues.push({ type:'order', msg:`정렬 이상: ${nums[i]}화→${nums[i+1]}화` }); break; }
    return { hasIssues: issues.length>0, issues, sorted, nums };
}

function itemBox(color, icon, text) {
    const bg = { ok:'#e8f5e0', warn:'#fff8e0', err:'#ffeaea' }[color];
    const bd = { ok:'#a8c898', warn:'#e0c850', err:'#e8b0b0' }[color];
    const tc = { ok:'#2a5a18', warn:'#7a5a00', err:'#c44' }[color];
    return `<div style="padding:6px 12px;background:${bg};border:1px solid ${bd};color:${tc};border-radius:6px;margin-bottom:4px;">${icon} ${text}</div>`;
}

async function ck_getOpfPath(zip) {
    const con = await zip.file('META-INF/container.xml').async('string');
    const m = con.match(/full-path="([^"]+)"/);
    return m ? m[1] : 'content.opf';
}

async function runCheck() {
    if (!checkFiles.length) { alert('파일을 먼저 올려주세요.'); return; }
    const out = document.getElementById('checkResult');
    out.innerHTML = '<div style="color:#888;font-size:0.85rem;">분석 중...</div>';
    let html = '';

    for (const f of checkFiles) {
        const isTxt = f.name.toLowerCase().endsWith('.txt');
        html += `<div style="font-weight:700;color:#5a3a9a;margin:14px 0 6px;font-size:0.9rem;">${isTxt?'📄':'📚'} ${f.name}</div>`;

        if (isTxt) {
            let text = await f.text();
            text = ck_normalizeLineBreaks(text);
            text = ck_trimWhitespace(text);
            text = ck_removeConsecutiveBlankLines(text);

            // 중복 목차 감지
            const tocResult = ck_removeDuplicateTOC(text);
            if (tocResult.removed > 0) {
                html += itemBox('warn', '⚠️', `목차 섹션 감지: ${tocResult.tocCount}개 항목, ${tocResult.removed}줄 제거됨`);
                text = tocResult.text;
            }

            const chapters = ck_recognizeChapters(text);
            const mainChs = chapters.filter(c=>c.type==='episode');
            const extChs = chapters.filter(c=>c.type==='special'||c.type==='extra');
            const prologues = chapters.filter(c=>c.type==='prologue'||c.type==='epilogue');

            html += itemBox('ok', '✅', `총 ${chapters.length}항목 — 본편 ${mainChs.length}화 · 외전 ${extChs.length}화 · 기타 ${prologues.length}`);

            if (chapters.length > 0) {
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues) {
                    html += itemBox('ok', '✅', `누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err', '❌', `중복: ${issue.msg} (${issue.lines.join(', ')}번 줄)`);
                        else if (issue.type==='missing') html += itemBox('err', '❌', `누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn', '⚠️', issue.msg);
                    });
                }
                // 범위 표시
                if (val.sorted && val.sorted.length > 0)
                    html += itemBox('warn', '📊', `범위: ${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화`);
            }

        } else {
            // EPUB
            try {
                const ab = await f.arrayBuffer();
                const zip = await JSZip.loadAsync(ab);
                const opfPath = await ck_getOpfPath(zip);
                const opf = await zip.file(opfPath).async('string');

                const titleM = opf.match(/<dc:title>([^<]*)<\/dc:title>/);
                const authorM = opf.match(/<dc:creator[^>]*>([^<]*)<\/dc:creator>/);
                const t = titleM?titleM[1].trim():'';
                const a = authorM?authorM[1].trim():'';
                html += t ? itemBox('ok','✅',`제목: ${t}`) : itemBox('err','❌','제목 없음');
                html += a ? itemBox('ok','✅',`작가: ${a}`) : itemBox('warn','⚠️','작가명 없음');

                const ncxFile = Object.keys(zip.files).find(n=>n.endsWith('.ncx'));
                let titles = [];
                if (ncxFile) {
                    const ncx = await zip.file(ncxFile).async('string');
                    titles = [...ncx.matchAll(/<text>([^<]+)<\/text>/g)].map(m=>m[1]);
                }
                const mainCnt = titles.filter(t=>!t.includes('외전')&&!t.includes('프롤')&&!t.includes('에필')&&/\d/.test(t)).length;
                const extCnt = titles.filter(t=>t.includes('외전')).length;
                html += itemBox('ok','✅',`총 ${titles.length}항목 — 본편 ${mainCnt} · 외전 ${extCnt}`);

                // 화수 검증
                const fakeText = titles.join('\n');
                const chapters = ck_recognizeChapters(fakeText);
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues && val.sorted && val.sorted.length>0) {
                    html += itemBox('ok','✅',`누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err','❌',`중복: ${issue.msg}`);
                        else if (issue.type==='missing') html += itemBox('err','❌',`누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn','⚠️',issue.msg);
                    });
                }
            } catch(e) {
                html += itemBox('err','❌',`오류: ${e.message}`);
            }
        }
    }
    out.innerHTML = html || '<div style="color:#888;">결과 없음</div>';
}

            issues.push({ type:'dup_title', msg:`"${title}" 제목 ${cnt}번 중복` });
    });
    const sorted = Array.from(new Set(nums)).sort((a,b)=>a-b);
    const missing = [];
    for (let i=0;i<sorted.length-1;i++)
        for (let j=sorted[i]+1;j<sorted[i+1];j++) missing.push(j);
    if (missing.length) issues.push({ type:'missing', msg:`${missing.length}개 누락`, episodes: missing });
    for (let i=0;i<nums.length-1;i++)
        if (nums[i]>nums[i+1]) { issues.push({ type:'order', msg:`정렬 이상: ${nums[i]}화→${nums[i+1]}화` }); break; }
    return { hasIssues: issues.length>0, issues, sorted, nums };
}

function itemBox(color, icon, text) {
    const bg = { ok:'#e8f5e0', warn:'#fff8e0', err:'#ffeaea' }[color];
    const bd = { ok:'#a8c898', warn:'#e0c850', err:'#e8b0b0' }[color];
    const tc = { ok:'#2a5a18', warn:'#7a5a00', err:'#c44' }[color];
    return `<div style="padding:6px 12px;background:${bg};border:1px solid ${bd};color:${tc};border-radius:6px;margin-bottom:4px;">${icon} ${text}</div>`;
}

async function ck_getOpfPath(zip) {
    const con = await zip.file('META-INF/container.xml').async('string');
    const m = con.match(/full-path="([^"]+)"/);
    return m ? m[1] : 'content.opf';
}

async function runCheck() {
    if (!checkFiles.length) { alert('파일을 먼저 올려주세요.'); return; }
    const out = document.getElementById('checkResult');
    out.innerHTML = '<div style="color:#888;font-size:0.85rem;">분석 중...</div>';
    let html = '';

    for (const f of checkFiles) {
        const isTxt = f.name.toLowerCase().endsWith('.txt');
        html += `<div style="font-weight:700;color:#5a3a9a;margin:14px 0 6px;font-size:0.9rem;">${isTxt?'📄':'📚'} ${f.name}</div>`;

        if (isTxt) {
            let text = await f.text();
            text = ck_normalizeLineBreaks(text);
            text = ck_trimWhitespace(text);
            text = ck_removeConsecutiveBlankLines(text);

            // 중복 목차 감지
            const tocResult = ck_removeDuplicateTOC(text);
            if (tocResult.removed > 0) {
                html += itemBox('warn', '⚠️', `목차 섹션 감지: ${tocResult.tocCount}개 항목, ${tocResult.removed}줄 제거됨`);
                text = tocResult.text;
            }

            const chapters = ck_recognizeChapters(text);
            const mainChs = chapters.filter(c=>c.type==='episode');
            const extChs = chapters.filter(c=>c.type==='special'||c.type==='extra');
            const prologues = chapters.filter(c=>c.type==='prologue'||c.type==='epilogue');

            html += itemBox('ok', '✅', `총 ${chapters.length}항목 — 본편 ${mainChs.length}화 · 외전 ${extChs.length}화 · 기타 ${prologues.length}`);

            if (chapters.length > 0) {
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues) {
                    html += itemBox('ok', '✅', `누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err', '❌', `중복: ${issue.msg} (${issue.lines.join(', ')}번 줄)`);
                        else if (issue.type==='missing') html += itemBox('err', '❌', `누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn', '⚠️', issue.msg);
                    });
                }
                // 범위 표시
                if (val.sorted && val.sorted.length > 0)
                    html += itemBox('warn', '📊', `범위: ${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화`);
            }

        } else {
            // EPUB
            try {
                const ab = await f.arrayBuffer();
                const zip = await JSZip.loadAsync(ab);
                const opfPath = await ck_getOpfPath(zip);
                const opf = await zip.file(opfPath).async('string');

                const titleM = opf.match(/<dc:title>([^<]*)<\/dc:title>/);
                const authorM = opf.match(/<dc:creator[^>]*>([^<]*)<\/dc:creator>/);
                const t = titleM?titleM[1].trim():'';
                const a = authorM?authorM[1].trim():'';
                html += t ? itemBox('ok','✅',`제목: ${t}`) : itemBox('err','❌','제목 없음');
                html += a ? itemBox('ok','✅',`작가: ${a}`) : itemBox('warn','⚠️','작가명 없음');

                const ncxFile = Object.keys(zip.files).find(n=>n.endsWith('.ncx'));
                let titles = [];
                if (ncxFile) {
                    const ncx = await zip.file(ncxFile).async('string');
                    titles = [...ncx.matchAll(/<text>([^<]+)<\/text>/g)].map(m=>m[1]);
                }
                const mainCnt = titles.filter(t=>!t.includes('외전')&&!t.includes('프롤')&&!t.includes('에필')&&/\d/.test(t)).length;
                const extCnt = titles.filter(t=>t.includes('외전')).length;
                html += itemBox('ok','✅',`총 ${titles.length}항목 — 본편 ${mainCnt} · 외전 ${extCnt}`);

                // 화수 검증
                const fakeText = titles.join('\n');
                const chapters = ck_recognizeChapters(fakeText);
                const val = ck_validateEpisodes(chapters);
                if (!val.hasIssues && val.sorted && val.sorted.length>0) {
                    html += itemBox('ok','✅',`누락/중복 없음 (${val.sorted[0]}~${val.sorted[val.sorted.length-1]}화)`);
                } else {
                    val.issues.forEach(issue => {
                        if (issue.type==='dup') html += itemBox('err','❌',`중복: ${issue.msg}`);
                        else if (issue.type==='missing') html += itemBox('err','❌',`누락: ${issue.episodes.slice(0,20).join(', ')}화${issue.episodes.length>20?' 외 '+(issue.episodes.length-20)+'개':''}`);
                        else if (issue.type==='order') html += itemBox('warn','⚠️',issue.msg);
                    });
                }
            } catch(e) {
                html += itemBox('err','❌',`오류: ${e.message}`);
            }
        }
    }
    out.innerHTML = html || '<div style="color:#888;">결과 없음</div>';
}

</script>

<body>
<div class="container">
    <h2 style="text-align:center;">🔮 읏쇼읏쇼 v2.16 ✨</h2>
    <div style="text-align:center;font-size:0.8rem;color:#b19cd9;margin-bottom:15px;font-weight:600;">목차 기능 완전 개선 버전</div>
    <!-- 탭 네비게이션 -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('file')">📄 파일</button>
        <button class="tab-btn" onclick="switchTab('info')">📖 책 정보</button>
        
        <button class="tab-btn" onclick="switchTab('option')">🛠️ 설정</button>
        <button class="tab-btn" onclick="switchTab('check')">🔍 검수</button>
    </div>

    <!-- 탭 2: 책 정보 -->
    <div id="tab-info" class="tab-panel card" style="display:none;">
        <input id="title" type="text" placeholder="책 제목 (필수)">
        <input id="author" type="text" placeholder="작가명">
        <button class="btn-secondary" onclick="openModal()">⚙️ 목차 인식 패턴 설정</button>
        <div id="fileCount" class="file-count" style="display:none;"></div>
        <div id="tocRemovedNotice" style="display:none;font-size:0.78rem;color:#7a5a00;background:#fff8e0;border:1px solid #e0c850;border-radius:6px;padding:6px 10px;margin-top:6px;"></div>
        <div id="tocPreview"><div style="text-align:center;font-size:0.8rem;opacity:0.5;padding:20px;">원고를 선택해주세요.</div></div>
        <div id="mergeSection" style="display:none;">
            <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">
            <h3 style="margin-bottom:6px;">📑 챕터 병합</h3>
            <div style="font-size:0.78rem;color:#aaa;margin-bottom:8px;">체크 후 병합하면 하나의 챕터로 합쳐져요</div>
            <div id="mergeList" style="max-height:150px;overflow-y:auto;background:#fcfcff;border-radius:12px;padding:5px;border:1px inset #eee;margin-bottom:8px;"></div>
            <button class="btn-secondary" onclick="mergeSelected()">🔗 선택 챕터 병합</button>

    <!-- 탭 1: 파일 -->

    <!-- 탭 4: 설정 -->
    <div id="tab-option" class="tab-panel card" style="display:none;">
        <div class="settings-grid">
            <label class="opt-box"><input type="checkbox" id="imagePageMode"> 삽화 단독페이지</label>

            <label class="opt-box"><input type="checkbox" id="sideStoryGroup"> 외전 자동 분리</label>

        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0 12px;">
        <h3 style="margin-bottom:10px;">🔤 폰트 임베딩</h3>
        <div style="font-size:0.8rem;color:#aaa;margin-bottom:8px;">.ttf / .woff2 파일 업로드</div>
        <input type="file" id="fontFile" accept=".ttf,.woff2,.otf" style="display:none;" onchange="handleFont(this.files[0])">
        <label for="fontFile" class="file-btn" style="display:block;text-align:center;margin-bottom:0;">🔤 폰트 파일 선택</label>
        <div id="fontInfo" style="font-size:0.8rem;color:var(--p);text-align:center;margin-top:6px;display:none;"></div>
    </div>

<script>
let pastedCover = null;
let masterChapters = [];
let hiddenChapters = new Set(); // 목차에서 숨긴 챕터 인덱스
let dragSrcIndex = null;

    document.getElementById('bottomMerge').style.display = (name === 'merge') ? '' : 'none';
}

let masterImages = [];
let imgDragSrc = null;
let masterTexts = [];  // ✅ TXT 순서 관리
let txtDragSrc = null;

function escXml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}
function safeImgName(index, fileName) {
    const parts = fileName.split('.');
    const ext = parts.length > 1 ? parts[parts.length - 1].toLowerCase() : 'jpg';
    return `illust${index + 1}.${ext}`;
}
function sanitizeFileName(name) {
    return name.replace(/[\/\\:*?"<>|]/g, '_');
}

const GRAD_MAP = {
    none:     null,
    title:    'linear-gradient(135deg, #d0ccfa, #addfe9, #dca0e3)',
    purple:   'linear-gradient(180deg, #b19cd9, #ff9ec4)',
    rosegold: 'linear-gradient(180deg, #f4a9b8, #c9847a)',
    ocean:    'linear-gradient(180deg, #4facfe, #00f2c3)',
    coral:    'linear-gradient(180deg, #ff6b6b, #ffa07a)',
    mint:     'linear-gradient(180deg, #a8edea, #fed6e3)',
    emerald:  'linear-gradient(180deg, #43b89c, #0f9b8e)',
    sunset:   'linear-gradient(180deg, #fc5c7d, #6a3093)',
    peach:    'linear-gradient(180deg, #ffb347, #ffcc33)',
    dark:     'linear-gradient(180deg, #222222, #888888)',
    crimson:  'linear-gradient(180deg, #c0392b, #1a1a1a)',
};

    return val ? GRAD_MAP[val.value] : null;
}
function openGradModal() { document.getElementById('gradModal').style.display = 'flex'; }

// openModal은 아래 목차 줄 지정 블록에 정의됨
function closeModal() {
    document.getElementById('patternModal').style.display = 'none';
    if (masterTexts.length > 0) reparse();
}

// ── TXT 순서 관리 ──
function renderTxtPreview() {
    const preview = document.getElementById('txtPreview');
    const label = document.getElementById('txtListLabel');
    if (masterTexts.length <= 1) { preview.style.display = 'none'; label.style.display = 'none'; return; }
    preview.style.display = 'block';
    label.style.display = 'flex';
    preview.innerHTML = '';
    masterTexts.forEach((t, index) => {
        const item = document.createElement('div');
        item.className = 'txt-item';
        item.draggable = true;
        item.dataset.index = index;
        item.innerHTML = `<span class="drag-handle">⠿</span><span class="txt-name">${escXml(t.name)}</span>`;
        item.addEventListener('dragstart', e => {
            txtDragSrc = index;
            setTimeout(() => item.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.txt-item').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            document.querySelectorAll('.txt-item').forEach(el => el.classList.remove('drag-over'));
            item.classList.add('drag-over');
        });
        item.addEventListener('drop', e => {
            e.preventDefault();
            const targetIndex = parseInt(item.dataset.index);
            if (txtDragSrc === null || txtDragSrc === targetIndex) return;
            const moved = masterTexts.splice(txtDragSrc, 1)[0];
            masterTexts.splice(targetIndex, 0, moved);
            txtDragSrc = null;
            renderTxtPreview();
            reparse();
        });
        preview.appendChild(item);
    });
}

// ── 삽화 순서 관리 ──
function handleImages() {
    const files = Array.from(document.getElementById('images').files);
    if (!files.length) return;
    masterImages = files.map(f => ({ file: f, name: f.name, url: URL.createObjectURL(f) }));
    renderImgPreview();
}
function renderImgPreview() {
    const preview = document.getElementById('imgPreview');
    const label = document.getElementById('imgListLabel');
    if (!masterImages.length) { preview.style.display = 'none'; label.style.display = 'none'; return; }
    preview.style.display = 'block';
    label.style.display = 'flex';
    preview.innerHTML = '';
    masterImages.forEach((img, index) => {
        const item = document.createElement('div');
        item.className = 'img-item';
        item.draggable = true;
        item.dataset.index = index;
        item.innerHTML = `
            <span class="drag-handle">⠿</span>
            <img class="img-thumb" src="${img.url}" alt="">
            <span class="img-name" title="${escXml(img.name)}">${escXml(img.name)}</span>
            <span class="img-tag">IMG${index + 1}</span>`;
        item.addEventListener('dragstart', e => {
            imgDragSrc = index;
            setTimeout(() => item.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.img-item').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            document.querySelectorAll('.img-item').forEach(el => el.classList.remove('drag-over'));
            item.classList.add('drag-over');
        });
        item.addEventListener('drop', e => {
            e.preventDefault();
            const targetIndex = parseInt(item.dataset.index);
            if (imgDragSrc === null || imgDragSrc === targetIndex) return;
            const moved = masterImages.splice(imgDragSrc, 1)[0];
            masterImages.splice(targetIndex, 0, moved);
            imgDragSrc = null;
            renderImgPreview();
        });
        preview.appendChild(item);
    });
}

function handleCover(file) {
    if (!file) return;
    pastedCover = file;
    const reader = new FileReader();
    reader.onload = e => { const img = document.getElementById('coverPreview'); img.src = e.target.result; img.style.display = "block"; };
    window._savedCoverFile = file;
    reader.readAsDataURL(file);
}

async function handleFileSelection() {
    const textFiles = Array.from(document.getElementById("texts").files);
    if (textFiles.length === 0) return;
    textFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
    // ✅ 텍스트 내용 미리 읽어서 masterTexts에 저장
    masterTexts = [];
    let tocRemovedFiles = [];
    for (let f of textFiles) {
        try {
            let text = await f.text();
            // 중복 목차 섹션 자동 감지 및 제거
            if (typeof ck_removeDuplicateTOC === 'function') {
                const tocResult = ck_removeDuplicateTOC(text);
                if (tocResult.removed > 0) {
                    text = tocResult.text;
                    tocRemovedFiles.push(`${f.name}: 목차 ${tocResult.tocCount}항목 제거`);
                    masterTexts.push({ name: f.name, text, cleaned: true });
                    continue;
                }
            }
            masterTexts.push({ name: f.name, text, cleaned: false });
        } catch (e) {
            alert(`"${f.name}" 파일을 읽는 중 오류가 발생했습니다.\n${e.message}`);
        }
    }
    if (tocRemovedFiles.length > 0) {
        const notice = document.getElementById('tocRemovedNotice');
        if (notice) {
            notice.style.display = 'block';
            notice.textContent = '⚠️ 중복 목차 자동 제거: ' + tocRemovedFiles.join(' / ');
        }
    }
    renderTxtPreview();
    autoDetectPatterns(masterTexts);
    reparse();
}

// ✅ TXT 드래그 후 또는 패턴 변경 후 재파싱
function getSelectedTypes() {
    var boxes = document.querySelectorAll('.toc-type');
    if (boxes.length > 0) {
        return Array.from(boxes).filter(function(el){return el.checked;}).map(function(el){return el.value;});
    }
    // 기본값 (모달 열기 전에도 적용)
    return ['strict_hwa', 'strict_jang', 'sharp', 'dot', 'bracket', 'keywords'];
}

function autoDetectPatterns(texts) {
    var sample = "";
    texts.slice(0, 3).forEach(function(t) {
        var tlines = t.text.split("\n").slice(0, 100);
        sample += tlines.join("\n") + "\n";
    });
    var lines = sample.split("\n").map(function(l){ return l.trim(); }).filter(function(l){ return l && l.length < 40; });

    var found = {
        strict_hwa:  lines.some(function(l){ return /^(?:제\s*)?\d+\s*화|^EP\s+\d+|^Episode\s+\d+/.test(l); }),
        strict_jang: lines.some(function(l){ return /^(?:제\s*)?\d+\s*장/.test(l); }),
        sharp:       lines.some(function(l){ return /^#\s*\d+/.test(l); }),
        dot:         lines.some(function(l){ return /^\d+\.\s+\S/.test(l); }),
        bracket:     lines.some(function(l){ return /^\[\d+\]|^<\d+>|^<<|^《|^〈|^\[제/.test(l); }),
        bracket_hwa: lines.some(function(l){ return /^\[(?:제?\d+화|외전|에필|프롤)/.test(l); }),
        keywords:    lines.some(function(l){ return /^(?:프롤로그|에필로그|프롤|에필|외전|번외|후기|후일담|서장|종장|막간|인터루드|Prologue|Epilogue|Interlude)/.test(l); }),
    };
    found.numonly = lines.some(function(l){ return /^0[1-9][0-9]?$/.test(l.trim()); });
    var anyFound = Object.keys(found).some(function(k){ return found[k]; });
    if (!anyFound) { found.strict_hwa = true; found.sharp = true; found.bracket = true; found.bracket_hwa = true; found.keywords = true; }

    document.querySelectorAll(".toc-type").forEach(function(el) {
        el.checked = !!found[el.value];
    });
    return found;
}


function reparse() {
    const selectedTypes = getSelectedTypes();
    const isSerial = masterTexts.length > 1;
    masterChapters = [];

    const badge = document.getElementById('modeBadge');
    badge.style.display = 'inline-block';
    badge.textContent = isSerial ? '📚 연재본 모드' : '📖 단행본 모드';
    badge.className = 'mode-badge ' + (isSerial ? 'mode-serial' : 'mode-single');

    const fileCount = document.getElementById('fileCount');
    fileCount.style.display = 'block';
    fileCount.textContent = `📄 ${masterTexts.length}개 파일 선택됨`;

    {
        const rawName = masterTexts[0].name.replace(/\.txt$/i, "");
        const authorInput = document.getElementById('author');
        const titleInput = document.getElementById('title');
        let author = '', title = '';

        // 패턴 1: [작가명] 제목 또는 앞에 뭔가_[작가명] 제목
        const m1 = rawName.match(/\[(.+?)\]\s*(.+)$/);
        // 패턴 2: -작가명- 제목 또는 -작가명-_제목
        const m2 = rawName.match(/^-(.+?)-[_\s]+(.+)$/);
        // 패턴 3: _작가명_ 제목
        const m3 = rawName.match(/^[_\s]*(.+?)[_\s]+(.+)$/) && rawName.match(/^_(.+?)_[_\s]*(.+)$/);
        // 패턴 4: (작가명) 제목
        const m4 = rawName.match(/^\((.+?)\)\s*(.+)$/);

        if (m1) { author = m1[1]; title = m1[2]; }
        else if (m2) { author = m2[1]; title = m2[2]; }
        else if (rawName.match(/^_(.+?)_/)) { const mx = rawName.match(/^_(.+?)_[_\s]*(.+)$/); if(mx){author=mx[1];title=mx[2];} else title=rawName; }
        else if (m4) { author = m4[1]; title = m4[2]; }
        else { title = rawName; }

        // 제목에서 화수범위/외전표기만 제거, 권수(n권)는 유지
        title = title
            .replace(/\s*\d+[-~]\d+\s*(완결)?/g, '')
            .replace(/\s*외\d+/g, '')
            .replace(/\s*(에필로그?|에필|번외|특외)(\s|$)/g, ' ')
            .replace(/\s*완결\s*$/g, '')
            .replace(/\s*\(\d+\)\s*$/g, '')
            .replace(/[_]+/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (!authorInput.value.trim() && author) authorInput.value = author.trim();
        if (!titleInput.value.trim() && title) titleInput.value = title.trim();
    }

    for (let t of masterTexts) {
        if (isSerial) {
            masterChapters.push(fileToChapter(t.name, t.text));
        } else {
            masterChapters = masterChapters.concat(parseToChapters(t.name, t.text, selectedTypes));
        }
    }
    // 챕터 제목과 동일한 본문 첫 줄 제거
    masterChapters.forEach(function(chap) {
        var title = chap.title.trim();
        var lines = chap.content.split(/\n/);
        // 앞쪽 빈 줄 건너뛰고 첫 실제 줄 확인
        for (var i = 0; i < Math.min(lines.length, 5); i++) {
            var l = lines[i].trim()
                .replace(/<[^>]+>/g, '') // HTML 태그 제거
                .replace(/^<p>|<\/p>$/g, '');
            if (!l) continue;
            if (l === title || l.replace(/[_.,·\s]/g, '') === title.replace(/[_.,·\s]/g, '')) {
                lines.splice(i, 1);
                chap.content = lines.join('\n');
            }
            break;
        }
    });
    renderPreview();
    renderMergeList();
}

const BODY_STYLE = `
    body{padding:6% 9%;line-height:2.0;font-family:serif;word-break:keep-all;font-size:1em;}
    p{text-indent:1.2em;margin:0;padding:0.35em 0;}
    p.italic{font-style:italic;opacity:0.88;}
    .dingbat{text-align:center;margin:2.5em 0;letter-spacing:0.5em;font-size:1.1em;}
`;

// ✅ 줄바꿈 보정: 짧은 줄들을 이어붙임
function applyLineBreakFix(text) {
    const lines = autoFix(text).split(/\r?\n/);
    const result = [];
    let buffer = '';
    for (let line of lines) {
        const l = line.trim();
        if (l === '') {
            if (buffer) { result.push(buffer); buffer = ''; }
            result.push('');
        } else {
            // 목차 패턴이거나 딩뱃이거나 img 태그면 그대로
            const isSpecial = /^([\[<]?\s*img\s*\d+\s*[\]>]?|[·\.]{2,}|-{2,}|[*]{2,}|[=]{2,}|~{2,}|(✻\s*){3,}|🂱🂱🂱)$/i.test(l)
                || /^(프롤로그|에필로그|외전|후기|번외|Prologue|Epilogue)\.?$/i.test(l)
                || /^((?:제\s*)?\d+\s*[화장]|#\s*\d+|\d+\.\s*|\[\d+\]|<\d+>)$/.test(l);
            if (isSpecial) {
                if (buffer) { result.push(buffer); buffer = ''; }
                result.push(l);
            } else {
                // 문장이 마침표/느낌표/물음표로 끝나면 단락 끝으로 간주
                if (buffer) {
                    buffer += ' ' + l;
                } else {
                    buffer = l;
                }
                if (/[.!?。…"」』]$/.test(l)) {
                    result.push(buffer);
                    buffer = '';
                }
            }
        }
    }
    if (buffer) result.push(buffer);
    return result.join('\n');
}

function buildLine(l) {
    const grad = getGrad();
    const isDingbat = /^([·\.]{2,}|-{2,}|[*]{2,}|[=]{2,}|~{2,}|(✻\s*){3,}|(\*\s*){3,}|🂱🂱🂱)$/.test(l);
    if (isDingbat) {
        const dingText = '𝆴 𝆴 𝆴';
        const dingStyle = grad
            ? `background:${grad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block;`
            : '';
        const dingContent = dingStyle ? `<span style="${dingStyle}">${dingText}</span>` : dingText;
        return `<div class="dingbat">${dingContent}</div>`;
    } else if (/[\[<]?\s*img\s*\d+\s*[\]>]?/i.test(l)) {
        const imgNum = l.match(/\d+/)[0];
        return `[[IMG${imgNum}]]`;
    } else if (l.startsWith("-")) {
        return `<p class="italic">${escXml(l)}</p>`;
    } else {
        return `<p>${escXml(l)}</p>`;
    }
}

function processText(text) {
    const fix = document.getElementById("lineBreakFix").checked;
    return fix ? applyLineBreakFix(text) : text;
}

function fileToChapter(fileName, rawText) {
    const title = fileName.replace(/\.txt$/i, "");
    const text = processText(rawText);
    let content = "";
    text.split(/\r?\n/).forEach(line => { const l = line.trim(); if (l) content += buildLine(l); });
    return { title, content };
}

// ── v1.9: 텍본 앞 목차 스킵 ─────────────────────────────────────────
// 텍본 첫 부분에 목차(챕터 번호가 여러 줄 연속)가 있을 경우,
// 동일 챕터 번호가 두 번째로 등장하는 줄을 실제 본문 시작으로 판단하고 앞부분을 버립니다.
function skipTocSection(lines, combinedRegex, alreadyCleaned) {
    // 이미 ck_removeDuplicateTOC로 정제된 텍스트면 스킵하지 않음
    if (alreadyCleaned) return lines;
    // 에필/프롤은 절대 스킵 안 함
    const NEVER_SKIP = /^(?:프롤로그|에필로그|프롤|에필|Prologue|Epilogue)/i;
    // 앞 300줄 내에서 목차 패턴 줄이 8개 이상 연속 등장하면 목차로 간주
    var tocLineCount = 0;
    var tocEndIdx = -1;
    for (var i = 0; i < Math.min(lines.length, 300); i++) {
        var l = lines[i].trim();
        if (!l) continue;
        if (combinedRegex.test(l) && l.length < 60 && !NEVER_SKIP.test(l)) {
            tocLineCount++;
            tocEndIdx = i;
        } else {
            if (tocLineCount >= 8) break; // 8개 이상 쌓였을 때만 확정
            tocLineCount = 0;
        }
    }
    // 목차 구간 미감지 (8개 미만이면 건드리지 않음)
    if (tocLineCount < 8) return lines;

    // 첫 번째 챕터 제목(목차에서 등장한 것) 텍스트를 수집
    var tocTitles = new Set();
    for (var i = 0; i <= tocEndIdx; i++) {
        var l = lines[i].trim();
        if (l && combinedRegex.test(l) && l.length < 60) tocTitles.add(l);
    }

    // tocEndIdx 이후에서 목차에 있던 제목이 다시 등장하는 첫 번째 위치 = 본문 시작
    // 재등장이 없으면 스킵하지 않음 (정상 목차 보호)
    for (var j = tocEndIdx + 1; j < lines.length; j++) {
        var l = lines[j].trim();
        if (l && tocTitles.has(l)) {
            return lines.slice(j);
        }
    }
    // 재등장 없으면 원본 그대로 반환 (손실 방지)
    return lines;
}

function parseToChapters(fileName, rawText, selectedTypes) {
    const text = processText(rawText);
    const lines = text.split(/\r?\n/);
    const chapters = [];
    let current = { title: fileName.replace(/\.txt$/i, ""), content: "" };
    let patterns = [];
    if (selectedTypes.includes("strict_hwa")) patterns.push(
        "(?:EP\\s*|Episode\\s*|제\\s*)?0*\\d+\\s*화(?:\\s*[_.,·\\-:·.\\s].*)?|" +
        "EP\\s+0*\\d+(?:\\s.*)?|Episode\\s+0*\\d+(?:\\s.*)?");
    if (selectedTypes.includes("strict_jang")) patterns.push("(?:제\\s*)?0*\\d+\\s*장(?:\\s*[_.,·\\-:·.\\s].*)?");
    if (selectedTypes.includes("sharp")) patterns.push("#\\s*0*\\d+(?:\\s*화)?(?:\\s.*)?");
    if (selectedTypes.includes("dot")) patterns.push("0*\\d+\\.(?:\\s+\\S.*)?");
    if (selectedTypes.includes("bracket")) patterns.push(
        "\\[0*\\d+\\](?:\\s*.*)?|<0*\\d+>(?:\\s*.*)?|" +
        "\\[\\[0*\\d+\\]\\](?:\\s*.*)?|" +
        "<<(?:제\\s*)?(?:\\d+부|외전|프롤로그|에필로그)>>(?:\\s*.*)?|" +
        "《(?:제\\s*)?(?:\\d+부|외전|프롤로그|에필로그)》(?:\\s*.*)?|" +
        "〈(?:제\\s*)?(?:\\d+부|외전|프롤로그|에필로그)〉(?:\\s*.*)?|" +
        "\\[(?:제\\s*)?(?:\\d+부|외전|프롤로그|에필로그)\\](?:\\s*.*)?|" +
        "<(?:제\\s*)?(?:\\d+부|외전|프롤로그|에필로그)>(?:\\s*.*)?"
    );
    if (selectedTypes.includes("bracket_hwa")) patterns.push("\\[(?:제\\s*)?(?:0*\\d+화|0*\\d+장|외전\\s*\\d*|에필로그|프롤로그)\\](?:\\s*.*)?");
    if (selectedTypes.includes("keywords")) patterns.push(
        "(?:프롤로그|프롤)\\s*(?:\\d+)?(?:\\s.*)?|" +
        "(?:에필로그|에필)\\s*(?:\\d+)?(?:\\s.*)?|" +
        "(?:Prologue|Epilogue)\\s*(?:\\d+)?(?:\\s.*)?|" +
        "(?:IF\\s+|특별\\s*|단편\\s*)?외전\\s*(?:\\d+화?)?(?:[.,··].*)?|" +
        "특별외전\\s*(?:\\d*)?(?:\\s.*)?|" +
        "번외\\s*(?:\\d*)?(?:\\s.*)?|" +
        "후기\\s*(?:\\d*)?|후일담\\s*(?:\\d*)?|" +
        "서장|종장|막간\\s*(?:\\d*)?|인터루드\\s*(?:\\d*)?|Interlude\\s*(?:\\d*)?"
    );
    // 권 구분 패턴
    if (selectedTypes.includes("strict_hwa")) patterns.push(
        "(?:제\\s*)?\\d+\\s*권(?:\\s.*)?|권\\s*\\d+(?:\\s.*)?"
    );
    if (selectedTypes.includes("numonly")) patterns.push("0[1-9][0-9]?");
    if (patterns.length === 0) return [fileToChapter(fileName, rawText)];
    const combinedRegex = new RegExp("^\\s*(" + patterns.join("|") + ")\\s*$", "i");
    // v1.9: 텍본 앞 목차 구간 스킵
    const skippedLines = skipTocSection(lines, combinedRegex, masterTexts.length > 0 && masterTexts[0].cleaned);
    skippedLines.forEach(line => {
        const l = line.trim();
        if (!l) return;
        var isAuto = combinedRegex.test(l) && l.length < 60;
        var isManual = manualTitleLines.has(l) || (manualPattern && manualPattern.test(l));
        if (isAuto || isManual) {
            if (current.content.trim()) chapters.push(current);
            current = { title: l, content: "", _rawTitle: l };
            return;
        }
        current.content += buildLine(l);
    });
    if (current.content.trim() || chapters.length === 0) chapters.push(current);
    return chapters;
}

function renderPreview() {
    const previewDiv = document.getElementById("tocPreview");
    previewDiv.innerHTML = "";
    masterChapters.forEach((chap, index) => {
        const item = document.createElement("div");
        item.className = "toc-item";
        item.draggable = true;
        item.dataset.index = index;
        const isHidden = hiddenChapters.has(index);
        item.style.opacity = isHidden ? '0.35' : '1';
        item.innerHTML = `
            <span class="drag-handle">⠿</span>
            <span class="toc-title" onclick="editTitle(${index}, this)" title="클릭하여 제목 편집"
                style="${isHidden ? 'text-decoration:line-through;color:#aaa;' : ''}">${escXml(chap.title)}</span>
            ${isHidden
                ? `<div class="remove-btn" style="background:#e0ffe0;color:#4caf50;" onclick="restoreChapter(${index})">복원</div>`
                : `<div class="remove-btn" onclick="removeChapter(${index})">숨김</div>`
            }`;
        item.addEventListener('dragstart', e => {
            dragSrcIndex = index;
            setTimeout(() => item.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('drag-over'));
            item.classList.add('drag-over');
        });
        item.addEventListener('drop', e => {
            e.preventDefault();
            const targetIndex = parseInt(item.dataset.index);
            if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
            const moved = masterChapters.splice(dragSrcIndex, 1)[0];
            masterChapters.splice(targetIndex, 0, moved);
            dragSrcIndex = null;
            renderPreview();
        });
        previewDiv.appendChild(item);
    });
}

function editTitle(index, el) {
    const input = document.createElement("input");
    input.type = "text";
    input.className = "toc-title-input";
    input.value = masterChapters[index].title;
    el.replaceWith(input);
    input.focus();
    const save = () => { masterChapters[index].title = input.value.trim() || masterChapters[index].title; renderPreview(); };
    input.addEventListener("blur", save);
    input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
}

function removeChapter(index) {
    hiddenChapters.add(index);
    renderPreview();
}
function restoreChapter(index) {
    hiddenChapters.delete(index);
    renderPreview();
}

// ── 이미지 리사이징 (Canvas) ──────────────────────────────────────────
async function resizeImageFile(file, maxWidth) {
    maxWidth = maxWidth || 1080;
    return new Promise(function(resolve) {
        var url = URL.createObjectURL(file);
        var img = new Image();
        img.onload = function() {
            var w = img.naturalWidth, h = img.naturalHeight;
            if (w <= maxWidth) {
                // 리사이징 불필요 — 그냥 arrayBuffer 반환
                file.arrayBuffer().then(function(buf) {
                    URL.revokeObjectURL(url);
                    var ext = file.name.split('.').pop().toLowerCase();
                    resolve({ buf: buf, ext: ext });
                });
                return;
            }
            var ratio = maxWidth / w;
            var canvas = document.createElement('canvas');
            canvas.width = maxWidth;
            canvas.height = Math.round(h * ratio);
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
            canvas.toBlob(function(blob) {
                blob.arrayBuffer().then(function(buf) {
                    resolve({ buf: buf, ext: 'jpg' });
                });
            }, 'image/jpeg', 0.88);
        };
        img.src = url;
    });
}

            spine += `<itemref idref="title-page"/>\n`;
            // 계층형: 책 제목이 최상위 navPoint - 챕터들을 안에 중첩
            ncxNav += `<navPoint id="np-title" playOrder="${playIndex++}"><navLabel><text>${bookTitle}</text></navLabel><content src="title_page.xhtml">\n`;
            htmlNav += `<li><a href="title_page.xhtml">${bookTitle}</a><ol>\n`;
            inSection = true;
            inSectionHtml = true;
        }
    }

    const imgMap = {};
    const imgSource = masterImages.length > 0
        ? masterImages
        : Array.from(document.getElementById("images").files).map(f => ({ file: f, name: f.name }));
    for (let i = 0; i < imgSource.length; i++) {
        const entry = imgSource[i];
        const resized = await resizeImageFile(entry.file, 1080);
        const imgName = 'img' + (i + 1) + '.' + resized.ext;
        imgFolder.file(imgName, resized.buf);
        manifest += `<item id="img${i+1}" href="images/${imgName}" media-type="${getImageMime(resized.ext)}"/>\n`;
        imgMap[`IMG${i+1}`] = imgName;
    }

    const grad = getGrad();
    const titleGradStyle = grad
        ? `background:${grad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`
        : '';

    masterChapters.forEach((chap, i) => {
        const originalBody = chap.content; // 원본 보존
        let body = chap.content;
        const imgMode = document.getElementById("imagePageMode").checked;
        const chapFile = `chap${i}.xhtml`;
        const displayTitle = chap.title;
        const titleStyle = `text-align:left;color:inherit;margin:1.5em 0;font-size:1.3em;padding-bottom:0.5em;${titleGradStyle}`;

        if (imgMode) {
            // 원본에서 [[IMGn]] 순서 추출 (body 수정 전)
            const imgOrder = [];
            const imgFindReg = /\[\[IMG\d+\]\]/g;
            let mm;
            while ((mm = imgFindReg.exec(originalBody)) !== null) {
                const k = mm[0].slice(2, -2);
                if (imgMap[k]) imgOrder.push(k);
            }

            // 본문에서 [[IMGn]] 태그 제거
            let cleanBody = body;
            imgOrder.forEach(function(key) {
                cleanBody = cleanBody.split('[[' + key + ']]').join('');
            });

            // 챕터 본문 파일
            oebps.file(chapFile, `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head><style>${fontFaceCss}${BODY_STYLE} h2{${titleStyle}}</style></head><body><h2>${escXml(displayTitle)}</h2>${cleanBody}</body></html>`);
            manifest += `<item id="chap${i}" href="${chapFile}" media-type="application/xhtml+xml"/>\n`;
            spine += `<itemref idref="chap${i}"/>\n`;

            // 삽화 단독 페이지 (챕터 바로 뒤에 순서대로)
            imgOrder.forEach(function(key, idx) {
                const imgPage = `imgp${i}_${idx}.xhtml`;
                oebps.file(imgPage, `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head><style>body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;}img{max-width:100%;max-height:100vh;object-fit:contain;display:block;margin:auto;}</style></head><body><img src="images/${imgMap[key]}"/></body></html>`);
                manifest += `<item id="imgp${i}_${idx}" href="${imgPage}" media-type="application/xhtml+xml"/>\n`;
                spine += `<itemref idref="imgp${i}_${idx}"/>\n`;
            });

        } else {
            // 인라인 삽입: 원본 기준으로 태그 치환
            for (const key in imgMap) {
                const tag = `[[${key}]]`;
                if (originalBody.includes(tag)) {
                    body = body.split(tag).join(`<div style="text-align:center;margin:1.5em 0;"><img src="images/${imgMap[key]}" style="max-width:95%;border-radius:8px;"/></div>`);
                }
            }
            oebps.file(chapFile, `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head><style>${fontFaceCss}${BODY_STYLE} h2{${titleStyle}}</style></head><body><h2>${escXml(displayTitle)}</h2>${body}</body></html>`);
            manifest += `<item id="chap${i}" href="${chapFile}" media-type="application/xhtml+xml"/>\n`;
            spine += `<itemref idref="chap${i}"/>\n`;
        }

        htmlNav += `<li><a href="${chapFile}">${escXml(chap.title)}</a></li>\n`;
        // 계층형 목차: 섹션 타이틀이면 부모, 챕터면 자식
        if (chap.isSectionTitle) {
            if (inSection) { ncxNav += `</navPoint>\n`; inSectionHtml = false; }
            ncxNav += `<navPoint id="sec${i}" playOrder="${playIndex++}"><navLabel><text>${escXml(chap.title)}</text></navLabel><content src="${chapFile}"/>\n`;
            inSection = true;
        } else {
            ncxNav += `<navPoint id="cp${i}" playOrder="${playIndex++}"><navLabel><text>${escXml(chap.title)}</text></navLabel><content src="${chapFile}"/></navPoint>\n`;
        }
    });

    // 열린 섹션 navPoint 닫기
    if (inSection) ncxNav += `</navPoint>\n`;
    if (inSectionHtml) htmlNav += `</ol></li>\n`;

    oebps.file("nav.xhtml", `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ko"><head><meta charset="utf-8"/><title>목차</title></head><body><nav epub:type="toc" id="toc"><h1>목차</h1><ol>${htmlNav}</ol></nav></body></html>`);
    oebps.file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${bookId}"/><meta name="dtb:depth" content="2"/></head><docTitle><text>${escXml(title)}</text></docTitle><navMap>${ncxNav}</navMap></ncx>`);
    oebps.file("content.opf", `<?xml version="1.0" encoding="utf-8"?><package version="3.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:identifier id="bookid">${bookId}</dc:identifier><dc:title>${escXml(title)}</dc:title><dc:creator>${escXml(author)}</dc:creator><dc:language>ko</dc:language><meta property="dcterms:modified">${new Date().toISOString().split('.')[0]+'Z'}</meta>${coverMeta}</metadata><manifest>${manifest}</manifest><spine toc="ncx"><itemref idref="nav" linear="no"/>\n${spine}</spine></package>`);
    return await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
}



// ── 스마트 오타/기호 교정 ───────────────────────────────────────────
function autoFix(text) {
    // 연속 공백 정리 (탭 포함)
    text = text.replace(/[ 	]{3,}/g, ' ');
    // 물결표 2개 이상 → ~~
    text = text.replace(/~{2,}/g, '~~');
    // 큰따옴표 → 출판용 " "
    text = text.replace(/"([^"]+)"/g, '“$1”');
    // 작은따옴표 → 출판용 ' '
    text = text.replace(/'([^']+)'/g, '‘$1’');
    // 말줄임표 ... → …
    text = text.replace(/\.{3,}/g, '…');
    // 줄 끝 불필요한 공백 제거
    text = text.replace(/[ 	]+$/gm, '');
    return text;
}

var embeddedFont = null;

function handleFont(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var ext = file.name.split('.').pop().toLowerCase();
        var mimeMap = { ttf:'font/ttf', woff2:'font/woff2', otf:'font/otf' };
        var formatMap = { ttf:'truetype', woff2:'woff2', otf:'opentype' };
        var fontName = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9가-힣]/g, '_');
        embeddedFont = { name: file.name, data: e.target.result, ext: ext, mime: mimeMap[ext] || 'font/ttf', fontName: fontName };
        embeddedFont.css = '@font-face{font-family:"' + fontName + '";src:url("fonts/custom.' + ext + '") format("' + (formatMap[ext] || 'truetype') + '");}' +
            'html,body,p,div,span,h1,h2,h3,li{font-family:"' + fontName + '",serif !important;}';
        var info = document.getElementById('fontInfo');
        info.style.display = 'block';
        info.textContent = '✅ ' + file.name + ' 등록됨';
    };
    reader.readAsArrayBuffer(file);
}


// ── 목차 줄 지정 ─────────────────────────────────────────────────────
let manualTitleLines = new Set();
let manualPattern = null;
let allPreviewLines = [];

function openModal() {
    document.getElementById('patternModal').style.display = 'flex';
    buildLinePreview();
}

function buildLinePreview() {
    allPreviewLines = [];
    if (masterTexts.length > 0) {
        var lines = masterTexts[0].text.split(/\r?\n/).slice(0, 200);
        lines.forEach(function(line, i) {
            var l = line.trim();
            if (l) allPreviewLines.push({ num: i + 1, text: l });
        });
    }
    console.log('buildLinePreview: found', allPreviewLines.length, 'lines');
    renderLinePreview(allPreviewLines);
}

function renderLinePreview(lines) {
    var list = document.getElementById('linePreviewList');
    if (!list) {
        console.warn('linePreviewList element not found');
        return;
    }
    if (!lines.length) {
        list.innerHTML = '<div style="text-align:center;padding:20px;font-size:0.8rem;color:#bbb;">원고 파일을 먼저 선택해주세요</div>';
        return;
    }
    var selectedTypes = getSelectedTypes();
    list.innerHTML = lines.map(function(item) {
        var autoDetected = isChapterLine(item.text, selectedTypes);
        var manual = manualTitleLines.has(item.text);
        var patternMatch = !manual && !autoDetected && manualPattern && manualPattern.test(item.text);
        var isTitle = autoDetected || manual || patternMatch;
        var tag = autoDetected ? '<span class="line-tag">자동</span>' : manual ? '<span class="line-tag" style="background:#4caf50;">지정</span>' : patternMatch ? '<span class="line-tag" style="background:#2196f3;">패턴</span>' : '';
        var safeText = encodeURIComponent(item.text);
        return '<div class="line-preview-item' + (isTitle ? ' is-title' : '') + '" data-raw="' + safeText + '" onclick="toggleManualLine(decodeURIComponent(this.dataset.raw))">' +
               '<span class="line-num">' + item.num + '</span>' +
               '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escXml(item.text) + '</span>' +
               tag + '</div>';
    }).join('');
}

function filterPreviewLines() {
    var q = document.getElementById('lineSearchInput').value.toLowerCase();
    var filtered = q ? allPreviewLines.filter(function(l){ return l.text.toLowerCase().includes(q); }) : allPreviewLines;
    renderLinePreview(filtered);
}

function extractPatternFromLine(text) {
    var checks = [
        /^((?:제\s*)?\d+\s*화)\s*[.·\-:\s]/i,
        /^((?:제\s*)?\d+\s*장)\s*[.·\-:\s]/i,
        /^(#\s*\d+)\s*[.·\-:\s]/i,
        /^(\d+\.)\s*\S/,
        /^(\[\d+\])\s*/,
        /^(<\d+>)\s*/,
        /^(\[(?:\d+화|\d+장|외전\s*\d*|에필로그|프롤로그)\])\s*/i,
        /^((?:제\s*)?\d+\s*화)$/i,
        /^((?:제\s*)?\d+\s*장)$/i,
    ];
    for (var i = 0; i < checks.length; i++) {
        if (checks[i].test(text)) return checks[i];
    }
    return null;
}

function toggleManualLine(text) {
    if (manualTitleLines.has(text)) {
        manualTitleLines.delete(text);
        manualPattern = null;
        manualTitleLines.forEach(function(t) {
            if (!manualPattern) manualPattern = extractPatternFromLine(t);
        });
    } else {
        manualTitleLines.add(text);
        if (!manualPattern) manualPattern = extractPatternFromLine(text);
    }
    filterPreviewLines();
}

function clearManualLines() {
    manualTitleLines.clear();
    manualPattern = null;
    filterPreviewLines();
}

function isChapterLine(l, selectedTypes) {
    var patterns = [];
    if (selectedTypes.includes('strict_hwa')) patterns.push('(?:제\\s*)?0*\\d+\\s*화');
    if (selectedTypes.includes('strict_jang')) patterns.push('(?:제\\s*)?0*\\d+\\s*장');
    if (selectedTypes.includes('sharp')) patterns.push('#0*\\d+');
    if (selectedTypes.includes('dot')) patterns.push('0*\\d+\\.');
    if (selectedTypes.includes('bracket')) patterns.push('\\[0*\\d+\\]|<0*\\d+>');
    if (selectedTypes.includes('bracket_hwa')) patterns.push('\\[(?:0*\\d+화|0*\\d+장|외전\\s*\\d*|에필로그|프롤로그)\\]');
    if (selectedTypes.includes('keywords')) patterns.push('프롤로그\\.?|에필로그\\.?|(?:IF\\s+|특별\\s*|단편\\s*)?외전(?:\\s*\\d+화?)?(?:[.,··].*)?|특별외전(?:\\s*\\d*)?|번외(?:\\s*\\d*)?|후기\\.?|Prologue\\.?|Epilogue\\.?');
    if (selectedTypes.includes('numonly')) patterns.push('0[1-9][0-9]?');
    if (!patterns.length) return false;
    var rx = new RegExp('^\\s*(' + patterns.join('|') + ')\\s*$', 'i');
    return rx.test(l) && l.length < 30;
}

    closeModal();
    reparse();
}

        e.preventDefault();
        zone.classList.add('drag-active');
    });

    });

        zone.classList.remove('drag-active');
        var files = Array.from(e.dataTransfer.files).filter(function(f) {
            return f.name.toLowerCase().endsWith('.txt');
        });
        if (files.length === 0) { alert('TXT 파일만 드래그해주세요!'); return; }

        handleDroppedTexts(files);
    });
})();

async function handleDroppedTexts(files) {
    files.sort(function(a, b) { return a.name.localeCompare(b.name, undefined, { numeric: true }); });
    var existing = masterTexts.map(function(t) { return t.name; });
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        if (!existing.includes(f.name)) {
            try {
                var text = await f.text();
                masterTexts.push({ name: f.name, text: text });
                existing.push(f.name);
            } catch(e) {
                alert(f.name + ' 읽기 실패: ' + e.message);
            }
        }
    }
    renderTxtPreview();
    autoDetectPatterns(masterTexts);
    reparse();
}

let mergeEpubFiles = [];
let mergeCoverFile = null;
let mergeEpubDragSrc = null;

function handleMergeCover(file) {
    if (!file) return;
    mergeCoverFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        const img = document.getElementById('mergeCoverPreview');
        img.src = e.target.result;
        img.style.display = 'block';
    };

}

function handleMergeEpubs() {
    const files = Array.from(document.getElementById('mergeEpubs').files);
    const existing = mergeEpubFiles.map(f => f.name);
    files.forEach(f => { if (!existing.includes(f.name)) mergeEpubFiles.push(f); });
    renderMergeList();
}

function renderMergeList() {
    const list = document.getElementById('mergeEpubItems');
    const section = document.getElementById('mergeEpubList');
    if (!mergeEpubFiles.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = '';
    mergeEpubFiles.forEach((f, idx) => {
        const item = document.createElement('div');
        item.className = 'txt-item';
        item.draggable = true;
        item.dataset.index = idx;
        item.innerHTML = `<span class="drag-handle">⠿</span><span class="txt-name">📚 ${f.name}</span><span class="remove-btn" onclick="removeMergeEpub(${idx})">숨김</span>`;
        item.addEventListener('dragstart', () => { mergeEpubDragSrc = idx; item.classList.add('dragging'); });
        item.addEventListener('dragend', () => { item.classList.remove('dragging'); document.querySelectorAll('.txt-item').forEach(el => el.classList.remove('drag-over')); });
        item.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('#mergeEpubItems .txt-item').forEach(el => el.classList.remove('drag-over')); item.classList.add('drag-over'); });
        item.addEventListener('drop', e => {
            e.preventDefault();
            const to = parseInt(item.dataset.index);
            if (mergeEpubDragSrc === null || mergeEpubDragSrc === to) return;
            const moved = mergeEpubFiles.splice(mergeEpubDragSrc, 1)[0];
            mergeEpubFiles.splice(to, 0, moved);
            mergeEpubDragSrc = null;
            renderMergeList();
        });
        list.appendChild(item);
    });
}

function removeMergeEpub(idx) {
    mergeEpubFiles.splice(idx, 1);
    renderMergeList();
}
