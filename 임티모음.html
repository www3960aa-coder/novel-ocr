<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>임티 모음</title>
<style>
:root {
  --bg: #fdf6ff; --card: #fff; --p: #b06ef3; --p2: #d4a8ff;
  --border: #eedeff; --text: #333; --sub: #999; --tab-bg: #f3eaff; --toast-bg: #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--text); padding-bottom: 24px; }
header {
  background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
  padding: 20px 16px 16px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(124,58,237,0.18);
}
header h1 { font-size: 1.2rem; color: #fff; font-weight: 800; }
header p { font-size: 0.75rem; color: rgba(255,255,255,0.78); margin-top: 3px; }
.tabs {
  display: flex; overflow-x: auto; gap: 6px;
  padding: 10px 12px 0; background: var(--bg);
  scrollbar-width: none; position: sticky; top: 70px; z-index: 90;
  border-bottom: 2px solid var(--border);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px 20px 0 0;
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  border: none; background: var(--tab-bg); color: var(--p);
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
}
.tab.active { background: var(--p); color: #fff; border-bottom-color: var(--p); }
.section { padding: 14px 12px 0; display: none; }
.section.active { display: block; }
.sec-title { font-size: 0.78rem; font-weight: 700; color: var(--p); margin-bottom: 8px; margin-top: 16px; }
.sec-title:first-child { margin-top: 0; }
.grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.sym {
  background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 7px 11px; font-size: 0.88rem; cursor: pointer; color: var(--text);
  line-height: 1.4; transition: background 0.1s, transform 0.1s;
  white-space: nowrap; user-select: none; -webkit-user-select: none;
  box-shadow: 0 1px 4px rgba(176,110,243,0.07);
}
.sym:active { background: #f0e4ff; transform: scale(0.93); border-color: var(--p2); }
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--toast-bg); color: #fff; padding: 10px 22px; border-radius: 24px;
  font-size: 0.85rem; font-weight: 600; opacity: 0; pointer-events: none;
  transition: all 0.25s; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(124,58,237,0.35); z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.search-wrap { padding: 10px 12px 0; }
.search-input {
  width: 100%; padding: 10px 14px; border-radius: 24px;
  border: 1.5px solid var(--border); font-size: 0.9rem;
  background: var(--card); color: var(--text); outline: none;
}
.search-input:focus { border-color: var(--p2); }
#search-result { padding: 10px 12px 0; }
</style>
</head>

const tabsEl = document.getElementById('tabs');
const sectionsEl = document.getElementById('sections');

DATA.forEach((cat, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = cat.tab;
  tab.onclick = () => switchTab(i);
  tabsEl.appendChild(tab);

  const sec = document.createElement('div');
  sec.className = 'section' + (i === 0 ? ' active' : '');
  sec.id = 'sec-' + i;
  cat.groups.forEach(g => {
    const title = document.createElement('div');
    title.className = 'sec-title';
    title.textContent = g.title;
    sec.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'grid';
    g.items.forEach(s => grid.appendChild(makeBtn(s)));
    sec.appendChild(grid);
  });
  sectionsEl.appendChild(sec);
});

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', i===j));
}
function makeBtn(s) {
  const b = document.createElement('button');
  b.className = 'sym';
  b.textContent = s;
  b.onclick = () => copyText(s);
  return b;
}
function doSearch(q) {
  const res = document.getElementById('search-result');
  const tabs = document.getElementById('tabs');
  const secs = document.getElementById('sections');
  q = q.trim();
  if (!q) {
    res.style.display='none'; res.innerHTML='';
    tabs.style.display=''; secs.style.display=''; return;
  }
  tabs.style.display='none'; secs.style.display='none';
  const all=[];
  DATA.forEach(cat => cat.groups.forEach(g => g.items.forEach(s => { if(s.includes(q)) all.push(s); })));
  if (!all.length) {
    res.style.display='block';
    res.innerHTML='<p style="padding:20px;color:#aaa;text-align:center;font-size:0.85rem;">검색 결과가 없어요</p>';
    return;
  }
  const grid = document.createElement('div');
  grid.className='grid';
  all.forEach(s => grid.appendChild(makeBtn(s)));
  res.innerHTML=''; res.appendChild(grid); res.style.display='block';
}
let toastTimer;
function copyText(s) {
  if (navigator.clipboard) navigator.clipboard.writeText(s).catch(()=>fallbackCopy(s));
  else fallbackCopy(s);
  showToast(s);
}
function fallbackCopy(s) {
  const ta=document.createElement('textarea');
  ta.value=s; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}
function showToast(s) {
  const t=document.getElementById('toast');
  t.textContent=s+'  복사됐어요 ✓';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}
</script>
