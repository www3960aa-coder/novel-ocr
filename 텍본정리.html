<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>텍본 정리</title>
<style>
:root {
  --bg: #f8f7ff; --card: #fff; --p: #8b5cf6; --p2: #a78bdb;
  --border: #e8e0ff; --text: #333; --sub: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
body { background: var(--bg); color: var(--text); padding: 16px; padding-bottom: 90px; }
h1 { text-align: center; font-size: 1.2rem; color: var(--p); margin-bottom: 4px; }
p.sub { text-align: center; font-size: 0.8rem; color: var(--sub); margin-bottom: 16px; }
.card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(139,92,246,0.08); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-title { font-size: 0.95rem; font-weight: 700; color: var(--p); }
.toggle-btn { font-size: 0.75rem; color: var(--p); cursor: pointer; border: 1px solid var(--p); padding: 2px 10px; border-radius: 10px; background: #f0ebff; }
.drop-zone { border: 2px dashed var(--p2); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; color: var(--sub); font-size: 0.9rem; }
.drop-zone:active { background: #f0ebff; }
.info-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; color: var(--sub); margin-bottom: 8px; }
.info-row span { color: var(--p); font-weight: 700; word-break: break-all; }
#line-list { max-height: 380px; overflow-y: auto; border-radius: 10px; border: 1px solid var(--border); background: #faf9ff; }
.line-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px; border-bottom: 1px solid #f0ebff; cursor: pointer; font-size: 0.8rem; line-height: 1.5; }
.line-row:last-child { border-bottom: none; }
.line-row.cut { background: #fff0f0; color: #bbb; }
.line-row.start { background: #f0ebff; font-weight: 700; }
.line-row .lnum { color: #ccc; min-width: 26px; text-align: right; flex-shrink: 0; font-size: 0.72rem; padding-top: 2px; }
.line-row .ltxt { flex: 1; word-break: break-all; white-space: pre-wrap; }
.badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; background: var(--p); color: #fff; flex-shrink: 0; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.btn-main { background: var(--p); color: #fff; box-shadow: 0 4px 12px rgba(139,92,246,0.2); }
.bottom { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }

/* 기호 버튼 가로스크롤 */
.sym-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.sym-scroll::-webkit-scrollbar { display: none; }
.sym-btn { background: #f0ebff; border: 2px solid transparent; border-radius: 10px; padding: 7px 12px; font-size: 0.95rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; color: var(--text); line-height: 1.3; }
.sym-btn.active { background: var(--p); color: #fff; font-weight: 700; border-color: var(--p); }

.hint { font-size: 0.73rem; color: var(--sub); margin-bottom: 8px; }
</style>
</head>
<body>

<h1>📄 텍본 정리</h1>
<p class="sub">앞부분 불필요한 줄을 잘라내고 바로 저장해요</p>

<div class="card">
  <div class="card-header">
    <div class="card-title">✨ 파일명 장식</div>
    <div class="toggle-btn" id="toggle-btn" onclick="toggleDeco()">접기</div>
  </div>
  <div id="deco-container">
    <p class="hint">저장할 때 제목 양옆에 붙는 기호를 선택하세요<br>※ [작가명]이 있으면 장식은 제목에만 붙어요</p>
    <div class="sym-scroll" id="deco-list"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">📂 파일 업로드</div>
  <div class="drop-zone" onclick="document.getElementById('file-input').click()" id="drop-zone">
    📄 터치해서 TXT 파일을 선택하세요
  </div>
  <input type="file" id="file-input" accept=".txt" style="display:none;">
</div>

<div class="card" id="preview-card" style="display:none;">
  <div class="info-row">
    <span id="current-name">-</span>
    <span id="start-info" style="flex-shrink:0;margin-left:8px;">시작: 1번째 줄</span>
  </div>
  <p class="hint">원하는 줄을 탭해서 시작점을 지정하세요. 빨간 줄은 제거돼요.</p>
  <div id="line-list"><div style="text-align:center;padding:40px 0;color:#888;">파일을 선택하세요</div></div>
</div>

<div class="bottom">
  <button class="btn btn-main" onclick="saveCurrent()">✂️ 저장하기</button>
</div>

<script>
let currentData = null;
let selectedDeco = '𖹭';
let isFolded = false;

// 장식 목록 — 기호 + 임티 + 표정기호 풍성하게
const DECOS = [
  { label: '없음', v: '' },
  // 특수기호
  { label: '✦', v: '✦' },
  { label: '❀', v: '❀' },
  { label: '✿', v: '✿' },
  { label: '❦', v: '❦' },
  { label: '𖹭', v: '𖹭' },
  { label: '彡', v: '彡' },
  { label: '☽', v: '☽' },
  { label: '𓂃', v: '𓂃' },
  { label: '★', v: '★' },
  { label: '♡', v: '♡' },
  { label: '♥', v: '♥' },
  { label: '◈', v: '◈' },
  { label: '✶', v: '✶' },
  { label: '❋', v: '❋' },
  { label: '⌘', v: '⌘' },
  { label: '⊹', v: '⊹' },
  { label: '✧', v: '✧' },
  // 이모지
  { label: '🦋', v: '🦋' },
  { label: '☁️', v: '☁️' },
  { label: '💜', v: '💜' },
  { label: '🍀', v: '🍀' },
  { label: '👻', v: '👻' },
  { label: '🐥', v: '🐥' },
  { label: '🌈', v: '🌈' },
  { label: '🔔', v: '🔔' },
  { label: '💎', v: '💎' },
  { label: '🌸', v: '🌸' },
  { label: '🌙', v: '🌙' },
  { label: '✨', v: '✨' },
  { label: '🌿', v: '🌿' },
  { label: '🐇', v: '🐇' },
  { label: '🌺', v: '🌺' },
  { label: '🕊️', v: '🕊️' },
  { label: '🫧', v: '🫧' },
  { label: '🍵', v: '🍵' },
  { label: '🐾', v: '🐾' },
  // 표정·임티기호
  { label: '(◍ᐡ₃ᐡ◍)', v: '(◍ᐡ₃ᐡ◍)' },
  { label: 'ʕ•ﻌ•ʔ', v: 'ʕ•ﻌ•ʔ' },
  { label: '(˶ᵔ ᵕ ᵔ˶)', v: '(˶ᵔ ᵕ ᵔ˶)' },
  { label: '(◕‿◕✿)', v: '(◕‿◕✿)' },
  { label: '(´｡• ᵕ •｡`)', v: '(´｡• ᵕ •｡`)' },
  { label: '(っ˘ω˘ς)', v: '(っ˘ω˘ς)' },
  { label: 'ฅ(=^・ω・^=)ฅ', v: 'ฅ(=^・ω・^=)ฅ' },
  { label: '(ﾉ◕ヮ◕)ﾉ', v: '(ﾉ◕ヮ◕)ﾉ' },
  { label: '(*ૂ❛ᴗ❛*ૂ)', v: '(*ૂ❛ᴗ❛*ૂ)' },
  { label: '(ง •̀_•́)ง✧', v: '(ง •̀_•́)ง✧' },
  { label: 'ᕦ(ò_óˇ)ᕤ', v: 'ᕦ(ò_óˇ)ᕤ' },
  { label: '(˘▽˘>ԅ( ˘⌣˘)', v: '(˘▽˘>ԅ( ˘⌣˘)' },
  { label: '(灬°ω°灬)', v: '(灬°ω°灬)' },
  { label: '(⁀ᗢ⁀)', v: '(⁀ᗢ⁀)' },
  { label: 'ヽ(✿ﾟ▽ﾟ)ノ', v: 'ヽ(✿ﾟ▽ﾟ)ノ' },
  { label: '(｡•́︿•̀｡)', v: '(｡•́︿•̀｡)' },
  { label: '(≧◡≦)', v: '(≧◡≦)' },
  { label: '꒰ᐡ•ﻌ•ᐡ꒱', v: '꒰ᐡ•ﻌ•ᐡ꒱' },
];

function toggleDeco() {
  isFolded = !isFolded;
  document.getElementById('deco-container').style.display = isFolded ? 'none' : 'block';
  document.getElementById('toggle-btn').textContent = isFolded ? '더보기' : '접기';
}

function renderDecos() {
  const el = document.getElementById('deco-list');
  el.innerHTML = DECOS.map(d =>
    `<button class="sym-btn ${d.v === selectedDeco ? 'active' : ''}" onclick="selectDeco(${JSON.stringify(d.v)})">${d.label || '없음'}</button>`
  ).join('');
}

function selectDeco(v) {
  selectedDeco = v;
  renderDecos();
  renderPreview();
}
renderDecos();

// 파일명에서 작가명/제목 분리
// [작가명] 제목 → author="[작가명] ", title="제목"
function parseName(base) {
  const match = base.match(/^([\[\(\{【<].*?[\]\)\}】>]\s*)(.*)$/);
  if (match) return { author: match[1], title: match[2] };
  return { author: '', title: base };
}

// 저장 파일명 생성: author + deco + title + deco
function buildDownloadName(base, ext) {
  const { author, title } = parseName(base);
  const d = selectedDeco;
  if (d) return author + d + title + d + ext;
  return base + ext;
}

// 미리보기 표시명
function buildPreviewName(base) {
  const { author, title } = parseName(base);
  const d = selectedDeco;
  if (d) return author + d + title + d;
  return base;
}

// 파일 로드
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#f0ebff'; });
dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.background = '';
  const f = Array.from(e.dataTransfer.files).find(f => f.name.endsWith('.txt'));
  if (f) loadFile(f);
});
fileInput.addEventListener('change', async e => {
  if (!e.target.files.length) return;
  await loadFile(e.target.files[0]);
  fileInput.value = '';
});

async function loadFile(f) {
  const text = await readTxt(f);
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let auto = 0;
  for (let i = 0; i < Math.min(lines.length, 80); i++) {
    const l = lines[i].trim();
    if (l.length > 25 || l.startsWith('"') || l.startsWith('「') || l.startsWith("'")) {
      auto = i; break;
    }
  }
  currentData = { name: f.name, lines, startLine: auto };
  document.getElementById('preview-card').style.display = 'block';
  renderPreview();
}

function renderPreview() {
  if (!currentData) return;
  const { name, lines, startLine } = currentData;
  const dot = name.lastIndexOf('.');
  const base = dot >= 0 ? name.slice(0, dot) : name;
  document.getElementById('current-name').textContent = buildPreviewName(base);
  document.getElementById('start-info').textContent = `시작: ${startLine + 1}번째 줄`;
  const el = document.getElementById('line-list');
  el.innerHTML = lines.slice(0, 80).map((l, i) => {
    const isCut = i < startLine, isStart = i === startLine;
    return `<div class="line-row ${isCut ? 'cut' : ''} ${isStart ? 'start' : ''}" onclick="setStart(${i})">
      <span class="lnum">${i + 1}</span>
      <span class="ltxt">${escHtml(l || ' ')}</span>${isStart ? '<span class="badge">시작</span>' : ''}
    </div>`;
  }).join('');
  setTimeout(() => {
    const rows = el.querySelectorAll('.line-row');
    if (rows[startLine]) rows[startLine].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 60);
}

function setStart(idx) { if (currentData) { currentData.startLine = idx; renderPreview(); } }

function saveCurrent() {
  if (!currentData) return alert('파일을 먼저 선택하세요');
  const { name, lines, startLine } = currentData;
  const content = lines.slice(startLine).join('\n');
  const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const dot = name.lastIndexOf('.');
  const base = dot >= 0 ? name.slice(0, dot) : name;
  const ext = dot >= 0 ? name.slice(dot) : '';
  const a = document.createElement('a');
  a.href = url;
  a.download = buildDownloadName(base, ext);
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function readTxt(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const text = e.target.result;
      if (text.includes('\uFFFD')) {
        const r2 = new FileReader();
        r2.onload = e2 => resolve(e2.target.result);
        r2.onerror = () => resolve(text);
        r2.readAsText(file, 'EUC-KR');
      } else { resolve(text); }
    };
    r.onerror = () => resolve('');
    r.readAsText(file, 'UTF-8');
  });
}

function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
</script>
</body>
</html>
