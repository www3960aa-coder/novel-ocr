<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EPUB → TXT 추출기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2em 1em;}
h1{font-size:1.4em;margin-bottom:0.3em;color:#c9b8f0;}
.sub{font-size:0.85em;color:#888;margin-bottom:2em;}
.drop-zone{
  width:100%;max-width:480px;border:2px dashed #5a4a8a;border-radius:16px;
  padding:2.5em 1em;text-align:center;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;background:#16213e;
}
.drop-zone:hover,.drop-zone.drag{border-color:#c9b8f0;background:#1f2d50;}
.drop-zone p{color:#aaa;font-size:0.95em;}
.drop-zone .icon{font-size:2.5em;margin-bottom:0.4em;}
input[type=file]{display:none;}

/* 옵션 */
.options{width:100%;max-width:480px;margin-top:1.2em;background:#16213e;border-radius:12px;padding:1em 1.2em;display:flex;flex-direction:column;gap:0.7em;}
.opt-row{display:flex;align-items:center;gap:0.6em;font-size:0.88em;color:#ccc;cursor:pointer;}
.opt-row input[type=checkbox]{accent-color:#c9b8f0;width:16px;height:16px;cursor:pointer;}
.opt-label{font-weight:600;color:#c9b8f0;font-size:0.8em;margin-bottom:0.2em;}

/* 파일 순서 목록 */
.file-order{width:100%;max-width:480px;margin-top:1em;display:none;}
.file-order-title{font-size:0.82em;color:#aaa;margin-bottom:0.5em;}
.order-list{background:#16213e;border-radius:12px;padding:0.8em;display:flex;flex-direction:column;gap:0.4em;}
.order-item{display:flex;align-items:center;gap:0.5em;font-size:0.82em;color:#ccc;background:#1f2d50;border-radius:8px;padding:0.5em 0.8em;}
.order-item .num{color:#c9b8f0;font-weight:700;min-width:1.5em;}
.order-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.order-item .move{background:none;border:none;color:#888;cursor:pointer;font-size:1em;padding:0 0.2em;}
.order-item .move:hover{color:#c9b8f0;}

.progress{width:100%;max-width:480px;margin-top:1.5em;display:none;}
.bar-wrap{background:#16213e;border-radius:8px;height:8px;overflow:hidden;}
.bar{height:100%;background:linear-gradient(90deg,#c9b8f0,#a0d8ef);width:0%;transition:width 0.2s;}
.status{font-size:0.85em;color:#aaa;margin-top:0.5em;text-align:center;}
.result{width:100%;max-width:480px;margin-top:1.5em;display:none;}
.result-list{background:#16213e;border-radius:12px;padding:1em;max-height:160px;overflow-y:auto;font-size:0.85em;color:#ccc;}
.result-list div{padding:0.3em 0;border-bottom:1px solid #2a2a4a;}
.result-list div:last-child{border:none;}
.btn{
  display:block;width:100%;max-width:480px;margin-top:1em;
  padding:0.9em;border:none;border-radius:12px;
  background:linear-gradient(135deg,#7b5ea7,#5b9bd5);
  color:#fff;font-size:1em;cursor:pointer;font-weight:600;
  transition:opacity 0.2s;
}
.btn:hover{opacity:0.85;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.reset{background:#2a2a4a;margin-top:0.5em;}
.log{width:100%;max-width:480px;margin-top:1em;background:#16213e;border-radius:12px;
     padding:0.8em;font-size:0.78em;color:#888;max-height:120px;overflow-y:auto;display:none;}
</style>
</head>
<body>
<h1>📄 EPUB → TXT 추출기</h1>
<p class="sub">분권 EPUB도 순서대로 올리면 하나로 합쳐줘요</p>

<div class="drop-zone" id="dropZone">
  <div class="icon">📚</div>
  <p>EPUB 파일을 여기에 드래그하거나<br>탭해서 선택하세요</p>
  <p style="margin-top:0.5em;font-size:0.8em;color:#666;">여러 파일 → 순서대로 하나의 TXT로 합치기</p>
  <input type="file" id="fileInput" accept=".epub" multiple/>
</div>

<div class="options">
  <div class="opt-label">⚙️ 옵션</div>
  <label class="opt-row">
    <input type="checkbox" id="optMerge" checked/>
    여러 파일을 하나의 TXT로 합치기
  </label>
  <label class="opt-row">
    <input type="checkbox" id="optDedupe" checked/>
    연속 중복 챕터 헤더 제거
  </label>
  <label class="opt-row">
    <input type="checkbox" id="optClean" checked/>
    빈 줄 정리 (3줄 이상 → 2줄)
  </label>
</div>

<div class="file-order" id="fileOrder">
  <div class="file-order-title">📋 처리 순서 (드래그로 변경 가능)</div>
  <div class="order-list" id="orderList"></div>
</div>

<div class="progress" id="progress">
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">처리 중...</div>
</div>

<div class="result" id="result">
  <div class="result-list" id="resultList"></div>
</div>

<button class="btn" id="startBtn" disabled>🚀 추출 시작</button>
<button class="btn" id="downloadBtn" disabled>💾 TXT 다운로드</button>
<button class="btn reset" id="resetBtn">🔄 초기화</button>
<div class="log" id="log"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const progress = document.getElementById('progress');
const bar = document.getElementById('bar');
const status = document.getElementById('status');
const result = document.getElementById('result');
const resultList = document.getElementById('resultList');
const startBtn = document.getElementById('startBtn');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const fileOrderEl = document.getElementById('fileOrder');
const orderList = document.getElementById('orderList');
const logEl = document.getElementById('log');

let pendingFiles = []; // 순서 조정 가능한 파일 목록
let extractedFiles = [];

// 드래그앤드롭
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  addFiles([...e.dataTransfer.files].filter(f => f.name.endsWith('.epub')));
});
fileInput.addEventListener('change', () => {
  addFiles([...fileInput.files]);
  fileInput.value = '';
});

resetBtn.addEventListener('click', reset);
startBtn.addEventListener('click', runExtract);

function reset() {
  pendingFiles = [];
  extractedFiles = [];
  resultList.innerHTML = '';
  result.style.display = 'none';
  progress.style.display = 'none';
  logEl.style.display = 'none';
  logEl.innerHTML = '';
  downloadBtn.disabled = true;
  startBtn.disabled = true;
  fileOrderEl.style.display = 'none';
  orderList.innerHTML = '';
  bar.style.width = '0%';
}

function log(msg) {
  logEl.style.display = 'block';
  logEl.innerHTML += msg + '<br>';
  logEl.scrollTop = logEl.scrollHeight;
}

function addFiles(files) {
  files.forEach(f => {
    if (!pendingFiles.find(p => p.name === f.name)) {
      pendingFiles.push(f);
    }
  });
  renderOrderList();
  if (pendingFiles.length > 0) {
    fileOrderEl.style.display = 'block';
    startBtn.disabled = false;
    downloadBtn.disabled = true;
    extractedFiles = [];
    result.style.display = 'none';
  }
}

function renderOrderList() {
  orderList.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'order-item';
    item.innerHTML = `
      <span class="num">${i+1}</span>
      <span class="fname">${f.name}</span>
      <button class="move" onclick="moveFile(${i},-1)" ${i===0?'disabled':''}>▲</button>
      <button class="move" onclick="moveFile(${i},1)" ${i===pendingFiles.length-1?'disabled':''}>▼</button>
      <button class="move" onclick="removeFile(${i})" style="color:#f88;">✕</button>
    `;
    orderList.appendChild(item);
  });
}

function moveFile(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= pendingFiles.length) return;
  [pendingFiles[idx], pendingFiles[newIdx]] = [pendingFiles[newIdx], pendingFiles[idx]];
  renderOrderList();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderOrderList();
  if (pendingFiles.length === 0) {
    fileOrderEl.style.display = 'none';
    startBtn.disabled = true;
  }
}

function htmlToText(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  ['p','div','br','h1','h2','h3','h4','h5','h6','li'].forEach(tag => {
    tmp.querySelectorAll(tag).forEach(el => {
      if (tag === 'br') {
        el.replaceWith('\n');
      } else {
        el.insertAdjacentText('beforebegin', '\n');
        el.insertAdjacentText('afterend', '\n');
      }
    });
  });
  let text = tmp.textContent || tmp.innerText || '';
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}

async function extractEpub(file) {
  const zip = await JSZip.loadAsync(file);

  const containerXml = await zip.file('META-INF/container.xml').async('text');
  const opfMatch = containerXml.match(/full-path="([^"]+\.opf)"/);
  if (!opfMatch) throw new Error('OPF를 찾을 수 없음');
  const opfPath = opfMatch[1];
  const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

  const opfText = await zip.file(opfPath).async('text');
  const parser = new DOMParser();
  const opfDoc = parser.parseFromString(opfText, 'application/xml');

  const spineItems = [...opfDoc.querySelectorAll('spine itemref')]
    .filter(el => el.getAttribute('linear') !== 'no')
    .map(el => el.getAttribute('idref'));

  const manifestMap = {};
  opfDoc.querySelectorAll('manifest item').forEach(el => {
    manifestMap[el.getAttribute('id')] = el.getAttribute('href');
  });

  // NCX 제목 매핑
  const titleMap = {};
  const ncxId = opfDoc.querySelector('spine')?.getAttribute('toc');
  if (ncxId && manifestMap[ncxId]) {
    try {
      const ncxPath = opfDir + manifestMap[ncxId];
      const ncxText = await zip.file(ncxPath)?.async('text') || '';
      const ncxDoc = parser.parseFromString(ncxText, 'application/xml');
      ncxDoc.querySelectorAll('navPoint').forEach(np => {
        const label = np.querySelector('navLabel text')?.textContent?.trim();
        const src = np.querySelector('content')?.getAttribute('src')?.split('#')[0];
        if (label && src) titleMap[src] = label;
      });
    } catch(e) {}
  }

  let fullText = '';
  let prevTitle = '';

  for (const idref of spineItems) {
    const href = manifestMap[idref];
    if (!href) continue;
    const fullHref = opfDir + href;
    const hrefBase = href.split('#')[0];

    if (href.includes('nav') || href.includes('cover') || href.includes('toc')) continue;

    try {
      const fileObj = zip.file(fullHref) || zip.file(fullHref.replace(/^\//, ''));
      if (!fileObj) continue;
      const html = await fileObj.async('text');

      const title = titleMap[hrefBase] || titleMap[href];
      const optDedupe = document.getElementById('optDedupe').checked;

      if (title && (!optDedupe || title !== prevTitle)) {
        fullText += `\n\n${'━'.repeat(20)}\n${title}\n${'━'.repeat(20)}\n\n`;
        prevTitle = title;
      }

      const text = htmlToText(html);
      if (text.length > 10) {
        fullText += text + '\n\n';
      }
    } catch(e) {
      log(`⚠️ 스킵: ${href} - ${e.message}`);
    }
  }

  return fullText.trim();
}

function cleanText(text) {
  // 빈 줄 정리
  if (document.getElementById('optClean').checked) {
    text = text.replace(/\n{3,}/g, '\n\n');
  }
  return text;
}

function dedupeHeaders(text) {
  // 연속된 동일 헤더 제거
  // ━━━━\n제목\n━━━━ 패턴이 연달아 나오면 첫 번째만 유지
  const sep = '━'.repeat(20);
  const headerPattern = new RegExp(
    `(${sep}\\n[^\\n]+\\n${sep})\\n[\\s\\n]*(${sep}\\n[^\\n]+\\n${sep})`,
    'g'
  );
  let prev = '';
  while (prev !== text) {
    prev = text;
    text = text.replace(
      new RegExp(`(${sep}\n([^\n]+)\n${sep})(\n[\s\S]*?)?(?=\n${sep}\n\\2\n${sep}|\n${sep}\n\\2\n${sep}|$)`, 'g'),
      '$1$3'
    );
  }
  // 더 단순하게: 같은 헤더블록이 연속으로 2번 이상 나오면 1번으로
  const blockRe = new RegExp(`(${sep}\\n([^\\n]+)\\n${sep})(\\n\\n${sep}\\n\\2\\n${sep})+`, 'g');
  text = text.replace(blockRe, '$1');
  return text;
}

async function runExtract() {
  if (!pendingFiles.length) return;
  extractedFiles = [];
  resultList.innerHTML = '';
  result.style.display = 'none';
  progress.style.display = 'block';
  downloadBtn.disabled = true;
  startBtn.disabled = true;

  const optMerge = document.getElementById('optMerge').checked;
  const parts = []; // 파일별 추출 결과

  for (let i = 0; i < pendingFiles.length; i++) {
    const file = pendingFiles[i];
    bar.style.width = Math.round((i / pendingFiles.length) * 100) + '%';
    status.textContent = `추출 중 (${i+1}/${pendingFiles.length}): ${file.name}`;

    try {
      let text = await extractEpub(file);
      parts.push({ name: file.name, text });
      log(`✅ ${file.name} → ${Math.round(text.length/1000)}K자`);
    } catch(e) {
      log(`❌ ${file.name}: ${e.message}`);
      parts.push({ name: file.name, text: '' });
    }
  }

  bar.style.width = '100%';

  if (optMerge && pendingFiles.length > 1) {
    // 전부 합치기
    let merged = parts.map(p => p.text).filter(t => t).join('\n\n');
    merged = dedupeHeaders(merged);
    merged = cleanText(merged);
    const outName = pendingFiles[0].name.replace(/\.epub$/i, '') + '_합본.txt';
    extractedFiles.push({ name: outName, content: merged });

    const div = document.createElement('div');
    div.textContent = `✅ ${outName} (${Math.round(merged.length/1000)}K자, ${pendingFiles.length}개 합침)`;
    resultList.appendChild(div);
    status.textContent = `완료! ${pendingFiles.length}개 파일 합쳐서 추출`;
  } else {
    // 개별 저장
    parts.forEach(p => {
      if (!p.text) return;
      let text = dedupeHeaders(p.text);
      text = cleanText(text);
      const outName = p.name.replace(/\.epub$/i, '.txt');
      extractedFiles.push({ name: outName, content: text });

      const div = document.createElement('div');
      div.textContent = `✅ ${outName} (${Math.round(text.length/1000)}K자)`;
      resultList.appendChild(div);
    });
    status.textContent = `완료! ${extractedFiles.length}개 파일 추출됨`;
  }

  result.style.display = 'block';
  startBtn.disabled = false;
  if (extractedFiles.length > 0) {
    downloadBtn.disabled = false;
    downloadBtn.onclick = downloadAll;
  }
}

async function downloadAll() {
  if (extractedFiles.length === 1) {
    const blob = new Blob(['\uFEFF' + extractedFiles[0].content], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = extractedFiles[0].name;
    a.click();
  } else {
    const zip = new JSZip();
    extractedFiles.forEach(f => zip.file(f.name, '\uFEFF' + f.content));
    const blob = await zip.generateAsync({type:'blob'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'epub2txt_추출.zip';
    a.click();
  }
}
</script>
</body>
</html>
