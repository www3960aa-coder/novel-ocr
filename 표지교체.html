<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB COVER LIVE STUDIO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* 완벽한 풀 다크 서재 아카이브 UI 디자인 */
        body { font-family: 'Pretendard', sans-serif; padding: 16px; background-color: #090d16; color: #f1f5f9; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 500px; width: 100%; margin: 0 auto; box-sizing: border-box; }
        
        /* 럭셔리 네온 그라데이션 타이틀 */
        h2 { font-size: 22px; font-weight: 800; text-align: center; margin: 15px 0 25px 0; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        
        /* 대형 터치 슬롯 - 풀 다크 베이스 */
        .slot-box { background: #111827; border: 2px dashed #374151; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.25s ease; margin-bottom: 16px; }
        .slot-box.loaded { border-color: #38bdf8; background: rgba(14, 116, 144, 0.2); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        .slot-box.target-loaded { border-color: #a78bfa; background: rgba(109, 40, 217, 0.2); box-shadow: 0 0 15px rgba(167, 139, 250, 0.1); }
        .slot-box span { display: block; font-size: 14px; font-weight: 700; color: #6b7280; margin-bottom: 4px; }
        .slot-box.loaded span { color: #38bdf8; }
        .slot-box.target-loaded span { color: #c084fc; }
        .file-name-display { font-size: 12px; color: #9ca3af; font-weight: 500; word-break: break-all; }
        input[type="file"] { display: none; }
        
        /* 실시간 1초 미러링 모니터링 패널 - 다크 가공 */
        .mirror-panel { background: #111827; border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #27272a; }
        .panel-title { font-size: 13px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; text-align: center; }
        
        /* 반반 스플릿 뷰 그리드 */
        .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .monitor { text-align: center; }
        .monitor-label { font-size: 11px; font-weight: 700; color: #6b7280; margin-bottom: 6px; }
        
        /* 매트 블랙 고화질 액자 스크린 예외처리(블랙) 겸용 */
        .frame { width: 100%; aspect-ratio: 3/4; background-color: #030712; border-radius: 8px; border: 1px solid #1f293d; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .frame img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .frame .no-image-text { font-size: 11px; color: #475569; font-weight: bold; text-align: center; padding: 10px; line-height: 1.4; }
        
        /* 팩킹 완료 단독 실행 액션 버튼 */
        .action-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #0369a1, #1d4ed8); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 5px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4); transition: all 0.2s; }
        .action-btn:active { transform: scale(0.99); background: linear-gradient(135deg, #0284c7, #2563eb); }
        
        /* 상태 알림 알림 브리핑창 */
        #resultArea { margin-top: 15px; padding: 14px; border-radius: 10px; display: none; text-align: center; font-weight: 700; font-size: 13px; line-height: 1.5; }
        .success { background: rgba(16, 185, 129, 0.1); border: 1px solid #059669; color: #34d399; }
        .error { background: rgba(239, 68, 68, 0.1); border: 1px solid #dc2626; color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h2>EPUB COVER LIVE STUDIO</h2>
    
    <div class="slot-box" id="epubSlot" onclick="document.getElementById('epubFile').click()">
        <span id="epubSlotTitle">📘 1. 원본 소설 파일(.epub) 로드</span>
        <input type="file" id="epubFile" accept=".epub" onchange="loadSourceEpub(this)">
        <div id="epubName" class="file-name-display">표지를 바꿀 원본 이펍 파일을 터치하여 선택하세요.</div>
    </div>

    <div class="slot-box" id="imgSlot" onclick="document.getElementById('imgFile').click()">
        <span id="imgSlotTitle">🖼️ 2. 새 표지 이미지(.jpg / .png) 로드</span>
        <input type="file" id="imgFile" accept="image/*" onchange="loadTargetImage(this)">
        <div id="imgName" class="file-name-display">폰 갤러리에 다운받아 둔 표지 이미지를 선택하세요.</div>
    </div>

    <div class="mirror-panel">
        <div class="panel-title">⚡ REALTIME COVER MONITOR</div>
        <div class="split-view">
            <div class="monitor">
                <div class="monitor-label">◀ 바꾸기 전 원본 표지</div>
                <div class="frame" id="beforeFrame">
                    <img id="beforeImg" alt="Before">
                    <span class="no-image-text" id="beforeFallback">기존 표지 없음<br>(블랙 스크린)</span>
                </div>
            </div>
            <div class="monitor">
                <div class="monitor-label">새로 바뀔 표지 ▶</div>
                <div class="frame" id="afterFrame">
                    <img id="afterImg" alt="After">
                    <span class="no-image-text" id="afterFallback">새 이미지 선택<br>대기 중</span>
                </div>
            </div>
        </div>
    </div>

    <button class="action-btn" onclick="executeRebuildEpub()">새 표지로 즉시 리빌드 및 다운로드</button>
    
    <div id="resultArea"></div>
</div>

<script>
    let rawEpubBinary = null;
    let targetImageBinary = null;
    let originalFileName = "수정본_소설";

    function printReport(text, isSuccess) {
        const area = document.getElementById('resultArea');
        area.style.display = "block";
        area.className = isSuccess ? "success" : "error";
        area.innerHTML = text;
    }

    async function loadSourceEpub(input) {
        const file = input.files[0];
        if (!file) return;

        originalFileName = file.name.replace(/\.[^/.]+$/, "");
        document.getElementById('epubName').innerText = file.name;
        document.getElementById('epubSlotTitle').innerText = "✅ 원본 소설 확보 완료";
        document.getElementById('epubSlot').classList.add('loaded');

        const reader = new FileReader();
        reader.onload = async function(e) {
            rawEpubBinary = e.target.result;
            await extractOriginalCover(rawEpubBinary);
        };
        reader.readAsArrayBuffer(file);
    }

    function loadTargetImage(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('imgName').innerText = file.name;
        document.getElementById('imgSlotTitle').innerText = "✅ 교체 표지 준비 완료";
        document.getElementById('imgSlot').classList.add('target-loaded');

        const reader = new FileReader();
        reader.onload = function(e) {
            targetImageBinary = e.target.result;
            
            const blob = new Blob([targetImageBinary], {type: file.type});
            const url = URL.createObjectURL(blob);
            const imgEl = document.getElementById('afterImg');
            
            imgEl.src = url;
            imgEl.style.display = "block";
            document.getElementById('afterFallback').style.display = "none";
        };
        reader.readAsArrayBuffer(file);
    }

    // 1단계 수색 시퀀스 고도화 패치
    async function extractOriginalCover(epubData) {
        const beforeImg = document.getElementById('beforeImg');
        const beforeFallback = document.getElementById('beforeFallback');
        
        beforeImg.style.display = "none";
        beforeFallback.style.display = "block";
        beforeFallback.innerHTML = "표지 수색 중...";

        try {
            const zip = new JSZip();
            const epubZip = await zip.loadAsync(epubData);
            let opfPath = "";
            let opfContent = "";

            for (let filename in epubZip.files) {
                if (filename.endsWith('.opf')) {
                    opfPath = filename;
                    opfContent = await epubZip.files[filename].async("text");
                    break;
                }
            }

            if (!opfPath) {
                beforeFallback.innerHTML = "기존 표지 없음<br>(블랙 스크린)";
                return;
            }

            const baseDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
            let coverId = "";
            let coverPath = "";

            const metaCoverMatch = opfContent.match(/<meta[^>]*name=["']cover["'][^>]*content=["']([^"']+)["']/i);
            if (metaCoverMatch) coverId = metaCoverMatch[1];

            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(opfContent, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (coverId) {
                for (let i = 0; i < items.length; i++) {
                    if (items[i].getAttribute("id") === coverId) {
                        coverPath = baseDir + items[i].getAttribute("href");
                        break;
                    }
                }
            }

            if (!coverPath) {
                for (let i = 0; i < items.length; i++) {
                    const href = items[i].getAttribute("href") || "";
                    const id = items[i].getAttribute("id") || "";
                    if (id.toLowerCase().includes("cover") && (href.toLowerCase().includes("jpg") || href.toLowerCase().includes("jpeg") || href.toLowerCase().includes("png"))) {
                        coverPath = baseDir + href;
                        break;
                    }
                }
            }

            if (coverPath && epubZip.files[coverPath]) {
                const imgData = await epubZip.files[coverPath].async("blob");
                const url = URL.createObjectURL(imgData);
                beforeImg.src = url;
                beforeImg.style.display = "block";
                beforeFallback.style.display = "none";
            } else {
                beforeFallback.innerHTML = "기존 표지 없음<br>(블랙 스크린)";
            }

        } catch (err) {
            console.error(err);
            beforeFallback.innerHTML = "표지 추출 불가능<br>(블랙 스크린)";
        }
    }

    // 2단계 재조립 컴파일러 엔진 하이브리드 완전체 매핑 개조 가동
    async function executeRebuildEpub() {
        if (!rawEpubBinary) return alert("원본 EPUB 파일을 로드해 주세요.");
        if (!targetImageBinary) return alert("교체할 새 표지 이미지를 로드해 주세요.");

        try {
            const zip = new JSZip();
            const epubZip = await zip.loadAsync(rawEpubBinary);
            let opfPath = "";
            let opfContent = "";

            for (let filename in epubZip.files) {
                if (filename.endsWith('.opf')) {
                    opfPath = filename;
                    opfContent = await epubZip.files[filename].async("text");
                    break;
                }
            }

            if (!opfPath) return printReport("❌ OPF 파일을 찾을 수 없습니다.", false);

            const baseDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
            let coverId = "";
            let coverPath = "";

            // 1. <meta name="cover" content="id"> 에서 id 추출
            const metaCoverMatch = opfContent.match(/<meta[^>]*name=["']cover["'][^>]*content=["']([^"']+)["']/i);
            if (metaCoverMatch) coverId = metaCoverMatch[1];

            // 2. id로 실제 파일 경로 찾기
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(opfContent, "text/xml");
            const items = xmlDoc.getElementsByTagName("item");

            if (coverId) {
                for (let i = 0; i < items.length; i++) {
                    if (items[i].getAttribute("id") === coverId) {
                        const href = items[i].getAttribute("href");
                        coverPath = baseDir + href;
                        break;
                    }
                }
            }

            // 3. id로 못 찾으면 href/id에 cover 포함된 이미지 파일 탐색
            if (!coverPath) {
                for (let i = 0; i < items.length; i++) {
                    const href = (items[i].getAttribute("href") || "").toLowerCase();
                    const id = (items[i].getAttribute("id") || "").toLowerCase();
                    const mt = (items[i].getAttribute("media-type") || "").toLowerCase();
                    if ((id.includes("cover") || href.includes("cover")) && mt.startsWith("image/")) {
                        coverPath = baseDir + items[i].getAttribute("href");
                        coverId = items[i].getAttribute("id");
                        break;
                    }
                }
            }

            // 4. 그래도 없으면 첫 번째 이미지 파일 사용
            if (!coverPath) {
                for (let i = 0; i < items.length; i++) {
                    const mt = (items[i].getAttribute("media-type") || "").toLowerCase();
                    if (mt.startsWith("image/")) {
                        coverPath = baseDir + items[i].getAttribute("href");
                        coverId = items[i].getAttribute("id");
                        break;
                    }
                }
            }

            if (!coverPath) return printReport("❌ 표지 이미지 경로를 찾을 수 없습니다.", false);

            // 5. 기존 커버 이미지 파일을 새 이미지로 덮어쓰기 (구조 변경 없음)
            epubZip.file(coverPath, targetImageBinary);

            // 6. meta name="cover" 없으면 추가
            if (!opfContent.includes('name="cover"') && coverId) {
                opfContent = opfContent.replace('</metadata>', `  <meta name="cover" content="${coverId}"/>\n  </metadata>`);
                epubZip.file(opfPath, opfContent);
            }

            // 7. mimetype은 ZIP_STORED 유지
            const modifiedEpubBlob = await epubZip.generateAsync({
                type: "blob",
                mimeType: "application/epub+zip",
                compression: "DEFLATE",
                compressionOptions: { level: 6 }
            });

            const outputFileName = `${originalFileName}_표지교체.epub`;
            const url = URL.createObjectURL(modifiedEpubBlob);
            const a = document.createElement('a');
            a.href = url; a.download = outputFileName;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            printReport(`✅ 표지 교체 완료!<br>파일명: [ ${outputFileName} ]`, true);

        } catch (err) {
            console.error(err);
            printReport("❌ 오류: " + err.message, false);
        }
    }
</script>
</body>
</html>
