<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>읏쇼읏쇼 v2.29</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js">

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js">

</script>
<style>:root{--p:#b19cd9;--bg:#f8f7ff;--text:#4a446a;--border:#e2dcf4;--red:#ff8b8b}body{font-family:'Pretendard',sans-serif;background:var(--bg);margin:0;padding:15px 15px 180px;color:var(--text);display:flex;justify-content:center}.container{max-width:480px;width:100%}@media (min-width:600px){body{background:#eef0f7;padding:30px 15px 180px}.container{max-width:520px}.card{padding:25px 30px}.tab-nav{justify-content:center}}.card{background:#fff;padding:20px;border-radius:24px;margin-bottom:15px;box-shadow:0 8px 20px rgba(177,156,217,0.1);border:1px solid var(--border)}h2{color:var(--p);text-align:left;font-size:1.3rem;margin:0 0 20px 0;letter-spacing:-0.5px}h3{font-size:0.95rem;margin:0 0 12px 0;opacity:0.8;display:flex;justify-content:space-between;align-items:center}input[type="text"]{width:100%;padding:14px;margin-bottom:10px;border:1.5px solid #eee;border-radius:12px;box-sizing:border-box;font-size:15px}.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}.opt-box{background:#f9f8ff;padding:12px;border-radius:15px;border:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.opt-box input{width:17px;height:17px;accent-color:var(--p)}.btn-secondary{background:#fff;border:1.5px solid var(--p);color:var(--p);padding:12px;border-radius:12px;width:100%;font-weight:bold;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.btn-main{width:100%;padding:18px;background:var(--p);border:none;color:#fff;border-radius:30px;font-weight:bold;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 0 #967bb6;margin-top:10px;transition:opacity 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.btn-main:disabled{opacity:0.6;cursor:not-allowed}.btn-preview{width:100%;padding:14px;background:#fff;border:2px solid var(--p);color:var(--p);border-radius:30px;font-weight:bold;font-size:1rem;cursor:pointer;margin-top:8px;transition:opacity 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}#tocPreview{max-height:200px;overflow-y:auto;background:#fcfcff;border-radius:12px;padding:5px;border:1px inset #eee;margin-bottom:10px}.toc-item{padding:8px 12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;gap:8px;cursor:grab;user-select:none;transition:background 0.15s}.toc-item:active{cursor:grabbing}.toc-item.dragging{opacity:0.4;background:#f0eeff}.toc-item.drag-over{background:#e8e0ff;border-top:2px solid var(--p)}.drag-handle{color:#ccc;font-size:1rem;cursor:grab;padding:0 4px;flex-shrink:0}.toc-title{flex:1;cursor:pointer;border-radius:6px;padding:2px 4px}.toc-title:hover{background:#f0eeff}.toc-title-input{flex:1;border:1.5px solid var(--p);border-radius:6px;padding:2px 6px;font-size:0.85rem;outline:none}.remove-btn{color:var(--red);font-weight:bold;cursor:pointer;font-size:0.7rem;border:1px solid var(--red);border-radius:4px;padding:2px 5px;white-space:nowrap;flex-shrink:0}.file-btn{flex:1;background:#fff;border:1.5px dashed var(--p);padding:15px;text-align:center;border-radius:15px;font-size:0.85rem;cursor:pointer;color:var(--p);font-weight:600;margin-bottom:10px}.drop-zone{background:#fff;border:2px dashed var(--p);padding:24px 15px;text-align:center;border-radius:18px;cursor:pointer;margin-bottom:10px;transition:all 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.drop-zone.drag-active{background:#f0eeff;border-color:#8b6fd4;transform:scale(1.01)}.drop-zone-icon{font-size:2rem;margin-bottom:6px}.drop-zone-text{color:var(--p);font-weight:700;font-size:0.95rem}.drop-zone-sub{color:#bbb;font-size:0.75rem;margin-top:4px}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;overflow-y:auto}.modal-content{background:#fff;width:90%;max-width:500px;padding:25px;border-radius:24px;max-height:90vh;overflow-y:hidden;display:flex;flex-direction:column}.modal-preview{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}.modal-preview-inner{background:#fff;width:95%;max-width:600px;height:85vh;border-radius:24px;display:flex;flex-direction:column;overflow:hidden}.modal-preview-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}.modal-preview-header select{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:0.85rem;color:var(--text);background:#f9f8ff}.modal-preview-header button{background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;font-weight:bold}.modal-preview iframe{flex:1;border:none;width:100%}#txtPreview{max-height:160px;overflow-y:auto;background:#fcfcff;border-radius:12px;padding:5px;border:1px inset #eee;margin-bottom:10px;display:none}.txt-item{padding:7px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;font-size:0.82rem;gap:8px;cursor:grab;user-select:none;transition:background 0.15s}.txt-item:active{cursor:grabbing}.txt-item.dragging{opacity:0.4;background:#f0eeff}.txt-item.drag-over{background:#e8e0ff;border-top:2px solid var(--p)}.txt-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mode-badge{font-size:0.75rem;padding:3px 10px;border-radius:20px;font-weight:bold}.mode-serial{background:#ffeef8;color:#c96bab}.mode-single{background:#eef0ff;color:#6b7ac9}.file-count{font-size:0.75rem;color:var(--p);text-align:center;margin-bottom:8px;font-weight:600}#loadingOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px}.spinner{width:40px;height:40px;border:4px solid var(--border);border-top:4px solid var(--p);border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.line-preview-item{padding:9px 12px;font-size:0.82rem;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;transition:background 0.1s}.line-preview-item:hover{background:#f5f0ff}.line-preview-item.is-title{background:#fff3e0;font-weight:700;color:var(--p)}.line-preview-item .line-num{font-size:0.7rem;color:#ccc;min-width:22px}.line-preview-item .line-tag{font-size:0.68rem;padding:2px 6px;border-radius:8px;background:var(--p);color:#fff;white-space:nowrap}@media (min-width:900px){.container{max-width:700px}}@media (max-width:480px){.modal-content{width:95% !important;max-width:95vw;padding:20px}.modal{padding:10px}#linePreviewList{max-height:200px !important}}.tab-nav{display:flex;gap:8px;margin-bottom:12px}.tab-btn{flex:1;padding:10px;border:1.5px solid var(--border);background:#fff;border-radius:14px;font-size:0.85rem;cursor:pointer;color:var(--text);font-weight:600;transition:all 0.15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.tab-btn.active{background:var(--p);color:#fff;border-color:var(--p)}.tab-panel{margin-bottom:80px}.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#f8f7ff;border-top:1px solid var(--border);padding:12px 15px;padding-bottom:calc(12px+env(safe-area-inset-bottom));box-sizing:border-box;z-index:9999;-webkit-transform:translate3d(0,0,0);transform:translate3d(0,0,0)}.bottom-bar-inner{max-width:700px;margin:0 auto}.bottom-bar .btn-preview{margin-bottom:6px}.bottom-bar .btn-main{margin-top:0}.use-counter{font-size:0.75rem;text-align:center;color:#bbb;margin:4px 0}.use-counter b{color:var(--p)}</style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center;">🔮 읏쇼읏쇼 v2.29 ✨</h2>
    <div style="text-align:center;font-size:0.8rem;color:#b19cd9;margin-bottom:15px;font-weight:600;">외전 자동 분리 타이틀 페이지 버전</div>
    
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('file')">📄 파일</button>
        <button class="tab-btn" onclick="switchTab('info')">📖 책 정보</button>
        
        <button class="tab-btn" onclick="switchTab('option')">🛠️ 설정</button>
    </div>

    
    <div id="tab-info" class="tab-panel card" style="display:none;">
        <input id="title" type="text" placeholder="책 제목 (필수)">
        <input id="author" type="text" placeholder="작가명">
        <button class="btn-secondary" onclick="openModal()">⚙️ 목차 인식 패턴 설정</button>
        <div id="fileCount" class="file-count" style="display:none;"></div>
        <div id="tocRemovedNotice" style="display:none;font-size:0.78rem;color:#7a5a00;background:#fff8e0;border:1px solid #e0c850;border-radius:6px;padding:6px 10px;margin-top:6px;"></div>
        <div id="tocPreview"><div style="text-align:center;font-size:0.8rem;opacity:0.5;padding:20px;">원고를 선택해주세요.</div></div>
        <div id="mergeSection" style="display:none;">
            <hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">
            <h3 style="margin-bottom:6px;">📑 챕터 병합</h3>
            <div style="font-size:0.78rem;color:#aaa;margin-bottom:8px;">체크 후 병합하면 하나의 챕터로 합쳐져요</div>
            <div id="mergeList" style="max-height:150px;overflow-y:auto;background:#fcfcff;border-radius:12px;padding:5px;border:1px inset #eee;margin-bottom:8px;"></div>
            <button class="btn-secondary" onclick="mergeSelected()">🔗 선택 챕터 병합</button>
        </div>
    </div>

    
    <div id="tab-file" class="tab-panel card">
        <input type="file" id="texts" multiple accept=".txt" style="display:none;" onchange="handleFileSelection()">
        <input type="file" id="cover" accept="image/*" style="display:none;" onchange="handleCover(this.files[0])">
        
        <div id="txtDropZone" class="drop-zone" onclick="document.getElementById('texts').click()">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">TXT 파일 선택 또는 드래그</div>
            <div class="drop-zone-sub">여러 파일 한번에 가능</div>
        </div>
        <div style="display:flex;gap:10px;align-items:stretch;margin-top:4px;">
            <label for="cover" style="flex:0 0 auto;width:110px;background:#fff;border:1.5px dashed var(--p);padding:12px 8px;text-align:center;border-radius:15px;font-size:0.85rem;cursor:pointer;color:var(--p);font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
                <span style="font-size:1.5rem;">🎨</span>
                <span>표지 선택</span>
            </label>
            <div id="coverPreviewWrap" style="flex:1;background:#f5f5f5;border-radius:15px;overflow:hidden;min-height:90px;display:flex;align-items:center;justify-content:center;">
                <img id="coverPreview" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:15px;">
                <span id="coverPlaceholder" style="color:#ccc;font-size:0.8rem;">표지 없음</span>
            </div>
        </div>
        <h3 id="txtListLabel" style="display:none;margin-top:16px;margin-bottom:8px;">
            📄 TXT 순서 <span style="font-size:0.72rem;font-weight:normal;opacity:0.55;">드래그로 순서 변경</span>
        </h3>
        <div id="txtPreview"></div>

        <span id="modeBadge" class="mode-badge" style="display:none;"></span>
    </div>

    
    <div id="tab-option" class="tab-panel card" style="display:none;">
        <div class="settings-grid">
            
            <label class="opt-box"><input type="checkbox" id="lineBreakFix"> 줄바꿈 보정</label>
            <button class="opt-box" onclick="openGradModal()" style="border:1px solid var(--border);cursor:pointer;justify-content:center;">🎨 그라데이션</button>
            <label class="opt-box"><input type="checkbox" id="sideStoryGroup"> 외전 자동 분리</label>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0 12px;">    </div>
<div id="previewModal" class="modal-preview">
    <div class="modal-preview-inner">
        <div class="modal-preview-header" style="flex-direction:column;gap:8px;">
            <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
                <div style="display:flex;gap:6px;">
                    <button id="pvTab-cover" onclick="switchPvTab('cover')" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--p);color:#fff;font-size:0.85rem;font-weight:bold;cursor:pointer;">표지</button>
                    <button id="pvTab-toc" onclick="switchPvTab('toc')" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--p);font-size:0.85rem;font-weight:bold;cursor:pointer;">목차</button>
                    <button id="pvTab-body" onclick="switchPvTab('body')" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--p);font-size:0.85rem;font-weight:bold;cursor:pointer;">본문</button>
                </div>
                <button onclick="closePreview()" style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;font-weight:bold;">✕ 닫기</button>
            </div>
            <select id="previewChapSelect" onchange="loadPreviewChap()" style="display:none;width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:0.85rem;color:var(--text);background:#f9f8ff;"></select>
        </div>
        <iframe id="previewFrame"></iframe>
    </div>
</div>

<div id="gradModal" class="modal">
  <div class="modal-content" style="display:flex;flex-direction:column;max-height:75vh;overflow:hidden;padding:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:12px;gap:10px;">
      <h3 style="margin:0;white-space:nowrap;">🎨 그라데이션 설정</h3>
      <button onclick="closeGradModal()" style="padding:8px 20px;background:#a78bdb;color:#fff;border:none;border-radius:20px;font-size:0.9rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;">적용하기</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;">
      <label class="opt-box" style="grid-column:1/-1;font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="none" checked> 없음 (기본)</label>
      <label class="opt-box" style="grid-column:1/-1;font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="title"> <span style="background:linear-gradient(135deg,#d0ccfa,#addfe9,#dca0e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">라벤더→민트→라일락 ✦</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="strawberry"> <span style="background:linear-gradient(180deg,#e8534a,#ffb5a7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">딸기→크림</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="pink_coral"> <span style="background:linear-gradient(180deg,#f472b6,#e8534a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">핑크→코랄</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="peach_pink"> <span style="background:linear-gradient(180deg,#ffb085,#ffb5d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">복숭아→연핑크</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="apricot_pink"> <span style="background:linear-gradient(180deg,#ffe8a5,#ff8ba5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">살구→핑크</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="rose_gold"> <span style="background:linear-gradient(180deg,#f9a8d4,#fcd34d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">로즈→골드</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="rainbow"> <span style="background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">🌈 무지개</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="lilac_pink"> <span style="background:linear-gradient(180deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">라일락→핑크</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="mint"> <span style="background:linear-gradient(180deg,#a8edea,#fed6e3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">민트→연핑크</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="ice_mint"> <span style="background:linear-gradient(180deg,#a8d8ea,#a8edcc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">아이스블루→민트</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="deep_blue"> <span style="background:linear-gradient(180deg,#0ea5e9,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">딥블루→시안</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="ocean"> <span style="background:linear-gradient(180deg,#4facfe,#00f2c3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">파랑→초록</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="sage_mint"> <span style="background:linear-gradient(180deg,#b8e0b0,#3ecf8e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">세이지→민트</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="sunset"> <span style="background:linear-gradient(180deg,#fc5c7d,#6a3093);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">선셋→보라</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="indigo_purple"> <span style="background:linear-gradient(180deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">인디고→퍼플</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="dark"> <span style="background:linear-gradient(180deg,#222,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">검정→회색</span></label>
      <label class="opt-box" style="font-size:0.85rem;padding:8px 12px;"><input type="radio" name="grad" value="crimson"> <span style="background:linear-gradient(180deg,#c0392b,#1a1a1a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;">빨강→검정</span></label>
    </div>
  </div>
</div>

<div id="patternModal" class="modal">
<div class="modal-content" style="display:flex;flex-direction:column;max-height:88vh;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">⚙️ 목차 인식 설정</h3>
        <button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:#aaa;padding:0;width:30px;height:30px;display:flex;align-items:center;justify-content:center;">×</button>
    </div>

    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;">
        <label class="opt-box" style="font-size:0.8rem;padding:8px;"><input type="checkbox" class="toc-type" value="strict_hwa" checked> n화</label>
        <label class="opt-box" style="font-size:0.8rem;padding:8px;"><input type="checkbox" class="toc-type" value="strict_jang" checked> n장</label>
        <label class="opt-box" style="font-size:0.8rem;padding:8px;"><input type="checkbox" class="toc-type" value="sharp" checked> #숫자</label>
        <label class="opt-box" style="font-size:0.8rem;padding:8px;"><input type="checkbox" class="toc-type" value="dot"> n.</label>
        <label class="opt-box" style="font-size:0.8rem;padding:8px;"><input type="checkbox" class="toc-type" value="bracket" checked> [n] &lt;n&gt;</label>

const GRAD_MAP = {

let text;
try {
const buf = await f.arrayBuffer();
const bytes = new Uint8Array(buf);
if (bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF) {
text = new TextDecoder('utf-8').decode(buf.slice(3));
} else {
try { text = new TextDecoder('utf-8',{fatal:true}).decode(buf); }
catch { text = new TextDecoder('euc-kr').decode(buf); }
}
} catch { text = await f.text(); }
text = text.replace(/[\u2060-\u2064\u200b-\u200f\u00ad\ufeff\u180e\xa0]/g, ' ');
text = text.replace(/ +/g, ' ').replace(/ \n/g, '\n').replace(/\n /g, '\n');

function autoDetectPatterns(texts) {

strict_hwa:  lines.some(function(l){ return /^(?:제\s*)?\d+\s*화|^EP\s+\d+|^Episode\s+\d+|^(?:외전|번외|특별|단편)\s*\d+\s*화/.test(l); }),
title_hwa:   lines.some(function(l){ return /^\S.{2,30}\s+\d+화$/.test(l.trim()); }),

};
found.numonly = lines.some(function(l){ return /^0[1-9][0-9]?$/.test(l.trim()); });
var anyFound = Object.keys(found).some(function(k){ return found[k]; });

}
function reparse() {

masterChapters = [];

{
const rawName = masterTexts[0].name.replace(/\.txt$/i, "");

}

const first = masterChapters[0];
const firstBodyText = first.content
.replace(/<[^>]+>/g, '')
.replace(/[━─\-=~\s]/g, '')

// 본문이 비어있거나, 본문이 제목과 동일한 텍스트만 있는 경우 제거

.replace(/<[^>]+>/g, '')

});

}
const BODY_STYLE = `
body{padding:6% 9%;line-height:2.0;font-family:serif;word-break:keep-all;font-size:1em;}
p{text-indent:1.2em;margin:0;padding:0.35em 0;}
p.italic{font-style:italic;opacity:0.88;}
.dingbat{text-align:center;margin:2.5em 0;letter-spacing:0.5em;font-size:1.1em;}
`;
function applyLineBreakFix(text) {
const lines = autoFix(text).split(/\r?\n/);
const result = [];
let buffer = '';
for (let line of lines) {
const l = line.trim();
if (l === '') {
if (buffer) { result.push(buffer); buffer = ''; }
result.push('');
} else {
const isSpecial = /^([\[<]?\s*img\s*\d+\s*[\]>]?|[·\.]{2,}|-{2,}|[*]{2,}|[=]{2,}|~{2,}|(✻\s*){3,}|🂱🂱🂱)$/i.test(l)
|| /^(프롤로그|에필로그|외전|후기|번외|Prologue|Epilogue)\.?$/i.test(l)
|| /^((?:제\s*)?\d+\s*[화장]|#\s*\d+|\d+\.\s*|\[\d+\]|<\d+>)$/.test(l);
if (isSpecial) {
if (buffer) { result.push(buffer); buffer = ''; }
result.push(l);
} else {
if (buffer) {
buffer += ' ' + l;
} else {
buffer = l;
}
if (/[.!?。…"」』]$/.test(l)) {
result.push(buffer);
buffer = '';
}
}
}
}

}
function buildLine(l) {
const grad = getGrad();
const isDingbat = /^([·\.]{2,}|-{2,}|[*]{2,}|[=]{2,}|~{2,}|(✻\s*){3,}|(\*\s*){3,}|🂱🂱🂱)$/.test(l);
if (isDingbat) {
const dingText = '𝆴 𝆴 𝆴';
const dingStyle = grad
? (grad.startsWith('#') ? `color:${grad};display:inline-block;` : `background:${grad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block;`)
: '';
const dingContent = dingStyle ? `<span style="${dingStyle}">${dingText}</span>` : dingText;
return `<div class="dingbat">${dingContent}</div>`;
} else if (/[\[<]?\s*img\s*\d+\s*[\]>]?/i.test(l)) {
const imgNum = l.match(/\d+/)[0];
return `[[IMG${imgNum}]]`;
} else if (l.startsWith("-")) {
return `<p class="italic">${escXml(l)}</p>`;
} else {
return `<p>${escXml(l)}</p>`;

}
function processText(text) {
const fix = document.getElementById("lineBreakFix").checked;
return fix ? applyLineBreakFix(text) : text;
}
function fileToChapter(fileName, rawText) {
const title = fileName.replace(/\.txt$/i, "");
const text = processText(rawText);
let content = "";
text.split(/\r?\n/).forEach(line => { const l = line.trim(); if (l) content += buildLine(l); });

}
function ck_removeDuplicateTOC(text) {
const lines = text.split('\n');
if (lines.length < 10) return { text, removed:0, tocCount:0 };
const tocHeaderIdx = lines.slice(0, 50).findIndex(l =>
/^\|\s*목\s*차\s*\|$/.test(l.trim()) ||
/^목차$/.test(l.trim()) ||
/^\[목차\]$/.test(l.trim()) ||
/^CONTENTS$/i.test(l.trim()) ||
/^Table\s+of\s+Contents$/i.test(l.trim())
);
if (tocHeaderIdx >= 0) {
let mcTocEnd = tocHeaderIdx;
for (let i = tocHeaderIdx + 1; i < Math.min(lines.length, tocHeaderIdx + 60); i++) {
const l = lines[i].trim();
if (!l) continue;
if (/^\d+[\s⑴⑵⑶⑷⑸]?$|^(?:프롤로그|에필로그|외전)/.test(l)) { mcTocEnd = i; }

}
if (mcTocEnd > tocHeaderIdx) {
const firstToc = lines.slice(tocHeaderIdx + 1).find(l => /^\d+$/.test(l.trim()))?.trim();
if (firstToc) {
for (let i = mcTocEnd + 1; i < lines.length; i++) {
if (lines[i].trim() === firstToc) {
return { text: lines.slice(i).join('\n'), removed: i, tocCount: mcTocEnd - tocHeaderIdx };
}
}
}
}
}
let tocLines = [];

const l = lines[i].trim();
if (!l) { blankStreak++; if (blankStreak > 4 && inToc) break; continue; }
blankStreak = 0;
const isTocLike = l.length < 60 && (
/^(?:제\s*)?\d+\s*[화장]/.test(l) ||
/^#\s*\d+/.test(l) ||
/^\d+\.\s*\S/.test(l) ||
/^\d+$/.test(l) ||
/^[IVXivx]{1,7}\.\s+\S/.test(l) ||
/^(?:프롤로그|에필로그|외전|번외|후기)/.test(l)
);
if (isTocLike) {
if (!inToc) { inToc = true; }
tocLines.push(l); tocEnd = i;
} else if (inToc) {
if (tocLines.length >= 3) break;
inToc = false; tocLines = [];
}
}
if (tocLines.length < 3) return { text, removed:0, tocCount:0 };
const firstTocLine = tocLines[0];
let bodyStart = -1;
for (let i = tocEnd + 1; i < lines.length; i++) {
if (lines[i].trim() === firstTocLine) { bodyStart = i; break; }
}

const HEAD = `<?xml version="1.0" encoding="utf-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head>${styleContent ? `<style>${styleContent}</style>` : ''}</head><body>`;
const FOOT = '</body></html>';
zip.file('OEBPS/Text/cover.xhtml', HEAD + `<div style="margin:0;padding:0;"><img style="width:100%;height:auto;display:block;" src="../images/cover.${coverExt}" alt="표지"/></div>` + FOOT);
allChapters.forEach(ch => {
zip.file(`OEBPS/Text/${ch.filename}`, HEAD + ch.body + FOOT);
});
const navItems = ['      <li><a href="cover.xhtml">표지</a></li>',
...allChapters.map(ch => `      <li><a href="${ch.filename}">${ch.title}</a></li>`)].join('\n');
zip.file('OEBPS/Text/nav.xhtml', `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ko">
<head><meta charset="UTF-8"/><title>목차</title></head>
<body><nav epub:type="toc" id="toc"><h1>목차</h1><ol>${navItems}</ol></nav></body></html>`);
const ncxPts = [
`    <navPoint id="np-cover" playOrder="1"><navLabel><text>표지</text></navLabel><content src="Text/cover.xhtml"/></navPoint>`,
...allChapters.map((ch, i) => `    <navPoint id="np-${ch.id}" playOrder="${i+2}"><navLabel><text>${ch.title}</text></navLabel><content src="Text/${ch.filename}"/></navPoint>`)
].join('\n');
zip.file('OEBPS/toc.ncx', `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
<head><meta name="dtb:uid" content="${bookId}"/><meta name="dtb:depth" content="1"/>
<meta name="dtb:totalPageCount" content="0"/><meta name="dtb:maxPageNumber" content="0"/></head>
<docTitle><text>${title}</text></docTitle>
<navMap>${ncxPts}</navMap>
</ncx>`);
const manifestItems2 = [
`    <item id="cover-image" href="images/cover.${coverExt}" media-type="${coverMime}" properties="cover-image"/>`,
`    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>`,
`    <item id="nav" href="Text/nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>`,
`    <item id="cover-page" href="Text/cover.xhtml" media-type="application/xhtml+xml"/>`,
...allChapters.map(ch => `    <item id="${ch.id}" href="Text/${ch.filename}" media-type="application/xhtml+xml"/>`)
].join('\n');
const spineItems2 = ['    <itemref idref="cover-page"/>',
...allChapters.map(ch => `    <itemref idref="${ch.id}"/>`)].join('\n');
const author = document.getElementById('mergeAuthor').value.trim();
zip.file('OEBPS/content.opf', `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="book-id">
<metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
<dc:title>${title}</dc:title>${author ? `<dc:creator>${author}</dc:creator>` : ''}
<dc:language>ko</dc:language><dc:identifier id="book-id">${bookId}</dc:identifier>
<meta property="dcterms:modified">${new Date().toISOString().slice(0,19)}Z</meta>
<meta name="cover" content="cover-image"/>
</metadata>
<manifest>${manifestItems2}</manifest>
<spine toc="ncx">${spineItems2}</spine>
</package>`);
const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/epub+zip', compression: 'DEFLATE' });
saveAs(blob, `${title}.epub`);
} catch(e) {
alert('합치기 실패: ' + e.message);
console.error(e);
} finally {
document.getElementById('loadingOverlay').style.display = 'none';
}
}</script>
</body>
</html>
