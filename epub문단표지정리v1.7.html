<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>이펍 문단간격 정리기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 16px 80px;
    font-family: -apple-system, "Malgun Gothic", sans-serif;
    background: linear-gradient(180deg, #f5f3ff 0%, #ffffff 200px);
    color: #222;
  }
  h1 {
    font-size: 20px; margin: 0 0 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .sub { color: #868e96; font-size: 13px; margin-bottom: 20px; }
  .card {
    background: #fff; border: 1px solid #ece9f7; border-radius: 16px;
    padding: 18px; margin-bottom: 14px;
    box-shadow: 0 2px 10px rgba(120,100,220,0.06);
  }
  .drop {
    border: 2px dashed #c4b5fd; border-radius: 14px;
    padding: 28px 16px; text-align: center; color: #7c6fdb;
    font-weight: 600; cursor: pointer; transition: 0.15s;
  }
  .drop.drag { background: #f3f0ff; border-color: #7c3aed; }
  input[type=file] { display: none; }
  .filelist { margin-top: 12px; font-size: 13px; color: #444; }
  .filelist div { padding: 6px 0; border-bottom: 1px solid #f1eefc; }
  label.opt {
    display: flex; align-items: center; gap: 8px; font-size: 14px;
    padding: 10px 4px; cursor: pointer;
  }
  label.opt span.desc { color: #999; font-size: 12px; margin-left: auto; text-align:right; }
  button#run {
    width: 100%; padding: 16px; border: none; border-radius: 999px;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 14px rgba(124,58,237,0.35);
  }
  button#run:disabled { opacity: 0.5; }
  #log {
    margin-top: 14px; font-size: 12.5px; color: #555;
    max-height: 220px; overflow-y: auto; white-space: pre-wrap;
    background: #faf9ff; border-radius: 10px; padding: 10px 12px;
    display: none;
  }
  .dl {
    display: block; text-align: center; margin-top: 12px;
    background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 12px;
    padding: 14px; color: #059669; font-weight: 700; text-decoration: none;
  }
  .badge {
    display: inline-block; font-size: 11px; background: #ede9fe; color: #6d28d9;
    padding: 2px 8px; border-radius: 999px; margin-left: 6px; font-weight: 700;
  }
</style>
</head>
<body>

<h1>📖 이펍 문단간격 정리기 <span class="badge">v1.7</span></h1>
<div class="sub">기존 EPUB을 열어서 문단 간격/들여쓰기/표지 호환을 자동으로 맞춰줘요 (5앱 호환 표준) · 저장 파일명은 소설 제목으로 자동 지정</div>

<div class="card">
  <div class="drop" id="drop">📂 EPUB 파일을 여기에 놓거나 탭해서 선택</div>
  <input type="file" id="fileInput" accept=".epub" multiple/>
  <div class="filelist" id="filelist"></div>
</div>

<div class="card">
  <label class="opt">
    <input type="checkbox" id="fixEmptyP" checked/>
    빈 &lt;p&gt;&lt;/p&gt; → &lt;p&gt;&lt;br/&gt;&lt;/p&gt;로 보정
    <span class="desc">일부 앱에서 완전히 빈 p는<br/>안 보이는 문제 수정</span>
  </label>
  <label class="opt">
    <input type="checkbox" id="insertSpacer" checked/>
    문단 사이에 간격 없으면 자동 삽입
    <span class="desc">연속된 &lt;p&gt;...&lt;/p&gt; 사이마다<br/>&lt;p&gt;&lt;br/&gt;&lt;/p&gt; 삽입</span>
  </label>
  <label class="opt">
    <input type="checkbox" id="removeIndent"/>
    들여쓰기 해제
    <span class="desc">CSS의 text-indent를<br/>0으로 변경</span>
  </label>
  <label class="opt">
    <input type="checkbox" id="fixCover" checked/>
    표지 리디 호환 변환
    <span class="desc">옛날 SVG 방식 표지를<br/>div 방식으로 변환</span>
  </label>
  <label class="opt">
    <input type="checkbox" id="removeNavSpine" checked/>
    목차(nav) 페이지 spine 제외
    <span class="desc">linear="no" 무시하는 앱에서<br/>첫 페이지가 흰 페이지로 뜨는 문제 방지</span>
  </label>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;color:#5b21b6;">✏️ 제목/작가명 덮어쓰기 (선택)</div>
  <div style="font-size:12px;color:#999;margin-bottom:10px;">파일 하나 선택하면 현재 저장된 제목/작가명이 자동으로 채워져요. 여기서 지우거나 고쳐서 저장하면 그 내용으로 덮어써지고, 완전히 비워두면 원래 있던 정보가 그대로 유지돼요. (여러 파일 한번에 선택 시엔 자동으로 안 채워짐)</div>
  <input type="text" id="titleOverride" placeholder="제목 (예: 추락한 곳은 낙원)" style="width:100%;padding:10px;margin-bottom:8px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;"/>
  <input type="text" id="authorOverride" placeholder="작가명 (예: 원더드림)" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;"/>
</div>

<button id="run" disabled>EPUB 정리 시작 💜</button>
<div id="log"></div>
<div id="downloadArea"></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const filelistEl = document.getElementById('filelist');
const runBtn = document.getElementById('run');
const logEl = document.getElementById('log');
const downloadArea = document.getElementById('downloadArea');

let files = [];

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(fileArr) {
  files = Array.from(fileArr).filter(f => f.name.toLowerCase().endsWith('.epub'));
  filelistEl.innerHTML = files.map(f => `<div>📘 ${f.name} (${(f.size/1024/1024).toFixed(2)}MB)</div>`).join('');
  runBtn.disabled = files.length === 0;

  const titleInput = document.getElementById('titleOverride');
  const authorInput = document.getElementById('authorOverride');

  if (files.length === 1) {
    try {
      const zip = await JSZip.loadAsync(files[0]);
      const meta = await getBookMeta(zip);
      titleInput.value = meta.title || '';
      authorInput.value = meta.author || '';
      titleInput.placeholder = '제목';
      authorInput.placeholder = '작가명';
    } catch (e) {
      // 메타데이터를 못 읽어도 파일 처리 자체는 계속 진행 가능하니 조용히 무시
    }
  } else {
    // 파일이 여러 개면 공통 적용이라 자동으로 채우지 않음 (기존 그대로 유지하려면 비워둠)
    titleInput.value = '';
    authorInput.value = '';
    titleInput.placeholder = '제목 (여러 파일 선택 시 비워두면 각자 원래 제목 유지)';
    authorInput.placeholder = '작가명 (여러 파일 선택 시 비워두면 각자 원래 작가명 유지)';
  }
}

function log(msg) {
  logEl.style.display = 'block';
  logEl.textContent += msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function isSpacerBlock(pText) {
  const inner = pText.replace(/^<p(?:\s[^>]*)?>/i, '').replace(/<\/p>\s*$/i, '');
  return inner.replace(/<br\s*\/?>/gi, '').trim() === '';
}

function fixParagraphSpacing(html, opts) {
  const pRegex = /<p(?:\s[^>]*)?>[\s\S]*?<\/p>/gi;
  const blocks = [];
  let m;
  while ((m = pRegex.exec(html)) !== null) {
    blocks.push({ start: m.index, end: pRegex.lastIndex, text: m[0] });
  }
  if (blocks.length === 0) return { html, changed: 0 };

  let changed = 0;
  let out = html.slice(0, blocks[0].start);

  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const curIsSpacer = isSpacerBlock(b.text);
    let text = b.text;

    if (opts.fixEmptyP && curIsSpacer && text !== '<p><br/></p>') {
      // preserve original tag attributes but normalize inner content
      text = text.replace(/^(<p(?:\s[^>]*)?>)[\s\S]*?(<\/p>)$/i, (full, open, close) => {
        if (/<br\s*\/?>/i.test(full)) return full; // already has a br, leave as-is
        return open + '<br/>' + close;
      });
      if (text !== b.text) changed++;
    }
    out += text;

    if (i < blocks.length - 1) {
      const next = blocks[i + 1];
      const between = html.slice(b.end, next.start);
      out += between;
      if (opts.insertSpacer && /^\s*$/.test(between)) {
        const nextIsSpacer = isSpacerBlock(next.text);
        if (!curIsSpacer && !nextIsSpacer) {
          const nl = between.includes('\n') ? '\n' : '';
          out += '<p><br/></p>' + nl;
          changed++;
        }
      }
    }
  }
  out += html.slice(blocks[blocks.length - 1].end);
  return { html: out, changed };
}

function removeTextIndent(cssOrHtml) {
  let changed = 0;
  const out = cssOrHtml
    // CSS rule properties: text-indent: 1em;  ->  text-indent: 0;
    .replace(/text-indent\s*:\s*[^;"'}]+/gi, (m) => { changed++; return 'text-indent: 0'; });
  return { text: out, changed };
}

function sanitizeFileName(name) {
  return name.replace(/[\\/:*?"<>|]/g, '').trim();
}

async function getBookMeta(zip) {
  try {
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const opfPathMatch = containerXml.match(/full-path="([^"]+)"/);
    if (!opfPathMatch) return { title: null, author: null };
    const opfPath = opfPathMatch[1];
    const opfContent = await zip.file(opfPath).async('string');
    const titleMatch = opfContent.match(/<dc:title[^>]*>([\s\S]*?)<\/dc:title>/i);
    const authorMatch = opfContent.match(/<dc:creator[^>]*>([\s\S]*?)<\/dc:creator>/i);
    const decode = (s) => {
      if (!s) return null;
      const div = document.createElement('div');
      div.innerHTML = s;
      return div.textContent.trim();
    };
    return { title: decode(titleMatch && titleMatch[1]), author: decode(authorMatch && authorMatch[1]) };
  } catch (e) {
    return { title: null, author: null };
  }
}

async function findCoverHref(zip, opfDoc, opfDir) {
  const guideCover = opfDoc.querySelector('guide > reference[type="cover"]');
  if (guideCover) return guideCover.getAttribute('href');

  const coverMeta = opfDoc.querySelector('meta[name="cover"]');
  if (!coverMeta) return null;
  const imgId = coverMeta.getAttribute('content');
  const imgItem = opfDoc.querySelector(`manifest > item[id="${imgId}"]`);
  if (!imgItem) return null;
  const imgHref = imgItem.getAttribute('href');
  const imgBaseName = imgHref.split('/').pop();

  const spineItems = Array.from(opfDoc.querySelectorAll('spine > itemref')).slice(0, 3);
  for (const itemref of spineItems) {
    const idref = itemref.getAttribute('idref');
    const manItem = opfDoc.querySelector(`manifest > item[id="${idref}"]`);
    if (!manItem) continue;
    const href = manItem.getAttribute('href');
    if (!/x?html?$/i.test(href)) continue;
    const path = opfDir + href;
    const f = zip.file(path) || zip.file(decodeURIComponent(path));
    if (!f) continue;
    const text = await f.async('string');
    if (text.includes(imgBaseName)) return href;
  }
  return null;
}

async function findAllSpineHtmlItems(opfDoc, opfDir, limit) {
  const items = Array.from(opfDoc.querySelectorAll('spine > itemref')).slice(0, limit);
  const out = [];
  for (const itemref of items) {
    const idref = itemref.getAttribute('idref');
    const manItem = opfDoc.querySelector(`manifest > item[id="${idref}"]`);
    if (!manItem) continue;
    const href = manItem.getAttribute('href');
    if (!/x?html?$/i.test(href)) continue;
    out.push(href);
  }
  return out;
}

function rewriteCoverHtml(imgSrc) {
  return `<?xml version="1.0" encoding="utf-8"?>\n<html xmlns="http://www.w3.org/1999/xhtml"><head><meta charset="utf-8"/><title>Cover</title><style>body{margin:0;padding:0;}div.cover-page{margin:0;padding:0;}div.cover-page img{width:100%;display:block;}</style></head><body><div class="cover-page"><img src="${imgSrc}" alt="cover"/></div></body></html>`;
}

async function fixCoverForRidi(zip) {
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const opfPathMatch = containerXml.match(/full-path="([^"]+)"/);
  if (!opfPathMatch) return { changed: 0 };
  const opfPath = opfPathMatch[1];
  const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')) + '/' : '';
  const opfText = await zip.file(opfPath).async('string');
  const parser = new DOMParser();
  const opfDoc = parser.parseFromString(opfText, 'text/xml');

  const coverHref = await findCoverHref(zip, opfDoc, opfDir);
  if (!coverHref) return { changed: 0, found: false };

  const coverPath = opfDir + coverHref;
  const coverFile = zip.file(coverPath) || zip.file(decodeURIComponent(coverPath));
  if (!coverFile) return { changed: 0, found: false };

  const coverText = await coverFile.async('string');
  let changedCount = 0;
  let fixedHrefs = [];

  const alreadySafe = /class=["']cover-page["']/.test(coverText) && !/<svg[\s>]/i.test(coverText);
  let imgSrc = null;
  const imgMatch = coverText.match(/(?:xlink:href|src)\s*=\s*["']([^"']+)["']/i);
  if (imgMatch) imgSrc = imgMatch[1];

  if (!alreadySafe) {
    if (!imgSrc) return { changed: 0, found: false };
    zip.file(coverPath, rewriteCoverHtml(imgSrc));
    changedCount++;
    fixedHrefs.push(coverHref);
  }

  // 중복 표지 페이지 탐지: 시딩/캘리버 편집 흔적으로 같은 표지 이미지를 참조하는
  // 또 다른 페이지가 스핀 초반에 남아있는 경우가 있음(예: cover.xhtml + cover2.xhtml).
  // 그 페이지가 여전히 SVG/viewBox 방식이면 리디에서 흰 페이지로 보이므로 같이 변환한다.
  if (imgSrc) {
    const imgBaseName = imgSrc.split('/').pop();
    const spineHtmlHrefs = await findAllSpineHtmlItems(opfDoc, opfDir, 5);
    for (const href of spineHtmlHrefs) {
      if (href === coverHref) continue;
      const path = opfDir + href;
      const f = zip.file(path) || zip.file(decodeURIComponent(path));
      if (!f) continue;
      const text = await f.async('string');
      if (!text.includes(imgBaseName)) continue;
      const isSvgCover = /<svg[\s>]/i.test(text) && /viewBox/i.test(text);
      const isAlreadySafe = /class=["']cover-page["']/.test(text) && !/<svg[\s>]/i.test(text);
      if (isSvgCover && !isAlreadySafe) {
        const dupImgMatch = text.match(/(?:xlink:href|src)\s*=\s*["']([^"']+)["']/i);
        if (dupImgMatch) {
          zip.file(path, rewriteCoverHtml(dupImgMatch[1]));
          changedCount++;
          fixedHrefs.push(href);
        }
      }
    }
  }

  if (changedCount === 0) return { changed: 0, alreadySafe: true, coverHref };
  return { changed: changedCount, found: true, coverHref: fixedHrefs.join(', ') };
}

async function removeNavFromSpine(zip) {
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const opfPathMatch = containerXml.match(/full-path="([^"]+)"/);
  if (!opfPathMatch) return { changed: 0 };
  const opfPath = opfPathMatch[1];
  const opfText = await zip.file(opfPath).async('string');
  const parser = new DOMParser();
  const opfDoc = parser.parseFromString(opfText, 'text/xml');

  const navItems = Array.from(opfDoc.querySelectorAll('manifest > item[properties~="nav"]'));
  if (navItems.length === 0) return { changed: 0, found: false };

  const navIds = navItems.map(item => item.getAttribute('id'));
  let changed = 0;
  navIds.forEach(id => {
    const itemref = opfDoc.querySelector(`spine > itemref[idref="${id}"]`);
    if (itemref) {
      itemref.parentNode.removeChild(itemref);
      changed++;
    }
  });

  if (changed > 0) {
    const serializer = new XMLSerializer();
    const newOpfText = serializer.serializeToString(opfDoc);
    zip.file(opfPath, newOpfText);
  }
  return { changed, found: true };
}

async function overrideMetadata(zip, newTitle, newAuthor) {
  if (!newTitle && !newAuthor) return { changed: 0 };
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const opfPathMatch = containerXml.match(/full-path="([^"]+)"/);
  if (!opfPathMatch) return { changed: 0 };
  const opfPath = opfPathMatch[1];
  let opfText = await zip.file(opfPath).async('string');
  let changed = 0;

  const escapeXml = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  if (newTitle) {
    if (/<dc:title[^>]*>[\s\S]*?<\/dc:title>/i.test(opfText)) {
      opfText = opfText.replace(/(<dc:title[^>]*>)[\s\S]*?(<\/dc:title>)/i, `$1${escapeXml(newTitle)}$2`);
    } else {
      opfText = opfText.replace(/<metadata([^>]*)>/i, `<metadata$1><dc:title>${escapeXml(newTitle)}</dc:title>`);
    }
    changed++;
  }
  if (newAuthor) {
    if (/<dc:creator[^>]*>[\s\S]*?<\/dc:creator>/i.test(opfText)) {
      opfText = opfText.replace(/(<dc:creator[^>]*>)[\s\S]*?(<\/dc:creator>)/i, `$1${escapeXml(newAuthor)}$2`);
    } else {
      opfText = opfText.replace(/<metadata([^>]*)>/i, `<metadata$1><dc:creator>${escapeXml(newAuthor)}</dc:creator>`);
    }
    changed++;
  }

  zip.file(opfPath, opfText);
  return { changed };
}

runBtn.addEventListener('click', async () => {
  runBtn.disabled = true;
  logEl.textContent = '';
  downloadArea.innerHTML = '';
  const opts = {
    fixEmptyP: document.getElementById('fixEmptyP').checked,
    insertSpacer: document.getElementById('insertSpacer').checked,
    removeIndent: document.getElementById('removeIndent').checked,
    fixCover: document.getElementById('fixCover').checked,
    removeNavSpine: document.getElementById('removeNavSpine').checked,
    titleOverride: document.getElementById('titleOverride').value.trim(),
    authorOverride: document.getElementById('authorOverride').value.trim()
  };

  for (const file of files) {
    log(`▶ ${file.name} 처리 중...`);
    try {
      const zip = await JSZip.loadAsync(file);
      let totalChanged = 0;
      let fileCount = 0;

      const entries = Object.keys(zip.files).filter(name =>
        /\.(x?html?)$/i.test(name) && !zip.files[name].dir
      );

      for (const name of entries) {
        const content = await zip.files[name].async('string');
        let { html, changed } = fixParagraphSpacing(content, opts);
        if (opts.removeIndent) {
          const r = removeTextIndent(html);
          html = r.text;
          changed += r.changed;
        }
        if (changed > 0) {
          zip.file(name, html);
          totalChanged += changed;
          fileCount++;
        }
      }

      if (opts.removeIndent) {
        const cssEntries = Object.keys(zip.files).filter(name =>
          /\.css$/i.test(name) && !zip.files[name].dir
        );
        for (const name of cssEntries) {
          const content = await zip.files[name].async('string');
          const r = removeTextIndent(content);
          if (r.changed > 0) {
            zip.file(name, r.text);
            totalChanged += r.changed;
          }
        }
        log(`  └ CSS 파일 ${cssEntries.length}개 들여쓰기 해제 확인`);
      }

      if (opts.fixCover) {
        try {
          const coverResult = await fixCoverForRidi(zip);
          if (coverResult.changed > 0) {
            log(`  └ 표지 페이지(${coverResult.coverHref}) 리디 호환 방식으로 변환`);
            totalChanged += coverResult.changed;
          } else if (coverResult.alreadySafe) {
            log(`  └ 표지 이미 호환 방식 (변경 없음)`);
          } else {
            log(`  └ 표지 페이지를 찾지 못해 건너뜀`);
          }
        } catch (e) {
          log(`  └ 표지 변환 중 오류: ${e.message}`);
        }
      }

      if (opts.removeNavSpine) {
        try {
          const navResult = await removeNavFromSpine(zip);
          if (navResult.changed > 0) {
            log(`  └ 목차(nav) 페이지 ${navResult.changed}개 spine에서 제외`);
            totalChanged += navResult.changed;
          } else if (navResult.found === false) {
            log(`  └ nav 항목 없음 (건너뜀)`);
          } else {
            log(`  └ nav가 이미 spine에서 제외되어 있음`);
          }
        } catch (e) {
          log(`  └ nav 제외 처리 중 오류: ${e.message}`);
        }
      }

      if (opts.titleOverride || opts.authorOverride) {
        try {
          const metaResult = await overrideMetadata(zip, opts.titleOverride, opts.authorOverride);
          if (metaResult.changed > 0) {
            log(`  └ 제목/작가명 메타데이터 덮어씀`);
            totalChanged += metaResult.changed;
          }
        } catch (e) {
          log(`  └ 메타데이터 수정 중 오류: ${e.message}`);
        }
      }

      log(`  └ ${fileCount}개 파일, 총 ${totalChanged}곳 수정`);

      // mimetype must be first entry & stored (no compression)
      const outZip = new JSZip();
      outZip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });
      for (const name of Object.keys(zip.files)) {
        if (name === 'mimetype') continue;
        const entry = zip.files[name];
        if (entry.dir) continue;
        const data = await entry.async('uint8array');
        outZip.file(name, data);
      }

      const blob = await outZip.generateAsync({
        type: 'blob',
        mimeType: 'application/epub+zip',
        compression: 'DEFLATE',
        compressionOptions: { level: 6 }
      });

      const { title, author } = await getBookMeta(zip);
      const cleanTitle = title ? sanitizeFileName(title) : null;
      const cleanAuthorRaw = author ? sanitizeFileName(author) : null;
      const cleanAuthor = cleanAuthorRaw ? cleanAuthorRaw.replace(/^\[+\s*|\s*\]+$/g, '') : null;
      const baseName = cleanTitle
        ? (cleanAuthor ? `[${cleanAuthor}] ${cleanTitle}` : cleanTitle)
        : file.name.replace(/\.epub$/i, '');
      const outName = (baseName || 'epub') + '_정리완료.epub';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = outName;
      a.className = 'dl';
      a.textContent = `⬇️ ${outName} 다운로드`;
      downloadArea.appendChild(a);

      log(`✅ 완료: ${outName}`);
    } catch (err) {
      log(`❌ 오류: ${err.message}`);
    }
  }
  runBtn.disabled = false;
});
</script>
</body>
</html>
